<style>
.mgame-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:380px;margin:0 auto 14px;}
.mcard{aspect-ratio:1;border-radius:14px;border:none;background:linear-gradient(135deg,#FF6B6B,#FF8E53);cursor:pointer;font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.mcard.flipped{background:#fff;border:3px solid #FF6B6B;}
.mcard.matched{background:linear-gradient(135deg,#4CAF50,#00C9A7);}
.ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:380px;margin:0 auto 14px;}
.ocrd{border-radius:16px;padding:14px 7px;text-align:center;cursor:pointer;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);border:3px solid transparent;}
.ocrd:hover{transform:scale(1.05);}
.ocrd.correct{background:#E8F5E9;border-color:#4CAF50;}
.ocrd.wrong{background:#FFEBEE;border-color:#FF6B6B;}
.ctarea{background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:14px;text-align:center;}
.ctnbtn{padding:10px 16px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:var(--f);font-size:var(--lg);font-weight:900;cursor:pointer;transition:all .2s;min-width:50px;}
.ctnbtn:hover{border-color:#1976D2;transform:scale(1.08);}
.ctnbtn.correct{background:#4CAF50;color:#fff;border-color:#4CAF50;}
.ctnbtn.wrong{background:#FF6B6B;color:#fff;border-color:#FF6B6B;}
.wmbox{background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:14px;text-align:center;}
.wopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:400px;margin:0 auto 14px;}
.wopt{padding:13px 10px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:var(--f);font-size:var(--md);font-weight:900;cursor:pointer;letter-spacing:.5px;}
.wopt:hover{border-color:#7B1FA2;background:#F3E8FF;}
.wopt.correct{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20;}
.wopt.wrong{background:#FFEBEE;border-color:#FF6B6B;}
.wopt.reveal{background:#E8F5E9;border-color:#4CAF50;}
.balarea{position:relative;background:linear-gradient(180deg,#87CEEB,#B0E0FF 60%,#E8F5FF);border-radius:20px;height:380px;overflow:hidden;margin-bottom:14px;box-shadow:0 5px 20px rgba(0,0,0,.1);}
.balq{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);border-radius:16px;padding:8px 18px;font-size:var(--lg);font-weight:900;color:#333;z-index:10;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.1);}
.bal{position:absolute;cursor:pointer;text-align:center;width:64px;}
.balbody{font-size:2.8rem;display:block;line-height:1;}
.balnum{display:block;font-size:1rem;font-weight:900;color:#333;margin-top:-4px;}
.balstr{width:2px;height:28px;background:rgba(0,0,0,.2);margin:0 auto;}
@keyframes bpop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
.prvbtn{display:inline-block;padding:10px 26px;border-radius:20px;border:2px solid #FF6B6B;background:#fff;color:#FF6B6B;font-family:var(--f);font-size:var(--md);font-weight:700;cursor:pointer;}
.prvbtn:hover{background:#FF6B6B;color:#fff;}
.pitem{font-size:2.4rem;padding:7px;background:#f5f5f5;border-radius:12px;min-width:52px;text-align:center;}
.pblank{font-size:2.4rem;padding:7px;background:#f0f0f0;border-radius:12px;min-width:52px;text-align:center;border:3px dashed #ccc;}
.cprow{display:flex;gap:16px;justify-content:center;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.cpitem{background:#f9f9f9;border-radius:16px;padding:14px 16px;text-align:center;cursor:pointer;border:3px solid #eee;flex:1;min-width:110px;}
.cpitem:hover{border-color:#FF6B6B;}
</style>
</head>

<script>
var ODD=[{q:"Which one does NOT live in water?",i:[{e:"&#128031;",l:"Fish",o:false},{e:"&#128044;",l:"Dolphin",o:false},{e:"&#128024;",l:"Elephant",o:true},{e:"&#129416;",l:"Shark",o:false},{e:"&#129585;",l:"Octopus",o:false},{e:"&#128056;",l:"Frog",o:false}]},{q:"Which one is NOT a fruit?",i:[{e:"&#127822;",l:"Apple",o:false},{e:"&#127820;",l:"Banana",o:false},{e:"&#129365;",l:"Carrot",o:true},{e:"&#127815;",l:"Grapes",o:false},{e:"&#127818;",l:"Orange",o:false},{e:"&#127827;",l:"Strawberry",o:false}]},{q:"Which ones can FLY?",i:[{e:"&#128053;",l:"Dog",o:true},{e:"&#129413;",l:"Eagle",o:false},{e:"&#128049;",l:"Cat",o:true},{e:"&#129419;",l:"Butterfly",o:false},{e:"&#128046;",l:"Cow",o:true},{e:"&#9992;",l:"Airplane",o:false}],multi:true,correct:[1,3,5]},{q:"Which one is NOT a color?",i:[{e:"&#128308;",l:"Red",o:false},{e:"&#127795;",l:"Tree",o:true},{e:"&#128309;",l:"Blue",o:false},{e:"&#128993;",l:"Yellow",o:false},{e:"&#127769;",l:"Moon",o:true},{e:"&#128994;",l:"Green",o:false}]},{q:"Which ones are vehicles?",i:[{e:"&#128047;",l:"Tiger",o:true},{e:"&#128663;",l:"Car",o:false},{e:"&#127800;",l:"Flower",o:true},{e:"&#128652;",l:"Bus",o:false},{e:"&#127829;",l:"Pizza",o:true},{e:"&#9992;",l:"Airplane",o:false}],multi:true,correct:[1,3,5]},{q:"Which one is NOT an animal?",i:[{e:"&#129409;",l:"Lion",o:false},{e:"&#127846;",l:"Ice Cream",o:true},{e:"&#128024;",l:"Elephant",o:false},{e:"&#11088;",l:"Star",o:true},{e:"&#128047;",l:"Tiger",o:false},{e:"&#128038;",l:"Bird",o:false}]}];
var CTD=[{q:"How many apples?",e:"&#127822;",n:3},{q:"How many stars?",e:"&#11088;",n:5},{q:"How many frogs?",e:"&#128056;",n:2},{q:"How many flowers?",e:"&#127800;",n:4},{q:"How many balls?",e:"&#9917;",n:6},{q:"How many hearts?",e:"&#10084;",n:1},{q:"How many fish?",e:"&#128031;",n:7},{q:"How many clouds?",e:"&#9729;",n:3},{q:"How many suns?",e:"&#9728;",n:2},{q:"How many butterflies?",e:"&#129419;",n:4}];
var GQD=[{q:"Which animal says Meow?",o:["Dog","Cat","Cow","Duck"],a:1,e:"&#128049;"},{q:"What color is the sky?",o:["Red","Green","Blue","Yellow"],a:2,e:"&#127780;"},{q:"How many legs does a dog have?",o:["2","4","6","8"],a:1,e:"&#128053;"},{q:"Which fruit is yellow and long?",o:["Apple","Orange","Banana","Mango"],a:2,e:"&#127820;"},{q:"What do we use to brush teeth?",o:["Comb","Toothbrush","Soap","Cloth"],a:1,e:"&#129447;"},{q:"Which animal has a long trunk?",o:["Giraffe","Elephant","Hippo","Rhino"],a:1,e:"&#128024;"},{q:"What shape is a ball?",o:["Square","Triangle","Circle","Star"],a:2,e:"&#9917;"},{q:"National bird of India?",o:["Eagle","Crow","Peacock","Parrot"],a:2,e:"&#129434;"},{q:"What do we use when it rains?",o:["Sunglasses","Umbrella","Hat","Jacket"],a:1,e:"&#9730;"},{q:"When do we sleep?",o:["Morning","Afternoon","Night","Evening"],a:2,e:"&#127769;"},{q:"Which fruit is red and round?",o:["Banana","Apple","Mango","Grapes"],a:1,e:"&#127822;"},{q:"What should NOT be touched?",o:["Water","Toy","Fire","Book"],a:2,e:"&#128293;"},{q:"Where do you go to study?",o:["Hospital","Zoo","School","Market"],a:2,e:"&#127979;"},{q:"Which helps sick people?",o:["Fire Truck","Ambulance","Bus","Train"],a:1,e:"&#128657;"},{q:"What color is grass?",o:["Red","Blue","Yellow","Green"],a:3,e:"&#127807;"},{q:"How many fingers on one hand?",o:["3","4","5","6"],a:2,e:"&#128400;"},{q:"What color is milk?",o:["Yellow","White","Blue","Brown"],a:1,e:"&#129379;"},{q:"National animal of India?",o:["Elephant","Lion","Tiger","Leopard"],a:2,e:"&#128047;"},{q:"What do we see at night?",o:["Sun","Moon","Rainbow","Cloud"],a:1,e:"&#127765;"},{q:"How many eyes do we have?",o:["1","2","3","4"],a:1,e:"&#128064;"},{q:"How many days in a week?",o:["5","6","7","8"],a:2,e:"&#128197;"},{q:"What color is an orange?",o:["Red","Yellow","Orange","Green"],a:2,e:"&#127818;"},{q:"Which animal jumps near water?",o:["Cat","Frog","Dog","Cow"],a:1,e:"&#128056;"},{q:"Which vehicle runs on tracks?",o:["Car","Boat","Train","Airplane"],a:2,e:"&#128642;"},{q:"What do bees make?",o:["Water","Honey","Milk","Juice"],a:1,e:"&#127855;"},{q:"Which shape has 3 sides?",o:["Circle","Square","Triangle","Rectangle"],a:2,e:"&#128314;"},{q:"Which bird can talk?",o:["Eagle","Crow","Parrot","Penguin"],a:2,e:"&#129412;"},{q:"What comes after 4?",o:["3","5","6","7"],a:1,e:"&#128290;"},{q:"Where do fish live?",o:["Trees","Sky","Water","Desert"],a:2,e:"&#128031;"},{q:"What do we wear on feet?",o:["Hat","Gloves","Shoes","Scarf"],a:2,e:"&#128099;"},{q:"Biggest planet?",o:["Earth","Mars","Jupiter","Saturn"],a:2,e:"&#129680;"},{q:"How many months in a year?",o:["10","11","12","13"],a:2,e:"&#128197;"},{q:"Which animal says Moo?",o:["Sheep","Cow","Horse","Pig"],a:1,e:"&#128046;"},{q:"What color is a carrot?",o:["Purple","Green","Orange","Red"],a:2,e:"&#129365;"},{q:"Which vehicle flies?",o:["Car","Boat","Train","Airplane"],a:3,e:"&#9992;"},{q:"What do plants need?",o:["Sand","Water and Sun","Stones","Ice"],a:1,e:"&#127807;"},{q:"Fastest animal on land?",o:["Lion","Elephant","Cheetah","Horse"],a:2,e:"&#128006;"},{q:"Baby cat is called?",o:["Cub","Puppy","Kitten","Foal"],a:2,e:"&#128049;"},{q:"Capital of India?",o:["Mumbai","New Delhi","Kolkata","Chennai"],a:1,e:"&#127963;"},{q:"Which part helps you smell?",o:["Eyes","Ears","Nose","Mouth"],a:2,e:"&#128067;"},{q:"Shape of a pizza slice?",o:["Circle","Triangle","Square","Oval"],a:1,e:"&#127829;"},{q:"Season with snow?",o:["Summer","Spring","Winter","Autumn"],a:2,e:"&#10052;"},{q:"What comes before 10?",o:["8","9","11","12"],a:1,e:"&#128290;"},{q:"Fruit on coconut tree?",o:["Mango","Banana","Coconut","Orange"],a:2,e:"&#129381;"},{q:"What cuts paper?",o:["Spoon","Scissors","Pencil","Ruler"],a:1,e:"&#9986;"},{q:"Animal with black-white stripes?",o:["Tiger","Giraffe","Zebra","Leopard"],a:2,e:"&#129427;"},{q:"What is 3+2?",o:["4","5","6","7"],a:1,e:"&#10133;"},{q:"Which part pumps blood?",o:["Brain","Lungs","Heart","Tummy"],a:2,e:"&#10084;"},{q:"15 August in India?",o:["Diwali","Holi","Independence Day","Republic Day"],a:2,e:"&#127470;&#127475;"},{q:"King of the jungle?",o:["Tiger","Elephant","Lion","Bear"],a:2,e:"&#129409;"}];
var WMD=[{e:"&#127822;",w:"APPLE",o:["APPLE","MANGO","GRAPE","LEMON"]},{e:"&#128024;",w:"ELEPHANT",o:["TIGER","ELEPHANT","GIRAFFE","MONKEY"]},{e:"&#127769;",w:"MOON",o:["STAR","SUN","MOON","CLOUD"]},{e:"&#128663;",w:"CAR",o:["BUS","CAR","TRAIN","BOAT"]},{e:"&#127820;",w:"BANANA",o:["BANANA","ORANGE","MANGO","PEACH"]},{e:"&#128049;",w:"CAT",o:["DOG","COW","CAT","PIG"]},{e:"&#127800;",w:"FLOWER",o:["TREE","LEAF","GRASS","FLOWER"]},{e:"&#11088;",w:"STAR",o:["MOON","STAR","SUN","CLOUD"]},{e:"&#128031;",w:"FISH",o:["FISH","BIRD","FROG","CRAB"]},{e:"&#127968;",w:"HOUSE",o:["SCHOOL","HOUSE","MARKET","PARK"]},{e:"&#127818;",w:"ORANGE",o:["ORANGE","LEMON","MANGO","PEACH"]},{e:"&#129409;",w:"LION",o:["BEAR","WOLF","TIGER","LION"]},{e:"&#9728;",w:"SUN",o:["MOON","RAIN","SUN","WIND"]},{e:"&#127880;",w:"BALLOON",o:["KITE","BALL","BALLOON","BUBBLE"]},{e:"&#127752;",w:"RAINBOW",o:["RAIN","CLOUD","STORM","RAINBOW"]},{e:"&#128053;",w:"DOG",o:["CAT","COW","DOG","GOAT"]},{e:"&#9999;",w:"PENCIL",o:["PEN","PENCIL","CHALK","BOOK"]},{e:"&#127829;",w:"PIZZA",o:["CAKE","BREAD","PIZZA","RICE"]},{e:"&#129419;",w:"BUTTERFLY",o:["DRAGONFLY","BEE","ANT","BUTTERFLY"]},{e:"&#127874;",w:"CAKE",o:["CAKE","BREAD","COOKIE","MUFFIN"]}];

// MEMORY
var memE=["&#127822;","&#127820;","&#128049;","&#128053;","&#11088;","&#127752;","&#128663;","&#127880;"];
var memSt={cards:[],fl:[],ma:[],lk:false,sc:0,mv:0};
function initMem(){var p=memE.concat(memE);p.sort(function(){return Math.random()-.5;});memSt={cards:p,fl:[],ma:[],lk:false,sc:0,mv:0};renderMem();}
function renderMem(){var h='<div class="scorebar">Score: <b>'+memSt.sc+'</b> Moves: <b>'+memSt.mv+'</b></div><div class="mgame-grid">';memSt.cards.forEach(function(c,i){var isF=memSt.fl.indexOf(i)>=0||memSt.ma.indexOf(i)>=0;var isM=memSt.ma.indexOf(i)>=0;h+='<button class="mcard'+(isF?' flipped':'')+(isM?' matched':'')+'" onclick="flipC('+i+')">'+(isF?c:'&#127775;')+'</button>';});h+='</div>';if(memSt.ma.length===16){h+='<div class="ibox" style="text-align:center"><div style="font-size:3rem">&#127881;</div><div class="iq">All matched in '+memSt.mv+' moves!</div><button class="nxtbtn" onclick="initMem()">Play Again</button></div>';}h+='<button class="nxtbtn" style="background:#1976D2;margin-top:8px" onclick="initMem()">New Game</button>';document.getElementById('memArea').innerHTML=h;}
function flipC(i){if(memSt.lk||memSt.fl.length>=2||memSt.ma.indexOf(i)>=0||memSt.fl.indexOf(i)>=0)return;memSt.fl.push(i);if(memSt.fl.length===2){memSt.mv++;memSt.lk=true;setTimeout(function(){var a=memSt.fl[0],b=memSt.fl[1];if(memSt.cards[a]===memSt.cards[b]){memSt.ma.push(a,b);memSt.sc++;spk('Match!');}else{spk('Try again!');}memSt.fl=[];memSt.lk=false;renderMem();},900);}renderMem();}

// ODD ONE OUT
var oddIdx=0,oddSc=0;
function initOdd(){oddIdx=0;oddSc=0;buildOdd();}
function buildOdd(){
  var p=ODD[oddIdx%ODD.length];
  var prevBtn=oddIdx>0?'<button class="prvbtn" onclick="oddIdx--;buildOdd()">&#8592; Prev</button>':'';
  var h='<div class="scorebar">Q <b>'+(oddIdx+1)+'</b>/'+ODD.length+' &nbsp; Score: <b>'+oddSc+'</b></div>'
    +'<div class="ibox"><div class="iq">'+p.q+'</div>'
    +'<div class="ogrid">'+p.i.map(function(it,i){
      return '<div class="ocrd" id="oc'+i+'" onclick="chkOdd('+i+','+oddIdx+')">'
        +'<span style="font-size:2.2rem;display:block;margin-bottom:5px">'+it.e+'</span>'
        +'<div style="font-size:var(--sm);font-weight:700;color:#333">'+it.l+'</div></div>';
    }).join('')+'</div>'
    +'<div class="rmsg" id="oddR"></div>'
    +'<div style="display:flex;gap:10px;justify-content:center;margin-top:12px">'
    +prevBtn+'<button class="nxtbtn" id="oddN" style="display:none" onclick="oddIdx++;buildOdd()">Next &#8594;</button></div></div>';
  document.getElementById('oddArea').innerHTML=h;
  spk(p.q);
}
function chkOdd(i,qi){
  var nb=document.getElementById('oddN');
  if(nb&&nb.style.display==='inline-block')return;
  var p=ODD[qi%ODD.length];
  if(p.multi){
    var ok=p.correct.indexOf(i)>=0;
    if(ok){
      document.getElementById('oc'+i).classList.add('correct');
      /* reveal all correct */
      p.correct.forEach(function(ci){document.getElementById('oc'+ci).classList.add('correct');});
      oddSc++;
      document.getElementById('oddR').innerHTML='&#127881; Correct!';
      spk('Correct!');
      document.getElementById('oddN').style.display='inline-block';
    }else{
      var el=document.getElementById('oc'+i);
      el.classList.add('wrong');
      document.getElementById('oddR').innerHTML='&#10060; Wrong! Try again!';
      spk('Wrong answer! Try again!');
      setTimeout(function(){el.classList.remove('wrong');document.getElementById('oddR').innerHTML='';},900);
    }
  }else{
    var isO=p.i[i].o;
    if(isO){
      document.getElementById('oc'+i).classList.add('correct');
      oddSc++;
      document.getElementById('oddR').innerHTML='&#127881; Correct! '+p.i[i].l+' is the odd one!';
      spk('Correct! '+p.i[i].l+' is the odd one!');
      document.getElementById('oddN').style.display='inline-block';
    }else{
      var el2=document.getElementById('oc'+i);
      el2.classList.add('wrong');
      document.getElementById('oddR').innerHTML='&#10060; Wrong! Try again!';
      spk('Wrong answer! Try again!');
      setTimeout(function(){el2.classList.remove('wrong');document.getElementById('oddR').innerHTML='';},900);
    }
  }
}

// COUNT & TAP
var ctIdx=0,ctSc=0,ctAnswered=false;
function initCT(){ctIdx=0;ctSc=0;ctAnswered=false;buildCT();}
function buildCT(){
  var p=CTD[ctIdx%CTD.length];
  var ems=Array(p.n).fill(p.e).join(' ');
  var opts=[p.n];
  while(opts.length<4){var r=Math.floor(Math.random()*8)+1;if(opts.indexOf(r)<0)opts.push(r);}
  opts.sort(function(){return Math.random()-.5;});
  ctAnswered=false;
  var prevBtn=ctIdx>0?'<button class="prvbtn" onclick="ctIdx--;buildCT()">&#8592; Prev</button>':'';
  document.getElementById('ctArea').innerHTML=
    '<div class="scorebar">Q <b>'+(ctIdx+1)+'</b>/'+CTD.length+' &nbsp; Score: <b>'+ctSc+'</b></div>'
    +'<div class="ctarea"><div class="iq">'+p.q+'</div>'
    +'<div style="font-size:2.2rem;margin-bottom:16px;min-height:56px">'+ems+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+opts.map(function(o){return '<button class="ctnbtn" id="cto_'+o+'" onclick="chkCT(this,'+o+','+p.n+')">'+o+'</button>';}).join('')+'</div>'
    +'<div class="rmsg" id="ctR" style="margin-top:10px"></div>'
    +'<div style="display:flex;gap:10px;justify-content:center;margin-top:12px">'+prevBtn+'<button class="nxtbtn" id="ctN" style="display:none" onclick="ctIdx++;ctAnswered=false;buildCT()">Next &#8594;</button></div></div>';
  spk(p.q);
}
function chkCT(b,c,cr){
  if(ctAnswered)return;
  if(c===cr){
    ctAnswered=true;
    b.classList.add('correct');ctSc++;
    document.getElementById('ctR').innerHTML='&#127881; Yes! There are '+cr+'!';
    spk('Correct! There are '+cr+'!');
    document.getElementById('ctN').style.display='inline-block';
  }else{
    b.classList.add('wrong');
    document.getElementById('ctR').innerHTML='&#10060; Wrong! Try again!';
    spk('Wrong answer! Try again!');
    setTimeout(function(){b.classList.remove('wrong');document.getElementById('ctR').innerHTML='';},900);
  }
}

// GAME QUIZ
var gqIdx=0,gqSc=0,gqAnswered=false;
function initGQ(){gqIdx=0;gqSc=0;gqAnswered=false;buildGQ();}
function buildGQ(){
  if(gqIdx>=GQD.length){
    var pct=Math.round(gqSc/GQD.length*100);
    document.getElementById('gqArea').innerHTML='<div class="scorescreen"><div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div><div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+gqSc+' / '+GQD.length+'</div><div style="color:#777;margin-bottom:12px">'+(pct>=80?'Excellent! You are a star!':pct>=50?'Good job! Keep practising!':'Keep trying!')+'</div><button class="rbtn" onclick="initGQ()">Play Again</button></div>';
    spk(pct>=80?'Excellent! You are a star!':'Good job!');return;
  }
  gqAnswered=false;
  var p=GQD[gqIdx];
  var prevBtn=gqIdx>0?'<button class="prvbtn" onclick="gqIdx--;buildGQ()">&#8592; Prev</button>':'';
  document.getElementById('gqArea').innerHTML=
    '<div class="scorebar">Q <b>'+(gqIdx+1)+'</b>/'+GQD.length+' &nbsp; Score: <b>'+gqSc+'</b></div>'
    +'<div class="ibox"><div style="font-size:3rem;text-align:center;margin-bottom:8px">'+p.e+'</div>'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="achc" style="flex-wrap:wrap;gap:8px">'+p.o.map(function(o,i){return '<button class="cbtn" style="font-size:var(--md);min-width:110px" id="gqo_'+i+'" onclick="chkGQ(this,'+i+','+p.a+')">'+o+'</button>';}).join('')+'</div>'
    +'<div class="rmsg" id="gqR"></div>'
    +'<div style="display:flex;gap:10px;justify-content:center;margin-top:4px">'+prevBtn+'<button class="nxtbtn" id="gqN" style="display:none" onclick="gqIdx++;gqAnswered=false;buildGQ()">Next &#8594;</button></div></div>';
  spk(p.q);
}
function chkGQ(b,c,cr){
  if(gqAnswered)return;
  if(c===cr){
    gqAnswered=true;
    b.classList.add('correct');gqSc++;
    document.getElementById('gqR').innerHTML='&#127881; Correct!';
    spk('Correct!');
    document.getElementById('gqN').style.display='inline-block';
  }else{
    b.classList.add('wrong');
    document.getElementById('gqR').innerHTML='&#10060; Wrong! Try again!';
    spk('Wrong answer! Try again!');
    setTimeout(function(){b.classList.remove('wrong');document.getElementById('gqR').innerHTML='';},900);
  }
}

// WORD MATCH
var wmIdx=0,wmSc=0,wmAns=false;
function initWM(){wmIdx=0;wmSc=0;wmAns=false;buildWM();}
function buildWM(){
  if(wmIdx>=WMD.length){
    var pct=Math.round(wmSc/WMD.length*100);
    document.getElementById('wmArea').innerHTML='<div class="scorescreen"><div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':'&#127942;')+'</div><div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+wmSc+' / '+WMD.length+'</div><div style="color:#777;margin-bottom:12px">'+(pct>=80?'Amazing spelling!':'Keep practising!')+'</div><button class="rbtn" onclick="initWM()">Play Again</button></div>';
    spk(pct>=80?'Amazing spelling!':'Good job!');return;
  }
  wmAns=false;
  var p=WMD[wmIdx];
  var sh=p.o.slice().sort(function(){return Math.random()-.5;});
  var prevBtn=wmIdx>0?'<button class="prvbtn" onclick="wmIdx--;buildWM()">&#8592; Prev</button>':'';
  document.getElementById('wmArea').innerHTML=
    '<div class="scorebar">Word <b>'+(wmIdx+1)+'</b>/'+WMD.length+' &nbsp; Score: <b>'+wmSc+'</b></div>'
    +'<div class="wmbox"><div style="font-size:5rem;display:block;margin-bottom:8px">'+p.e+'</div>'
    +'<div style="font-size:var(--lg);font-weight:900;color:#333;margin-bottom:18px">Which word matches?</div>'
    +'<div class="wopts">'+sh.map(function(o){return '<button class="wopt" id="wo_'+o+'" onclick="chkWM(this,\''+o+'\',\''+p.w+'\')">'+o+'</button>';}).join('')+'</div>'
    +'<div class="rmsg" id="wmR"></div>'
    +'<div style="display:flex;gap:10px;justify-content:center;margin-top:4px">'+prevBtn+'<button class="nxtbtn" id="wmN" style="display:none" onclick="wmIdx++;wmAns=false;buildWM()">Next &#8594;</button></div></div>';
  spk('Which word matches?');
}
function chkWM(b,c,cr){
  if(wmAns)return;
  if(c===cr){
    wmAns=true;
    b.classList.add('correct');wmSc++;
    document.getElementById('wmR').innerHTML='&#127881; Yes! '+cr+'!';
    spk('Correct! '+cr+'!');
    document.getElementById('wmN').style.display='inline-block';
  }else{
    b.classList.add('wrong');
    document.getElementById('wmR').innerHTML='&#10060; Wrong! Try again!';
    spk('Wrong answer! Try again!');
    setTimeout(function(){b.classList.remove('wrong');document.getElementById('wmR').innerHTML='';},900);
  }
}

// BALLOON POP
var balSc=0,balRd=0,balTgt=0;
var balC=["&#128308;","&#128993;","&#128994;","&#128309;","&#128992;","&#128310;","&#128995;"];
function initBal(){balSc=0;balRd=0;nextBal();}
function nextBal(){if(balRd>=10){var pct=Math.round(balSc/10*100);document.getElementById('balArea').innerHTML='<div class="scorescreen"><div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':'&#127942;')+'</div><div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+balSc+' / 10</div><div style="color:#777;margin-bottom:12px">'+(pct>=80?'Champion!':'Good job!')+'</div><button class="rbtn" onclick="initBal()">Play Again</button></div>';spk(pct>=80?'Champion!':'Good job!');return;}balTgt=Math.floor(Math.random()*9)+1;var nums=[balTgt];while(nums.length<5){var r=Math.floor(Math.random()*9)+1;if(nums.indexOf(r)<0)nums.push(r);}nums.sort(function(){return Math.random()-.5;});var pos=[{l:'8%',t:'65%'},{l:'24%',t:'45%'},{l:'42%',t:'60%'},{l:'62%',t:'42%'},{l:'78%',t:'57%'}];document.getElementById('balArea').innerHTML='<div class="scorebar">Score: <b>'+balSc+'</b> Round: <b>'+(balRd+1)+'/10</b></div><div class="balarea" id="bArea"><div class="balq">Pop number <b>'+balTgt+'</b>!</div>'+nums.map(function(n,i){return '<div class="bal" id="bl_'+n+'" style="left:'+pos[i].l+';top:'+pos[i].t+'" onclick="popBal('+n+','+balTgt+')">'+'<span class="balbody">'+balC[i%balC.length]+'</span>'+'<span class="balnum">'+n+'</span>'+'<div class="balstr"></div></div>';}).join('')+'</div><div class="rmsg" id="balR" style="padding:8px;text-align:center"></div>';spk('Pop the balloon with number '+balTgt);nums.forEach(function(n,i){var el=document.getElementById('bl_'+n);if(!el)return;var top=parseFloat(pos[i].t);var spd=0.22+Math.random()*.22;(function anim(){if(!el||!el.parentNode)return;top-=spd;if(top<-15)top=80+Math.random()*15;el.style.top=top+'%';requestAnimationFrame(anim);})();});}
function popBal(n,t){var el=document.getElementById('bl_'+n);if(!el)return;if(n===t){el.style.animation='bpop .35s ease forwards';setTimeout(function(){if(el&&el.parentNode)el.style.display='none';},400);balSc++;document.getElementById('balR').innerHTML='POP! Correct!';spk('Pop! Correct!');balRd++;setTimeout(nextBal,1200);}else{document.getElementById('balR').innerHTML='Try again! Find number '+t+'!';spk('Try again! Find number '+t);}}

document.addEventListener('DOMContentLoaded',function(){
  initMem();initOdd();initCT();initGQ();initWM();
  var f=document.querySelector('.stab');
  if(f){f.classList.add('active');f.style.background='#FF6B00';f.style.color='#fff';}
});
</script>
