<style>
/* ── Override shared sidebar layout ── */
.subbody { display: block !important; }
.submain { padding: 14px 12px calc(90px + env(safe-area-inset-bottom)) !important; overflow-y: auto; }
#sdrawer { top: 66px !important; }

/* ── GK toolbar ── */
.gktoolbar { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin:0 0 12px; }
.gkbtn { padding:7px 16px; border-radius:20px; border:none; font-family:var(--f); font-size:var(--sm); font-weight:700; cursor:pointer; }
.gkbtn-exp  { background:#4CAF50; color:#fff; }
.gkbtn-col  { background:#FF6B6B; color:#fff; }
.gkbtn-shuf { background:linear-gradient(135deg,#6A1B9A,#E91E63); color:#fff; }
.gkbtn-back { background:#78909C; color:#fff; }

/* ── GK Accordion ── */
.gksec  { margin-bottom:14px; border-radius:16px; overflow:hidden; box-shadow:0 3px 12px rgba(0,0,0,.1); }
.gkhd   { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; }
.gkhd-l { display:flex; align-items:center; gap:11px; }
.gkt    { font-size:var(--lg); font-weight:900; color:#fff; }
.gkc    { font-size:var(--sm); opacity:.85; color:#fff; }
.gkico  { font-size:1.2rem; color:#fff; transition:transform .25s; font-weight:900; }
.gkico.open { transform:rotate(180deg); }
.gkbody { overflow:hidden; max-height:0; transition:max-height .35s ease; }
.gkbody.open { max-height:9999px; }
.gkinner { padding:10px 10px 12px; background:#fff; }
.gkgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; }
@media(max-width:600px) { .gkgrid { grid-template-columns:1fr; } }

/* ── GK Card — clickable question, no Read Q button ── */
.gkcrd { border-radius:15px; padding:12px 11px 10px; box-shadow:0 2px 8px rgba(0,0,0,.08); position:relative; }
.gknum { position:absolute; top:8px; right:10px; font-size:var(--sm); font-weight:900; opacity:.35; }
.gktop { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; cursor:pointer; }
.gktop:hover .gkq { text-decoration:underline; text-decoration-style:dotted; }
.gkq   { font-size:var(--md); font-weight:700; color:#222; line-height:1.45; flex:1; }
.gkacts { display:flex; gap:7px; }
.gkabtn { flex:1; padding:6px 8px; border-radius:10px; border:none; font-family:var(--f); font-size:var(--sm); font-weight:700; cursor:pointer; }
.gkabtn-a { background:#E8F5E9; color:#2E7D32; }
.gkabtn-a:hover { background:#2E7D32; color:#fff; }
.gkans { margin-top:8px; background:rgba(255,255,255,.85); border-radius:10px; padding:7px 10px; font-size:var(--md); font-weight:700; color:#333; display:none; }
.gkans.show { display:block; animation:popIn .22s ease; }

/* ── GK Random quiz card ── */
.rnd-card { border-radius:20px; padding:20px 18px; box-shadow:0 5px 20px rgba(0,0,0,.12); margin-bottom:16px; cursor:pointer; }
.rnd-card:hover { transform:scale(1.01); }
.rnd-q    { font-size:var(--xl); font-weight:900; color:#222; line-height:1.4; margin-bottom:14px; }
.rnd-em   { font-size:3rem; display:block; margin-bottom:10px; }
.rnd-meta { font-size:var(--sm); color:#999; margin-bottom:14px; }
.rnd-ans  { margin-top:10px; border-radius:12px; padding:10px 14px; font-size:var(--lg); font-weight:900; display:none; }
.rnd-ans.show { display:block; animation:popIn .22s ease; }

/* ── MCQ ── */
.mcqprog { background:#fff; border-radius:12px; padding:10px 16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); display:flex; align-items:center; gap:12px; }
.mcqbar  { flex:1; height:10px; background:#eee; border-radius:5px; overflow:hidden; }
.mcqfill { height:100%; background:linear-gradient(135deg,#6A1B9A,#E91E63); border-radius:5px; transition:width .4s; }
.mcqcard { background:#fff; border-radius:20px; padding:22px; box-shadow:0 5px 20px rgba(0,0,0,.12); margin-bottom:14px; }
.mcqopts { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.mcqopt  { padding:12px 14px; border-radius:14px; border:3px solid #eee; background:#f9f9f9; font-family:var(--f); font-size:var(--md); font-weight:700; cursor:pointer; text-align:left; display:flex; align-items:center; gap:8px; }
.mcqopt:hover { border-color:#6A1B9A; background:#F3E8FF; }
.mcqopt.correct { background:#E8F5E9; border-color:#4CAF50; color:#1B5E20; }
.mcqopt.wrong   { background:#FFEBEE; border-color:#FF6B6B; color:#B71C1C; }
.mcqltr { width:24px; height:24px; border-radius:50%; background:#eee; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:900; flex-shrink:0; }
/* mcq-nav = nav-row alias */
.mcq-nav { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }

/* MCQ start screen */
.mcq-start { text-align:center; padding:20px; }
.mcq-start-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
.mcq-sbtn { padding:14px 28px; border-radius:20px; border:none; font-family:var(--f); font-size:var(--lg); font-weight:900; cursor:pointer; transition:all .2s; }
.mcq-sbtn:hover { transform:scale(1.05); }

/* ── Bottom dock ── */
.quiz-dock {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:#fff; box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:flex; padding:6px 3px calc(6px + env(safe-area-inset-bottom)); gap:4px;
}
.quiz-dock-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; padding:8px 4px 7px; border-radius:14px;
  border:none; background:transparent; color:#999; font-family:var(--f);
  font-size:.6rem; font-weight:800; cursor:pointer; line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.quiz-dock-btn.active { color:#fff; transform:scale(1.05); }
.quiz-dock-btn .dock-ico { font-size:1.5rem; line-height:1; }
.quiz-dock-btn[data-tab="gkqs"].active { background:#6A1B9A; }
.quiz-dock-btn[data-tab="mcq"].active  { background:#E91E63; }
</style>

  {e:"&#128056;",q:"Which animal jumps near water and croaks?",o:["Cat","Frog","Dog","Cow"],a:1},
  {e:"&#128642;",q:"Which vehicle runs on tracks?",o:["Car","Boat","Train","Airplane"],a:2},
  {e:"&#127855;",q:"What do bees make?",o:["Water","Honey","Milk","Juice"],a:1},
  {e:"&#10084;",q:"Which organ pumps blood in our body?",o:["Brain","Lungs","Heart","Tummy"],a:2},
  {e:"&#127874;",q:"What do we eat on birthdays?",o:["Pizza","Cake","Sandwich","Rice"],a:1},
  {e:"&#128290;",q:"What comes after 5?",o:["4","6","7","8"],a:1},
  {e:"&#128059;",q:"Where do bears sleep in winter?",o:["Tree","Cave","Sea","Sky"],a:1},
  {e:"&#127752;",q:"How many colors are in a rainbow?",o:["5","6","7","8"],a:2}
];

/* ═══════════════════════════════════════════════
   GK ACCORDION
═══════════════════════════════════════════════ */
(function() {
  var h = '';
  GKCAT.forEach(function(cat, ci) {
    var qs = GKQ.slice(GKBN[ci], GKBN[ci + 1]);
    var first = ci === 0;
    h += '<div class="gksec" id="gs' + ci + '">'
      + '<div class="gkhd" style="background:' + cat.c + '" onclick="tgk(' + ci + ')">'
      + '<div class="gkhd-l"><span style="font-size:1.6rem">' + cat.i + '</span>'
      + '<div><div class="gkt">' + cat.n + '</div><div class="gkc">' + qs.length + ' questions</div></div></div>'
      + '<span class="gkico' + (first ? ' open' : '') + '">&#9660;</span></div>'
      + '<div class="gkbody' + (first ? ' open' : '') + '"><div class="gkinner"><div class="gkgrid">';
    qs.forEach(function(q, i) {
      var uid  = 'gk_' + ci + '_' + i;
      var abs  = GKBN[ci] + i;
      /* clicking the top area reads the question aloud */
      h += '<div class="gkcrd" style="background:' + cat.bg + ';border:2px solid ' + cat.br + '">'
        + '<div class="gknum">' + (i + 1) + '</div>'
        + '<div class="gktop" onclick="spk(GKQ[' + abs + '][1])" title="Tap to hear the question">'
        + '<span style="font-size:1.5rem;min-width:26px">' + q[0] + '</span>'
        + '<div class="gkq">' + q[1] + '</div></div>'
        + '<div class="gkacts">'
        + '<button class="gkabtn gkabtn-a" onclick="showAns(\'' + uid + '\',' + ci + ',' + i + ')">&#128065; Answer</button>'
        + '</div><div class="gkans" id="' + uid + '"></div></div>';
    });
    h += '</div></div></div></div>';
  });
  document.getElementById('gkWrap').innerHTML = h;
})();

function tgk(ci)  { document.querySelector('#gs' + ci + ' .gkbody').classList.toggle('open'); document.querySelector('#gs' + ci + ' .gkico').classList.toggle('open'); }
function gkExp()  { document.querySelectorAll('.gkbody').forEach(function(b) { b.classList.add('open'); }); document.querySelectorAll('.gkico').forEach(function(x) { x.classList.add('open'); }); }
function gkCol()  { document.querySelectorAll('.gkbody').forEach(function(b) { b.classList.remove('open'); }); document.querySelectorAll('.gkico').forEach(function(x) { x.classList.remove('open'); }); }
function showAns(uid, ci, qi) {
  var ans = GKQ[GKBN[ci] + qi][2];
  var el  = document.getElementById(uid);
  if (!el) return;
  el.textContent = 'Answer: ' + ans;
  el.classList.add('show');
  spk(ans);
}

/* ═══════════════════════════════════════════════
   GK RANDOM QUIZ
═══════════════════════════════════════════════ */
var gkRndPool  = [];
var gkRndOrder = [];
var gkRndIdx   = 0;
var gkRndAnsShown = false;

function enterGKRandom() {
  /* Build flat pool */
  gkRndPool = [];
  GKCAT.forEach(function(cat, ci) {
    var qs = GKQ.slice(GKBN[ci], GKBN[ci + 1]);
    qs.forEach(function(q) {
      gkRndPool.push({ cat: cat, e: q[0], q: q[1], ans: q[2] });
    });
  });
  gkRndOrder = gkRndPool.map(function(_, i) { return i; })
                         .sort(function() { return Math.random() - 0.5; });
  gkRndIdx = 0;
  document.getElementById('gkWrap').style.display   = 'none';
  document.querySelector('.gktoolbar').style.display = 'none';
  buildGKRandom();
}

function exitGKRandom() {
  document.getElementById('gkRandom').style.display   = 'none';
  document.getElementById('gkWrap').style.display     = '';
  document.querySelector('.gktoolbar').style.display  = '';
}

function buildGKRandom() {
  var item  = gkRndPool[gkRndOrder[gkRndIdx]];
  var total = gkRndOrder.length;
  gkRndAnsShown = false;
  var ansId = 'gkRndAns';

  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">'
    + '<button class="gkbtn gkbtn-back" onclick="exitGKRandom()">&#8592; All Questions</button>'
    + '<span style="font-size:var(--md);font-weight:900;color:#555">Q <b>' + (gkRndIdx + 1) + '</b> / ' + total + '</span>'
    + '</div>'
    + '<div class="rnd-card" style="background:' + item.cat.bg + ';border:2px solid ' + item.cat.br + '" onclick="readGKRnd()" title="Tap card to hear question">'
    + '<span class="rnd-em">' + item.e + '</span>'
    + '<div class="rnd-q">' + item.q + '</div>'
    + '<div class="rnd-meta">&#128266; Tap card to hear &nbsp;&bull;&nbsp; ' + item.cat.n + '</div>'
    + '<button class="gkabtn gkabtn-a" style="max-width:160px" onclick="event.stopPropagation();showGKRndAns()">&#128065; Show Answer</button>'
    + '<div class="rnd-ans" id="' + ansId + '" style="background:' + item.cat.br + '33;border:2px solid ' + item.cat.br + '"></div>'
    + '</div>'
    + '<div class="nav-row">'
    + (gkRndIdx > 0         ? '<button class="prvbtn" onclick="gkRndNav(-1)">&#8592; Prev</button>' : '')
    + (gkRndIdx < total - 1 ? '<button class="nxtbtn" onclick="gkRndNav(1)">Next &#8594;</button>'  : '')
    + '</div>';

  var el = document.getElementById('gkRandom');
  el.style.display = 'block';
  el.innerHTML = h;
  spk(item.q);
}

function readGKRnd() {
  var item = gkRndPool[gkRndOrder[gkRndIdx]];
  spk(item.q);
}

function showGKRndAns() {
  if (gkRndAnsShown) return;
  gkRndAnsShown = true;
  var item = gkRndPool[gkRndOrder[gkRndIdx]];
  var el   = document.getElementById('gkRndAns');
  if (!el) return;
  el.textContent = '✅ ' + item.ans;
  el.classList.add('show');
  spk(item.ans);
}

function gkRndNav(dir) {
  gkRndIdx += dir;
  buildGKRandom();
}

/* ═══════════════════════════════════════════════
   SWITCH TAB
═══════════════════════════════════════════════ */
function swQuiz(tab) {
  document.querySelectorAll('.sec').forEach(function(s) { s.classList.remove('active'); });
  var sec = document.getElementById('gk-' + tab);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('.quiz-dock-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.quiz-dock-btn[data-tab="' + tab + '"]');
  if (btn) btn.classList.add('active');
}

/* ═══════════════════════════════════════════════
   MCQ QUIZ
═══════════════════════════════════════════════ */
var mcqIdx    = 0;
var mcqSc     = 0;
var mcqAns    = false;   /* true once current question answered correctly */
var mcqOrder  = [];      /* indices into MCQD — supports shuffle */

function startMCQ(shuffle) {
  mcqIdx = 0; mcqSc = 0; mcqAns = false;
  mcqOrder = MCQD.map(function(_, i) { return i; });
  if (shuffle) mcqOrder.sort(function() { return Math.random() - 0.5; });
  buildMCQ();
}

function buildMCQ() {
  var area = document.getElementById('mcqArea');
  if (!area) return;

  if (mcqIdx >= mcqOrder.length) {
    /* Score screen */
    var pct = Math.round(mcqSc / mcqOrder.length * 100);
    area.innerHTML = '<div class="scorescreen">'
      + '<div style="font-size:4rem">' + (pct >= 80 ? '&#127942;&#127942;&#127942;' : pct >= 60 ? '&#127942;&#127942;' : '&#127942;') + '</div>'
      + '<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">' + mcqSc + ' / ' + mcqOrder.length + '</div>'
      + '<div style="color:#777;margin-bottom:16px">' + (pct >= 80 ? 'Outstanding! You are a genius!' : pct >= 60 ? 'Great job! Keep learning!' : 'Keep practising!') + '</div>'
      + '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      + '<button class="rbtn" onclick="startMCQ(false)">&#9654; Play Again</button>'
      + '<button class="rbtn" style="background:linear-gradient(135deg,#E91E63,#FF8E53)" onclick="startMCQ(true)">&#128256; Shuffle Again</button>'
      + '</div></div>';
    spk(pct >= 80 ? 'Outstanding! You are a genius!' : pct >= 60 ? 'Great job!' : 'Keep practising!');
    return;
  }

  mcqAns = false;
  var p   = MCQD[mcqOrder[mcqIdx]];
  var L   = ['A', 'B', 'C', 'D'];
  var tot = mcqOrder.length;
  var pct = Math.round(mcqIdx / tot * 100);

  var h = '<div class="mcqprog">'
    + '<div class="mcqbar"><div class="mcqfill" style="width:' + pct + '%"></div></div>'
    + '<span style="font-size:var(--sm);font-weight:700;color:#888">' + (mcqIdx + 1) + ' / ' + tot + '</span>'
    + '</div>'
    + '<div class="mcqcard">'
    + '<div style="font-size:3rem;text-align:center;margin-bottom:10px">' + p.e + '</div>'
    + '<div style="font-size:var(--lg);font-weight:900;color:#333;text-align:center;margin-bottom:16px" onclick="spk(\'' + p.q.replace(/'/g,"\\'") + '\')" style="cursor:pointer">' + p.q + '</div>'
    + '<div class="mcqopts">'
    + p.o.map(function(o, i) {
        return '<button class="mcqopt" id="mO' + i + '" onclick="chkMCQ(this,' + i + ',' + p.a + ')">'
          + '<span class="mcqltr">' + L[i] + '</span>' + o + '</button>';
      }).join('')
    + '</div>'
    + '<div class="rmsg" id="mcqR" style="margin:10px 0 4px"></div>'
    /* ── Prev / Next always visible ── */
    + '<div class="mcq-nav">'
    + (mcqIdx > 0 ? '<button class="prvbtn" onclick="mcqNav(-1)">&#8592; Prev</button>' : '')
    + '<button class="nxtbtn" onclick="mcqNav(1)">' + (mcqIdx < tot - 1 ? 'Next &#8594;' : 'Finish &#127937;') + '</button>'
    + '</div>'
    + '</div>';

  area.innerHTML = h;
  spk(p.q);
}

function chkMCQ(b, c, cr) {
  if (mcqAns) return;   /* already answered correctly — ignore tap */
  if (c === cr) {
    /* Correct! */
    mcqAns = true;
    b.classList.add('correct');
    mcqSc++;
    document.getElementById('mcqR').innerHTML = '&#127881; Correct!';
    spk('Correct! Well done!');
  } else {
    /* Wrong — just say so, NO reveal */
    b.classList.add('wrong');
    document.getElementById('mcqR').innerHTML = '&#10060; Wrong! Try again!';
    spk('Wrong! Try again!');
    setTimeout(function() {
      b.classList.remove('wrong');
      var r = document.getElementById('mcqR');
      if (r) r.innerHTML = '';
    }, 900);
  }
}

function mcqNav(dir) {
  mcqIdx += dir;
  mcqAns = false;
  buildMCQ();
}
</script>
