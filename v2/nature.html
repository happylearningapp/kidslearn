<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nature World &#128062;</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="shared.js"></script>
<style>
.solgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.plncrd{background:#111;border-radius:15px;padding:11px 5px 9px;text-align:center;box-shadow:0 4px 13px rgba(0,0,0,.3);cursor:pointer;transition:transform .17s;}
.plncrd:hover{transform:scale(1.05);}
.wgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.wcrd{border-radius:18px;padding:16px 9px;text-align:center;box-shadow:0 4px 13px rgba(0,0,0,.11);cursor:pointer;transition:transform .17s;}
.wcrd:hover{transform:scale(1.04);}
</style>
</head>
<body data-page-title="&#128062; Nature World" data-page-sub="Animals, Plants &amp; Universe" data-page-gradient="linear-gradient(135deg,#43A047,#00C9A7)" data-page-back="home.html">

<div class="subbody">
  <div class="stabs">
    <button class="stab" onclick="sw('nat','animals','#43A047')"><span class="stabico">&#128062;</span>Animals</button>
    <button class="stab" onclick="sw('nat','birds','#43A047')"><span class="stabico">&#128038;</span>Birds</button>
    <button class="stab" onclick="sw('nat','fruits','#43A047')"><span class="stabico">&#127822;</span>Fruits</button>
    <button class="stab" onclick="sw('nat','vegs','#43A047')"><span class="stabico">&#129382;</span>Veggies</button>
    <button class="stab" onclick="sw('nat','weather','#43A047')"><span class="stabico">&#127782;</span>Weather</button>
    <button class="stab" onclick="sw('nat','solar','#43A047')"><span class="stabico">&#129680;</span>Solar</button>
  </div>
  <div class="submain">

    <div id="nat-animals" class="sec active">
      <div class="bigbox" style="background:#FF8E53"><div class="bigchar">&#128062;</div><div class="bigsub">Animals</div></div>
      <div class="cgrid" id="anCards"></div>
    </div>

    <div id="nat-birds" class="sec">
      <div class="bigbox" style="background:#29B6F6"><div class="bigchar">&#128038;</div><div class="bigsub">Birds</div></div>
      <div class="cgrid" id="biCards"></div>
    </div>

    <div id="nat-fruits" class="sec">
      <div class="bigbox" style="background:#FF6B6B"><div class="bigchar">&#127822;</div><div class="bigsub">Fruits</div></div>
      <div class="cgrid" id="frCards"></div>
    </div>

    <div id="nat-vegs" class="sec">
      <div class="bigbox" style="background:#43A047"><div class="bigchar">&#129382;</div><div class="bigsub">Vegetables</div></div>
      <div class="cgrid" id="veCards"></div>
    </div>

    <div id="nat-weather" class="sec">
      <div class="bigbox" style="background:#0288D1"><div class="bigchar">&#127782;</div><div class="bigsub">Weather</div></div>
      <div class="wgrid3" id="weCards"></div>
    </div>

    <div id="nat-solar" class="sec">
      <div class="bigbox" style="background:#1a1a2e"><div class="bigchar">&#127756;</div><div class="bigsub">Solar System</div></div>
      <div class="solgrid" id="solCards"></div>
    </div>

  </div>
</div>

<script>
var ANI=[["Lion","&#129409;"],["Elephant","&#128024;"],["Tiger","&#128047;"],["Giraffe","&#129426;"],["Zebra","&#129427;"],["Monkey","&#128018;"],["Bear","&#128059;"],["Wolf","&#128058;"],["Fox","&#129418;"],["Rabbit","&#128048;"],["Dog","&#128053;"],["Cat","&#128049;"],["Cow","&#128046;"],["Pig","&#128055;"],["Horse","&#128052;"],["Sheep","&#128017;"],["Goat","&#128016;"],["Deer","&#129420;"],["Panda","&#128060;"],["Koala","&#128040;"],["Frog","&#128056;"],["Turtle","&#128034;"],["Snake","&#128013;"],["Crocodile","&#128010;"],["Kangaroo","&#129432;"]];
var BRD=[["Eagle","&#129413;"],["Owl","&#129417;"],["Parrot","&#129412;"],["Penguin","&#128039;"],["Flamingo","&#129441;"],["Peacock","&#129434;"],["Swan","&#129442;"],["Duck","&#129414;"],["Chick","&#128037;"],["Rooster","&#128016;"],["Turkey","&#129427;"],["Pigeon","&#128298;"],["Crow","&#128038;"],["Sparrow","&#128038;"],["Robin","&#128038;"]];
var FRT=[["Apple","&#127822;"],["Banana","&#127820;"],["Mango","&#129389;"],["Grapes","&#127815;"],["Orange","&#127818;"],["Strawberry","&#127827;"],["Watermelon","&#127817;"],["Pineapple","&#127821;"],["Cherry","&#127826;"],["Peach","&#127825;"],["Lemon","&#127819;"],["Coconut","&#129381;"],["Kiwi","&#129381;"],["Pear","&#127824;"],["Blueberry","&#129401;"]];
var VEG=[["Carrot","&#129365;"],["Broccoli","&#129382;"],["Tomato","&#127813;"],["Corn","&#127805;"],["Onion","&#129485;"],["Potato","&#129364;"],["Eggplant","&#127814;"],["Pepper","&#127798;"],["Cucumber","&#129362;"],["Mushroom","&#127812;"],["Garlic","&#129476;"],["Pumpkin","&#127875;"],["Cabbage","&#129382;"],["Peas","&#129477;"],["Avocado","&#129361;"]];
var WTH=[{n:"Sunny",e:"&#9728;",bg:"#FDD835",t:"#333",d:"Bright and warm!",i:["&#128526;","&#127803;","&#9728;","&#127774;","&#127958;"]},{n:"Rainy",e:"&#127783;",bg:"#1E88E5",t:"#fff",d:"Get your umbrella!",i:["&#9730;","&#127752;","&#128056;","&#128167;","&#127783;"]},{n:"Cloudy",e:"&#9729;",bg:"#78909C",t:"#fff",d:"Grey skies today!",i:["&#129137;","&#127787;","&#128038;","&#9729;","&#127746;"]},{n:"Windy",e:"&#128168;",bg:"#4DD0E1",t:"#333",d:"Hold your hat!",i:["&#129473;","&#127811;","&#128168;","&#129523;","&#127752;"]},{n:"Snowy",e:"&#10052;",bg:"#B3E5FC",t:"#333",d:"Bundle up warm!",i:["&#9923;","&#128752;","&#129510;","&#129523;","&#9968;"]},{n:"Stormy",e:"&#9928;",bg:"#37474F",t:"#fff",d:"Stay indoors!",i:["&#9889;","&#127754;","&#127752;","&#127968;","&#9926;"]}];
var SOL=[{n:"Sun",e:"&#9728;",c:"#FDD835",f:"Our star!"},{n:"Mercury",e:"&#129298;",c:"#9E9E9E",f:"Closest to Sun"},{n:"Venus",e:"&#127775;",c:"#FFA000",f:"Hottest planet"},{n:"Earth",e:"&#127757;",c:"#1E88E5",f:"Our home!"},{n:"Moon",e:"&#127765;",c:"#CFD8DC",f:"Earth's moon"},{n:"Mars",e:"&#128308;",c:"#E53935",f:"Red planet"},{n:"Jupiter",e:"&#129684;",c:"#795548",f:"Largest planet"},{n:"Saturn",e:"&#129680;",c:"#F9A825",f:"Has rings!"},{n:"Uranus",e:"&#128309;",c:"#00BCD4",f:"Spins sideways"},{n:"Neptune",e:"&#128153;",c:"#1565C0",f:"Farthest planet"}];

document.addEventListener('DOMContentLoaded',function(){
  sg(ANI,'#FF8E53','anCards');
  sg(BRD,'#29B6F6','biCards');
  sg(FRT,'#FF6B6B','frCards');
  sg(VEG,'#43A047','veCards');
  document.getElementById('weCards').innerHTML=WTH.map(function(w){
    return '<div class="wcrd" style="background:'+w.bg+'" onclick="spk(\''+w.n+'\')">'
      +'<span style="font-size:2.4rem;display:block;margin-bottom:4px">'+w.e+'</span>'
      +'<div style="font-size:var(--md);font-weight:700;color:'+w.t+'">'+w.n+'</div>'
      +'<div style="font-size:var(--sm);color:'+w.t+'">'+w.d+'</div>'
      +'<div style="margin-top:6px;font-size:1.2rem">'+w.i.join(' ')+'</div></div>';
  }).join('');
  document.getElementById('solCards').innerHTML=SOL.map(function(p){
    return '<div class="plncrd" onclick="spk(\''+p.n+'. '+p.f+'\')">'
      +'<span style="font-size:2rem;display:block;margin-bottom:3px">'+p.e+'</span>'
      +'<div style="font-size:calc(var(--b)*.66);font-weight:700;color:'+p.c+'">'+p.n+'</div>'
      +'<div style="font-size:.58rem;color:#aaa;margin-top:1px">'+p.f+'</div></div>';
  }).join('');
  var f=document.querySelector('.stab');
  if(f){f.classList.add('active');f.style.background='#43A047';f.style.color='#fff';}
});
</script>
</body>
</html>
