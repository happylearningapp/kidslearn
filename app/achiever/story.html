<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Story Builder &#128214;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="data.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(90px + env(safe-area-inset-bottom))!important;overflow-y:auto;}
#sdrawer{top:66px!important;}

.story-dock{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);display:grid;grid-template-columns:repeat(4,1fr);padding:5px 3px calc(5px + env(safe-area-inset-bottom));gap:3px;}
.story-dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 2px 4px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-family:var(--f);font-size:.46rem;font-weight:800;cursor:pointer;line-height:1.2;transition:all .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;}
.story-dock-btn.active{color:#fff;transform:scale(1.05);}
.story-dock-btn .dock-ico{font-size:.95rem;line-height:1;}
.story-dock-btn[data-tab="read"].active    {background:linear-gradient(135deg,#880E4F,#E91E63);}
.story-dock-btn[data-tab="sequence"].active{background:linear-gradient(135deg,#E65100,#FF9800);}
.story-dock-btn[data-tab="fill"].active    {background:linear-gradient(135deg,#1565C0,#42A5F5);}
.story-dock-btn[data-tab="moral"].active   {background:linear-gradient(135deg,#2E7D32,#66BB6A);}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1);opacity:1}}
.ibox{background:#fff;border-radius:20px;padding:16px;box-shadow:0 5px 20px rgba(0,0,0,.10);margin-bottom:14px;}
.iq{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:14px;text-align:center;line-height:1.4;}
.rmsg{min-height:22px;text-align:center;font-size:.85rem;font-weight:900;color:#4CAF50;margin-bottom:8px;}
.scorebar{background:#f7f7f7;border-radius:12px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#666;margin-bottom:10px;}
.scorescreen{text-align:center;padding:30px 20px;}
.rbtn{padding:13px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#880E4F,#E91E63);color:#fff;font-family:var(--f);font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s;}
.rbtn:active{transform:scale(.96);}
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto 14px;}
.mcq-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:700;font-size:.88rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;width:100%;box-sizing:border-box;}
.mcq-opt:hover{transform:scale(1.03);}
.mcq-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.mcq-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* Story selector */
.story-sel{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.story-sel-btn{padding:8px 14px;border-radius:14px;border:2px solid #880E4F;background:#fff;color:#880E4F;font-family:var(--f);font-size:.78rem;font-weight:900;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.story-sel-btn.active{background:#880E4F;color:#fff;}

/* Story text */
.story-text-box{background:#FFF8E1;border-radius:16px;padding:16px;margin-bottom:14px;white-space:pre-line;font-size:.85rem;line-height:1.7;color:#333;border-left:4px solid #E91E63;}
.story-q-badge{display:inline-block;background:#880E4F;color:#fff;border-radius:8px;padding:2px 10px;font-size:.65rem;font-weight:900;margin-bottom:8px;}

/* Sequence steps */
.seq-step{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.seq-step.selected{border-color:#4CAF50;background:#E8F5E9;}
.seq-step.wrong{border-color:#FF6B6B;background:#FFEBEE;animation:shake .4s ease;}
.seq-step .step-em{font-size:1.8rem;}
.seq-step .step-text{font-size:.82rem;font-weight:700;color:#333;flex:1;}
.seq-step .step-num{width:28px;height:28px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;color:#999;}
.seq-step.selected .step-num{background:#4CAF50;color:#fff;}

/* Moral card */
.moral-card{background:linear-gradient(135deg,#1B5E20,#4CAF50);border-radius:18px;padding:18px;color:#fff;margin-bottom:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s;}
.moral-card:active{transform:scale(.97);}
.moral-title{font-size:.9rem;font-weight:900;margin-bottom:6px;opacity:.85;}
.moral-text{font-size:1rem;font-weight:900;margin-bottom:6px;}
.moral-lesson{font-size:.75rem;opacity:.85;line-height:1.4;}

/* Fill blank */
.fill-sentence{font-size:1.1rem;font-weight:700;color:#333;text-align:center;background:#E3F2FD;border-radius:14px;padding:16px;margin-bottom:16px;line-height:1.7;}
.fill-blank{font-size:1.1rem;font-weight:900;color:#1565C0;background:#fff;border:2px dashed #1565C0;border-radius:8px;padding:2px 10px;display:inline-block;}
</style>
</head>
<body data-page-title="&#128214; Story Builder" data-page-sub="Read &amp; Understand" data-page-gradient="linear-gradient(135deg,#880E4F,#E91E63)" data-page-back="../home.html">

<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML='<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'
    +'<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'
    +'<div class="hdr-right">'
    +'<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'
    +'<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'
    +'</div>';
})();</script>

<div class="subbody">
  <div class="submain" id="storyMain"></div>
</div>

<nav class="story-dock">
  <button class="story-dock-btn" data-tab="read"     onclick="showStory('read')">    <span class="dock-ico">&#128218;</span>Stories</button>
  <button class="story-dock-btn" data-tab="sequence" onclick="showStory('sequence')"><span class="dock-ico">&#128257;</span>Sequence</button>
  <button class="story-dock-btn" data-tab="fill"     onclick="showStory('fill')">    <span class="dock-ico">&#9999;</span>Fill Blank</button>
  <button class="story-dock-btn" data-tab="moral"    onclick="showStory('moral')">   <span class="dock-ico">&#128161;</span>Moral</button>
</nav>

<script>
/* ── STATE ── */
var curStoryIdx=0,curQIdx=0,storyQAns=false;
var seqScenIdx=0,seqTapNext=0,seqShuf=[];
var fillOrder=FILL_BLANK_DATA.map(function(_,i){return i;}),fillIdx=0,fillSc=0,fillAns=false;
var _nextFn=null;
function nextStory(){if(_nextFn)_nextFn();}

/* ── ROUTER ── */
var STORY_HEADERS={
  read:    {bg:'linear-gradient(135deg,#880E4F,#E91E63)',em:'&#128218;',title:'Stories'},
  sequence:{bg:'linear-gradient(135deg,#E65100,#FF9800)',em:'&#128257;',title:'Put in Order'},
  fill:    {bg:'linear-gradient(135deg,#1565C0,#42A5F5)',em:'&#9999;',title:'Fill the Blank'},
  moral:   {bg:'linear-gradient(135deg,#2E7D32,#66BB6A)',em:'&#128161;',title:'Life Lessons'}
};

var currentStoryTab='read';
var storyShufOn=false;

function showStory(name){
  window.speechSynthesis.cancel();
  currentStoryTab=name;
  storyShufOn=false;
  document.querySelectorAll('.story-dock-btn').forEach(function(b){b.classList.remove('active');b.style.background='';});
  var btn=document.querySelector('.story-dock-btn[data-tab="'+name+'"]');
  if(btn){btn.classList.add('active');var h=STORY_HEADERS[name];if(h)btn.style.background=h.bg;}
  var shufRowHTML=name==='fill'
    ?'<div class="shuf-row"><button class="shuf-toggle" id="storyShufBtn" onclick="toggleStoryShuf()">&#128256; Shuffle OFF</button></div>'
    :'';
  document.getElementById('storyMain').innerHTML=shufRowHTML+'<div id="storyArea"></div>';
  resetStory(name);
  ({read:buildRead,sequence:buildSequence,fill:buildFill,moral:buildMoral})[name]();
}

function toggleStoryShuf(){
  storyShufOn=!storyShufOn;
  var btn=document.getElementById('storyShufBtn');
  if(btn){btn.classList.toggle('on',storyShufOn);btn.innerHTML='&#128256; Shuffle '+(storyShufOn?'ON':'OFF');}
  resetStory(currentStoryTab);
  if(storyShufOn){fillOrder.sort(function(){return Math.random()-.5;});}
  buildFill();
}

function resetStory(name){
  if(name==='read')    {curStoryIdx=0;curQIdx=0;storyQAns=false;}
  if(name==='sequence'){seqScenIdx=0;seqTapNext=0;seqShuf=[];}
  if(name==='fill')    {fillOrder=FILL_BLANK_DATA.map(function(_,i){return i;});fillIdx=0;fillSc=0;fillAns=false;}
}
function getArea(){return document.getElementById('storyArea');}
function scoreH(cur,tot,sc){return '<div class="scorebar">Q <b>'+cur+'</b>/'+tot+' &nbsp;&#183;&nbsp; Score: <b>'+sc+'</b></div>';}
function navBtns(prevFn,showNext){
  return '<div class="nav-row">'
    +(prevFn?'<button class="prvbtn" onclick="'+prevFn+'">&#8592; Prev</button>':'')
    +(showNext
      ?'<button class="nxtbtn" id="nxtBtn" onclick="nextStory()">Next &#8594;</button>'
      :'<button class="nxtbtn" id="nxtBtn" style="display:none" onclick="nextStory()">Next &#8594;</button>')
    +'</div>';
}
function showNxt(){var b=document.getElementById('nxtBtn');if(b)b.style.display='inline-block';}
function wrongFlash(el,msgId){el.classList.add('wrong');spk('Try again!');setTimeout(function(){el.classList.remove('wrong');if(msgId)document.getElementById(msgId).innerHTML='';},900);}
function scoreScrn(sc,tot,great,ok,gameId){
  var pct=Math.round(sc/tot*100);
  getArea().innerHTML='<div class="scorescreen">'
    +'<div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div>'
    +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+sc+' / '+tot+'</div>'
    +'<div style="color:#777;margin-bottom:16px">'+(pct>=80?great:pct>=50?ok:'Keep practising!')+'</div>'
    +'<button class="rbtn" onclick="showStory(\''+gameId+'\')">Play Again &#128257;</button></div>';
  spk(pct>=80?great:ok);
}
function shufBar(fn){return '<div style="text-align:right;margin-bottom:8px"><button class="shufbtn" onclick="'+fn+'">&#128256; Shuffle</button></div>';}

/* ── READ STORIES ── */
function buildRead(){
  _nextFn=null;
  var s=STORIES_DATA[curStoryIdx];
  // Story selector
  var selHTML='<div class="story-sel">';
  STORIES_DATA.forEach(function(st,i){
    selHTML+='<button class="story-sel-btn'+(i===curStoryIdx?' active':'')+'" onclick="curStoryIdx='+i+';curQIdx=0;storyQAns=false;buildRead()">'+st.em+' '+st.title+'</button>';
  });
  selHTML+='</div>';
  var qSection='';
  if(curQIdx<s.questions.length){
    var q=s.questions[curQIdx];
    var opts=q.opts.slice().sort(function(){return Math.random()-.5;});
    var ci=opts.indexOf(q.opts[q.a]);
    var optsHTML=opts.map(function(o,i){
      return '<div class="mcq-opt" id="sqopt'+i+'" onclick="chkStoryQ('+i+','+ci+')">'+o+'</div>';
    }).join('');
    qSection='<div class="ibox">'
      +'<div class="story-q-badge">&#10067; Question '+(curQIdx+1)+' / '+s.questions.length+'</div>'
      +'<div class="iq">'+q.q+'</div>'
      +'<div class="mcq-grid">'+optsHTML+'</div>'
      +'<div class="rmsg" id="sqR"></div>'
      +'<div class="nav-row">'
      +(curQIdx>0?'<button class="prvbtn" onclick="curQIdx--;storyQAns=false;buildRead()">&#8592; Prev</button>':'')
      +'<button class="nxtbtn" id="nxtBtn" style="display:none" onclick="curQIdx++;storyQAns=false;buildRead()">Next &#8594;</button>'
      +'</div></div>';
  } else {
    qSection='<div class="scorescreen">'
      +'<div style="font-size:4rem">&#127942;&#127942;&#127942;</div>'
      +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:8px">Story Done!</div>'
      +'<div style="color:#777;margin-bottom:16px">Great reading! Try the next story.</div>'
      +'<button class="rbtn" onclick="curQIdx=0;storyQAns=false;buildRead()">Read Again &#128257;</button>'
      +'</div>';
  }
  getArea().innerHTML=selHTML
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;cursor:pointer;margin-bottom:8px" onclick="spk(\''+s.title+'\')">'+s.em+'</div>'
    +'<div style="text-align:center;font-size:1.1rem;font-weight:900;color:#880E4F;margin-bottom:10px">'+s.title+'</div>'
    +'<div class="story-text-box">'+s.text+'</div>'
    +'<button style="width:100%;padding:10px;border-radius:14px;border:none;background:linear-gradient(135deg,#880E4F,#E91E63);color:#fff;font-family:var(--f);font-size:.88rem;font-weight:900;cursor:pointer;margin-bottom:0;" onclick="spk(\''+s.text.replace(/\n/g,' ').replace(/'/g,'').substring(0,200)+'\')">&#128266; Read Aloud</button>'
    +'</div>'
    +qSection;
}
function chkStoryQ(i,ci){
  if(storyQAns)return;
  var s=STORIES_DATA[curStoryIdx];
  var q=s.questions[curQIdx];
  var el=document.getElementById('sqopt'+i);
  if(i===ci){
    storyQAns=true;
    el.classList.add('correct');
    document.getElementById('sqR').innerHTML='&#11088; '+q.opts[q.a]+'!';
    spk('Correct! '+q.opts[q.a]+'!');
    var nb=document.getElementById('nxtBtn');if(nb)nb.style.display='inline-block';
  }else{wrongFlash(el,'sqR');}
}

/* ── SEQUENCE ── */
function buildSequence(){
  _nextFn=function(){seqScenIdx++;seqTapNext=0;buildSequence();};
  if(seqScenIdx>=SEQUENCE_DATA.length){seqScenIdx=0;seqTapNext=0;buildSequence();return;}
  var s=SEQUENCE_DATA[seqScenIdx];
  // Shuffle steps
  seqShuf=s.steps.map(function(_,i){return i;}).sort(function(){return Math.random()-.5;});
  seqTapNext=0;
  renderSequence();
}
function renderSequence(){
  var s=SEQUENCE_DATA[seqScenIdx];
  var stepsHTML='';
  seqShuf.forEach(function(origIdx,dispIdx){
    var step=s.steps[origIdx];
    var done=false;
    // a step is "done" if it's already been tapped correctly
    // We track this via class — check document state on re-render isn't possible
    // Use seqDone array
    stepsHTML+='<div class="seq-step" id="seqstep'+dispIdx+'" onclick="chkSeqStep('+dispIdx+','+origIdx+')">'
      +'<span class="step-em">'+step.em+'</span>'
      +'<span class="step-text">'+step.text+'</span>'
      +'<span class="step-num" id="seqnum'+dispIdx+'">'+((seqDone&&seqDone[origIdx])?(seqDoneOrder.indexOf(origIdx)+1):' ')+'</span>'
      +'</div>';
  });
  var selHTML='<div class="story-sel" style="margin-bottom:14px">';
  SEQUENCE_DATA.forEach(function(sc,i){
    selHTML+='<button class="story-sel-btn'+(i===seqScenIdx?' active':'')+'" onclick="seqScenIdx='+i+';seqTapNext=0;seqDone=[];seqDoneOrder=[];buildSequence()">'+sc.em+'</button>';
  });
  selHTML+='</div>';
  getArea().innerHTML=selHTML
    +'<div class="ibox">'
    +'<div class="iq">&#128257; Put the steps in order! Tap 1, 2, 3...</div>'
    +'<div style="text-align:center;font-size:1.1rem;font-weight:900;color:#E65100;margin-bottom:12px">'+s.em+' '+s.title+'</div>'
    +stepsHTML
    +'<div class="rmsg" id="seqR"></div>'
    +'</div>'
    +navBtns(seqScenIdx>0?'seqScenIdx--;seqTapNext=0;seqDone=[];seqDoneOrder=[];buildSequence()':'',seqTapNext>=s.steps.length);
}
var seqDone=[],seqDoneOrder=[];
function chkSeqStep(dispIdx,origIdx){
  var s=SEQUENCE_DATA[seqScenIdx];
  if(seqDone[origIdx])return; // already tapped
  if(origIdx===seqTapNext){
    seqDone[origIdx]=true;
    seqDoneOrder.push(origIdx);
    seqTapNext++;
    var el=document.getElementById('seqstep'+dispIdx);
    if(el){el.classList.add('selected');el.style.pointerEvents='none';}
    var nm=document.getElementById('seqnum'+dispIdx);
    if(nm){nm.textContent=seqTapNext;nm.style.background='#4CAF50';nm.style.color='#fff';}
    spk(s.steps[origIdx].text);
    if(seqTapNext>=s.steps.length){
      document.getElementById('seqR').innerHTML='&#11088; Perfect order!';
      spk('Perfect! You got the right order!');
      showNxt();
      _nextFn=function(){seqScenIdx++;seqTapNext=0;seqDone=[];seqDoneOrder=[];buildSequence();};
    }
  } else {
    var el2=document.getElementById('seqstep'+dispIdx);
    if(el2){el2.classList.add('wrong');spk('Try again! Tap step '+(seqTapNext+1)+' first!');setTimeout(function(){el2.classList.remove('wrong');},900);}
  }
}

/* ── FILL BLANK ── */
function shuffleFill(){fillOrder.sort(function(){return Math.random()-.5;});fillIdx=0;fillSc=0;fillAns=false;buildFill();}
function buildFill(){
  _nextFn=function(){fillIdx++;fillAns=false;buildFill();};
  if(fillIdx>=FILL_BLANK_DATA.length){scoreScrn(fillSc,FILL_BLANK_DATA.length,'Fill Master!','Good sentences!','fill');return;}
  var p=FILL_BLANK_DATA[fillOrder[fillIdx]];
  fillAns=false;
  var sentDisplay=p.sentence.replace('___','<span class="fill-blank">___</span>');
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.answer);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="flopt'+i+'" onclick="chkFill('+i+','+ci+',\''+p.answer+'\')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(fillIdx+1,FILL_BLANK_DATA.length,fillSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="fill-sentence">'+sentDisplay+'</div>'
    +'<div class="iq">Choose the correct word!</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="flR"></div>'
    +navBtns(fillIdx>0?'fillIdx--;fillAns=false;buildFill()':'',false)
    +'</div>';
  spk(p.sentence.replace('___','blank'));
}
function chkFill(i,ci,answer){
  if(fillAns)return;
  var el=document.getElementById('flopt'+i);
  if(i===ci){
    fillAns=true;fillSc++;
    el.classList.add('correct');
    document.getElementById('flR').innerHTML='&#11088; '+answer+'!';
    spk('Correct! The answer is '+answer+'!');showNxt();
  }else{wrongFlash(el,'flR');}
}

/* ── MORAL STORIES ── */
function buildMoral(){
  _nextFn=null;
  var html='<div class="ibox"><div class="iq">&#128161; Life Lessons from Stories</div>';
  MORAL_STORIES.forEach(function(m){
    html+='<div class="moral-card" onclick="spk(\''+m.title.replace(/'/g,'')+'. Moral: '+m.moral.replace(/'/g,'')+'. '+m.lesson.replace(/'/g,'')+'\')"><div class="moral-title">'+m.em+' '+m.title+'</div><div class="moral-text">&#128161; '+m.moral+'</div><div class="moral-lesson">'+m.lesson+'</div></div>';
  });
  html+='<div class="rmsg">&#128266; Tap each card to hear the moral</div></div>';
  getArea().innerHTML=html;
}

document.addEventListener('DOMContentLoaded',function(){showStory('read');});
</script>
</body>
</html>
