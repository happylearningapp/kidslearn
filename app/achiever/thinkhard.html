<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Think Hard! &#129504;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="data.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(90px + env(safe-area-inset-bottom))!important;overflow-y:auto;}
#sdrawer{top:66px!important;}

.think-dock{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);display:grid;grid-template-columns:repeat(5,1fr);padding:5px 3px calc(5px + env(safe-area-inset-bottom));gap:3px;}
.think-dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 2px 4px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-family:var(--f);font-size:.44rem;font-weight:800;cursor:pointer;line-height:1.2;transition:all .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;}
.think-dock-btn.active{color:#fff;transform:scale(1.05);}
.think-dock-btn .dock-ico{font-size:.9rem;line-height:1;}
.think-dock-btn[data-tab="analogy"].active  {background:linear-gradient(135deg,#4A148C,#7B1FA2);}
.think-dock-btn[data-tab="patterns"].active {background:linear-gradient(135deg,#1565C0,#42A5F5);}
.think-dock-btn[data-tab="wordpuzz"].active {background:linear-gradient(135deg,#E65100,#FF9800);}
.think-dock-btn[data-tab="logic"].active    {background:linear-gradient(135deg,#00695C,#26A69A);}
.think-dock-btn[data-tab="riddles"].active  {background:linear-gradient(135deg,#AD1457,#F06292);}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1);opacity:1}}
.ibox{background:#fff;border-radius:20px;padding:16px;box-shadow:0 5px 20px rgba(0,0,0,.10);margin-bottom:14px;}
.iq{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:14px;text-align:center;line-height:1.4;}
.rmsg{min-height:22px;text-align:center;font-size:.85rem;font-weight:900;color:#4CAF50;margin-bottom:8px;}
.scorebar{background:#f7f7f7;border-radius:12px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#666;margin-bottom:10px;}
.scorescreen{text-align:center;padding:30px 20px;}
.rbtn{padding:13px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#4A148C,#7B1FA2);color:#fff;font-family:var(--f);font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s;}
.rbtn:active{transform:scale(.96);}
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto 14px;}
.mcq-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:700;font-size:.88rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;width:100%;box-sizing:border-box;}
.mcq-opt:hover{transform:scale(1.03);}
.mcq-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.mcq-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* Pattern sequence */
.pat-seq{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.pat-item{background:#f5f5f5;border-radius:12px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#333;min-width:50px;text-align:center;}
.pat-arrow{font-size:1.2rem;color:#aaa;}
.pat-blank{background:#E8F5E9;border:3px dashed #4CAF50;border-radius:12px;padding:8px 14px;font-size:1.4rem;font-weight:900;color:#4CAF50;min-width:50px;text-align:center;}

/* Word puzzle */
.scramble-display{font-size:1.8rem;font-weight:900;color:#E65100;letter-spacing:6px;text-align:center;background:#FFF3E0;border-radius:14px;padding:14px;margin-bottom:10px;}
.scramble-hint{background:#f5f5f5;border-radius:12px;padding:10px;text-align:center;margin-bottom:12px;font-size:.82rem;color:#555;font-weight:700;}

/* Riddle */
.riddle-card{background:linear-gradient(135deg,#880E4F,#E91E63);border-radius:20px;padding:20px;color:#fff;text-align:center;margin-bottom:16px;}
.riddle-em{font-size:3rem;display:block;margin-bottom:8px;}
.riddle-text{font-size:.9rem;line-height:1.5;font-weight:700;}
</style>
</head>
<body data-page-title="&#129504; Think Hard!" data-page-sub="Logic &amp; Analogies" data-page-gradient="linear-gradient(135deg,#4A148C,#7B1FA2)" data-page-back="../home.html">

<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML='<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'
    +'<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'
    +'<div class="hdr-right">'
    +'<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'
    +'<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'
    +'</div>';
})();</script>

<div class="subbody">
  <div class="submain" id="thinkMain"></div>
</div>

<nav class="think-dock">
  <button class="think-dock-btn" data-tab="analogy"  onclick="showThink('analogy')"> <span class="dock-ico">&#128279;</span>Analogy</button>
  <button class="think-dock-btn" data-tab="patterns" onclick="showThink('patterns')"><span class="dock-ico">&#128290;</span>Patterns</button>
  <button class="think-dock-btn" data-tab="wordpuzz" onclick="showThink('wordpuzz')"><span class="dock-ico">&#128292;</span>Word Puzz</button>
  <button class="think-dock-btn" data-tab="logic"    onclick="showThink('logic')">   <span class="dock-ico">&#129504;</span>Logic</button>
  <button class="think-dock-btn" data-tab="riddles"  onclick="showThink('riddles')"> <span class="dock-ico">&#127917;</span>Riddles</button>
</nav>

<script>
/* ── STATE ── */
var anOrder=ANALOGY_DATA.map(function(_,i){return i;}),anIdx=0,anSc=0,anAns=false;
var patOrder=NUMBER_PATTERNS.map(function(_,i){return i;}),patIdx=0,patSc=0,patAns=false;
var wpOrder=WORD_PUZZLES.map(function(_,i){return i;}),wpIdx=0,wpSc=0,wpAns=false;
var lgOrder=LOGIC_PUZZLES.map(function(_,i){return i;}),lgIdx=0,lgSc=0,lgAns=false;
var rdOrder=BRAIN_TEASERS.map(function(_,i){return i;}),rdIdx=0,rdSc=0,rdAns=false;
var _nextFn=null;
function nextThink(){if(_nextFn)_nextFn();}

/* ── ROUTER ── */
var THINK_HEADERS={
  analogy: {bg:'linear-gradient(135deg,#4A148C,#7B1FA2)',em:'&#128279;',title:'Analogy'},
  patterns:{bg:'linear-gradient(135deg,#1565C0,#42A5F5)',em:'&#128290;',title:'Number Patterns'},
  wordpuzz:{bg:'linear-gradient(135deg,#E65100,#FF9800)',em:'&#128292;',title:'Word Puzzles'},
  logic:   {bg:'linear-gradient(135deg,#00695C,#26A69A)',em:'&#129504;',title:'Logic'},
  riddles: {bg:'linear-gradient(135deg,#AD1457,#F06292)',em:'&#127917;',title:'Riddles'}
};

var currentThinkTab='analogy';
var thinkShufOn=false;

function showThink(name){
  window.speechSynthesis.cancel();
  currentThinkTab=name;
  thinkShufOn=false;
  document.querySelectorAll('.think-dock-btn').forEach(function(b){b.classList.remove('active');b.style.background='';});
  var btn=document.querySelector('.think-dock-btn[data-tab="'+name+'"]');
  if(btn){btn.classList.add('active');var h=THINK_HEADERS[name];if(h)btn.style.background=h.bg;}
  document.getElementById('thinkMain').innerHTML=
    '<div class="shuf-row"><button class="shuf-toggle" id="thinkShufBtn" onclick="toggleThinkShuf()">&#128256; Shuffle OFF</button></div>'
    +'<div id="thinkArea"></div>';
  resetThink(name);
  ({analogy:buildAnalogy,patterns:buildPatterns,wordpuzz:buildWordPuzz,logic:buildLogic,riddles:buildRiddles})[name]();
}

function toggleThinkShuf(){
  thinkShufOn=!thinkShufOn;
  var btn=document.getElementById('thinkShufBtn');
  if(btn){btn.classList.toggle('on',thinkShufOn);btn.innerHTML='&#128256; Shuffle '+(thinkShufOn?'ON':'OFF');}
  resetThink(currentThinkTab);
  if(thinkShufOn){
    var ord=currentThinkTab==='analogy'?anOrder:currentThinkTab==='patterns'?patOrder:currentThinkTab==='wordpuzz'?wpOrder:currentThinkTab==='logic'?lgOrder:rdOrder;
    ord.sort(function(){return Math.random()-.5;});
  }
  ({analogy:buildAnalogy,patterns:buildPatterns,wordpuzz:buildWordPuzz,logic:buildLogic,riddles:buildRiddles})[currentThinkTab]();
}

function resetThink(name){
  if(name==='analogy') {anOrder=ANALOGY_DATA.map(function(_,i){return i;});anIdx=0;anSc=0;anAns=false;}
  if(name==='patterns'){patOrder=NUMBER_PATTERNS.map(function(_,i){return i;});patIdx=0;patSc=0;patAns=false;}
  if(name==='wordpuzz'){wpOrder=WORD_PUZZLES.map(function(_,i){return i;});wpIdx=0;wpSc=0;wpAns=false;}
  if(name==='logic')   {lgOrder=LOGIC_PUZZLES.map(function(_,i){return i;});lgIdx=0;lgSc=0;lgAns=false;}
  if(name==='riddles') {rdOrder=BRAIN_TEASERS.map(function(_,i){return i;});rdIdx=0;rdSc=0;rdAns=false;}
}
function getArea(){return document.getElementById('thinkArea');}
function scoreH(cur,tot,sc){return '<div class="scorebar">Q <b>'+cur+'</b>/'+tot+' &nbsp;&#183;&nbsp; Score: <b>'+sc+'</b></div>';}
function navBtns(prevFn,showNext){
  return '<div class="nav-row">'
    +(prevFn?'<button class="prvbtn" onclick="'+prevFn+'">&#8592; Prev</button>':'')
    +(showNext
      ?'<button class="nxtbtn" id="nxtBtn" onclick="nextThink()">Next &#8594;</button>'
      :'<button class="nxtbtn" id="nxtBtn" style="display:none" onclick="nextThink()">Next &#8594;</button>')
    +'</div>';
}
function showNxt(){var b=document.getElementById('nxtBtn');if(b)b.style.display='inline-block';}
function wrongFlash(el,msgId){el.classList.add('wrong');spk('Try again!');setTimeout(function(){el.classList.remove('wrong');if(msgId)document.getElementById(msgId).innerHTML='';},900);}
function scoreScrn(sc,tot,great,ok,gameId){
  var pct=Math.round(sc/tot*100);
  getArea().innerHTML='<div class="scorescreen">'
    +'<div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div>'
    +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+sc+' / '+tot+'</div>'
    +'<div style="color:#777;margin-bottom:16px">'+(pct>=80?great:pct>=50?ok:'Keep practising!')+'</div>'
    +'<button class="rbtn" onclick="showThink(\''+gameId+'\')">Play Again &#128257;</button></div>';
  spk(pct>=80?great:ok);
}
function shufBar(fn){return '<div style="text-align:right;margin-bottom:8px"><button class="shufbtn" onclick="'+fn+'">&#128256; Shuffle</button></div>';}

/* ── ANALOGY ── */
function shuffleAnalogy(){anOrder.sort(function(){return Math.random()-.5;});anIdx=0;anSc=0;anAns=false;buildAnalogy();}
function buildAnalogy(){
  _nextFn=function(){anIdx++;anAns=false;buildAnalogy();};
  if(anIdx>=ANALOGY_DATA.length){scoreScrn(anSc,ANALOGY_DATA.length,'Analogy Ace!','Good thinking!','analogy');return;}
  var p=ANALOGY_DATA[anOrder[anIdx]];
  anAns=false;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.opts[p.a]);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="anopt'+i+'" onclick="chkAnalogy('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(anIdx+1,ANALOGY_DATA.length,anSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="anR"></div>'
    +navBtns(anIdx>0?'anIdx--;anAns=false;buildAnalogy()':'',false)
    +'</div>';
  spk(p.q);
}
function chkAnalogy(i,ci){
  if(anAns)return;
  var p=ANALOGY_DATA[anOrder[anIdx]];
  var el=document.getElementById('anopt'+i);
  if(i===ci){
    anAns=true;anSc++;
    el.classList.add('correct');
    document.getElementById('anR').innerHTML='&#11088; '+p.opts[p.a]+'!';
    spk('Correct! '+p.opts[p.a]+'!');showNxt();
  }else{wrongFlash(el,'anR');}
}

/* ── NUMBER PATTERNS ── */
function shufflePatterns(){patOrder.sort(function(){return Math.random()-.5;});patIdx=0;patSc=0;patAns=false;buildPatterns();}
function buildPatterns(){
  _nextFn=function(){patIdx++;patAns=false;buildPatterns();};
  if(patIdx>=NUMBER_PATTERNS.length){scoreScrn(patSc,NUMBER_PATTERNS.length,'Pattern Pro!','Good patterns!','patterns');return;}
  var p=NUMBER_PATTERNS[patOrder[patIdx]];
  patAns=false;
  var seqHTML='<div class="pat-seq">';
  p.seq.forEach(function(n){
    seqHTML+='<span class="pat-item">'+n+'</span><span class="pat-arrow">&#8594;</span>';
  });
  seqHTML+='<span class="pat-blank">?</span></div>';
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.next);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="patopt'+i+'" onclick="chkPattern('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(patIdx+1,NUMBER_PATTERNS.length,patSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="iq">What comes next?</div>'
    +seqHTML
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="patR"></div>'
    +navBtns(patIdx>0?'patIdx--;patAns=false;buildPatterns()':'',false)
    +'</div>';
  spk('What comes next? '+p.seq.join(', ')+', question mark. Hint: '+p.hint);
}
function chkPattern(i,ci){
  if(patAns)return;
  var p=NUMBER_PATTERNS[patOrder[patIdx]];
  var el=document.getElementById('patopt'+i);
  if(i===ci){
    patAns=true;patSc++;
    el.classList.add('correct');
    document.getElementById('patR').innerHTML='&#11088; '+p.next+'! '+p.hint;
    spk('Correct! '+p.next+'! '+p.hint);showNxt();
  }else{wrongFlash(el,'patR');}
}

/* ── WORD PUZZLES ── */
function shuffleWordPuzz(){wpOrder.sort(function(){return Math.random()-.5;});wpIdx=0;wpSc=0;wpAns=false;buildWordPuzz();}
function buildWordPuzz(){
  _nextFn=function(){wpIdx++;wpAns=false;buildWordPuzz();};
  if(wpIdx>=WORD_PUZZLES.length){scoreScrn(wpSc,WORD_PUZZLES.length,'Word Wizard!','Good unscrambling!','wordpuzz');return;}
  var p=WORD_PUZZLES[wpOrder[wpIdx]];
  wpAns=false;
  var pool=['CAT','STAR','EARTH','APPLE','RAINBOW','ELEPHANT','TRAIN','FLOWER','BOOK','MUSIC','HOUSE','MOON','LION','STRAWBERRY','PENCIL'];
  var opts=[p.answer];
  pool.forEach(function(w){if(w!==p.answer&&opts.length<4)opts.push(w);});
  opts.sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.answer);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="wpopt'+i+'" onclick="chkWordPuzz('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(wpIdx+1,WORD_PUZZLES.length,wpSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:3rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="scramble-hint">&#128161; Hint: '+p.hint+'</div>'
    +'<div class="scramble-display">'+p.scrambled+'</div>'
    +'<div class="iq">Unscramble to find the word!</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="wpR"></div>'
    +navBtns(wpIdx>0?'wpIdx--;wpAns=false;buildWordPuzz()':'',false)
    +'</div>';
  spk('Unscramble: '+p.scrambled.split('').join(' ')+'. Hint: '+p.hint);
}
function chkWordPuzz(i,ci){
  if(wpAns)return;
  var p=WORD_PUZZLES[wpOrder[wpIdx]];
  var el=document.getElementById('wpopt'+i);
  if(i===ci){
    wpAns=true;wpSc++;
    el.classList.add('correct');
    document.getElementById('wpR').innerHTML='&#11088; '+p.answer+'!';
    spk('Correct! The word is '+p.answer+'!');showNxt();
  }else{wrongFlash(el,'wpR');}
}

/* ── LOGIC PUZZLES ── */
function shuffleLogic(){lgOrder.sort(function(){return Math.random()-.5;});lgIdx=0;lgSc=0;lgAns=false;buildLogic();}
function buildLogic(){
  _nextFn=function(){lgIdx++;lgAns=false;buildLogic();};
  if(lgIdx>=LOGIC_PUZZLES.length){scoreScrn(lgSc,LOGIC_PUZZLES.length,'Logic Legend!','Good reasoning!','logic');return;}
  var p=LOGIC_PUZZLES[lgOrder[lgIdx]];
  lgAns=false;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.opts[p.a]);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="lgopt'+i+'" onclick="chkLogic('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(lgIdx+1,LOGIC_PUZZLES.length,lgSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="lgR"></div>'
    +navBtns(lgIdx>0?'lgIdx--;lgAns=false;buildLogic()':'',false)
    +'</div>';
  spk(p.q);
}
function chkLogic(i,ci){
  if(lgAns)return;
  var p=LOGIC_PUZZLES[lgOrder[lgIdx]];
  var el=document.getElementById('lgopt'+i);
  if(i===ci){
    lgAns=true;lgSc++;
    el.classList.add('correct');
    document.getElementById('lgR').innerHTML='&#11088; '+p.opts[p.a]+'!';
    spk('Correct! '+p.opts[p.a]+'!');showNxt();
  }else{wrongFlash(el,'lgR');}
}

/* ── RIDDLES ── */
function shuffleRiddles(){rdOrder.sort(function(){return Math.random()-.5;});rdIdx=0;rdSc=0;rdAns=false;buildRiddles();}
function buildRiddles(){
  _nextFn=function(){rdIdx++;rdAns=false;buildRiddles();};
  if(rdIdx>=BRAIN_TEASERS.length){scoreScrn(rdSc,BRAIN_TEASERS.length,'Riddle Master!','Good thinking!','riddles');return;}
  var p=BRAIN_TEASERS[rdOrder[rdIdx]];
  rdAns=false;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.opts[p.a]);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="rdopt'+i+'" onclick="chkRiddle('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(rdIdx+1,BRAIN_TEASERS.length,rdSc)
    +'<div class="riddle-card">'
    +'<span class="riddle-em">'+p.em+'</span>'
    +'<div class="riddle-text">'+p.riddle+'</div>'
    +'</div>'
    +'<div class="ibox">'
    +'<div class="iq">What am I?</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="rdR"></div>'
    +navBtns(rdIdx>0?'rdIdx--;rdAns=false;buildRiddles()':'',false)
    +'</div>';
  spk(p.riddle);
}
function chkRiddle(i,ci){
  if(rdAns)return;
  var p=BRAIN_TEASERS[rdOrder[rdIdx]];
  var el=document.getElementById('rdopt'+i);
  if(i===ci){
    rdAns=true;rdSc++;
    el.classList.add('correct');
    document.getElementById('rdR').innerHTML='&#11088; '+p.answer+'!';
    spk('Correct! I am '+p.answer+'!');showNxt();
  }else{wrongFlash(el,'rdR');}
}

document.addEventListener('DOMContentLoaded',function(){showThink('analogy');});
</script>
</body>
</html>
