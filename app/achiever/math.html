<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Magic &#10133;</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="../shared.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(110px + env(safe-area-inset-bottom))!important;overflow-y:auto;}
#sdrawer{top:66px!important;}

/* ── Bottom dock ── */
.math-dock{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:grid;grid-template-columns:repeat(6,1fr);
  padding:5px 3px calc(5px + env(safe-area-inset-bottom));gap:3px;
}
.math-dock-btn{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;padding:5px 2px 4px;border-radius:10px;
  border:none;background:#f5f5f5;color:#999;font-family:var(--f);
  font-size:.46rem;font-weight:800;cursor:pointer;line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.math-dock-btn.active{color:#fff;transform:scale(1.05);}
.math-dock-btn .dock-ico{font-size:.95rem;line-height:1;}
.math-dock-btn[data-tab="add"].active     {background:linear-gradient(135deg,#2E7D32,#66BB6A);}
.math-dock-btn[data-tab="subtract"].active{background:linear-gradient(135deg,#1565C0,#42A5F5);}
.math-dock-btn[data-tab="shapes"].active  {background:linear-gradient(135deg,#6A1B9A,#CE93D8);}
.math-dock-btn[data-tab="clock"].active   {background:linear-gradient(135deg,#E65100,#FF9800);}
.math-dock-btn[data-tab="compare"].active {background:linear-gradient(135deg,#AD1457,#F06292);}
.math-dock-btn[data-tab="countup"].active {background:linear-gradient(135deg,#00695C,#26A69A);}

/* ── Shared ── */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.ibox{background:#fff;border-radius:20px;padding:16px;box-shadow:0 5px 20px rgba(0,0,0,.10);margin-bottom:14px;}
.iq{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:14px;text-align:center;line-height:1.4;}
.rmsg{min-height:22px;text-align:center;font-size:.85rem;font-weight:900;color:#4CAF50;margin-bottom:8px;}
.scorebar{background:#f7f7f7;border-radius:12px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#666;margin-bottom:10px;}
.scorescreen{text-align:center;padding:30px 20px;}
.rbtn{padding:13px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#2E7D32,#66BB6A);color:#fff;font-family:var(--f);font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(46,125,50,.35);transition:all .2s;}
.rbtn:active{transform:scale(.96);}

/* ── Add / Subtract ── */
.math-groups{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.math-group{background:#f5f5f5;border-radius:16px;padding:12px 14px;text-align:center;min-width:80px;}
.math-group-dots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:110px;margin-bottom:6px;}
.math-dot{font-size:1.6rem;line-height:1;}
.math-group-num{font-size:1.5rem;font-weight:900;color:#333;}
.math-op{font-size:2.2rem;font-weight:900;color:#aaa;}
.math-eq{font-size:2.2rem;font-weight:900;color:#aaa;}
.math-blank{font-size:2rem;background:#e8f5e9;border:3px dashed #4CAF50;border-radius:14px;padding:10px 16px;min-width:58px;text-align:center;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.num-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;margin:0 auto 14px;}
.num-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 4px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;font-size:1.2rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.num-opt:hover{transform:scale(1.08);border-color:#2E7D32;}
.num-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.num-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── Shapes ── */
.shape-display{font-size:6rem;text-align:center;margin-bottom:8px;display:block;}
.shape-name-box{background:#f5f5f5;border-radius:14px;padding:10px 20px;text-align:center;margin-bottom:16px;}
.shape-name{font-size:1.3rem;font-weight:900;color:#333;}
.shape-fact{font-size:.75rem;color:#888;margin-top:3px;}
.shape-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:340px;margin:0 auto 14px;}
.shape-opt{background:#fff;border:3px solid #eee;border-radius:16px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;font-size:.82rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.shape-opt .shem{font-size:2.2rem;display:block;margin-bottom:4px;}
.shape-opt:hover{transform:scale(1.04);border-color:#6A1B9A;}
.shape-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.shape-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}
.shape-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.shape-tab{padding:6px 14px;border-radius:12px;border:2px solid #eee;background:#f5f5f5;font-family:var(--f);font-size:.72rem;font-weight:900;cursor:pointer;color:#888;transition:all .18s;}
.shape-tab.active{background:#6A1B9A;color:#fff;border-color:#6A1B9A;}

/* ── Clock ── */
.clock-face{width:160px;height:160px;border-radius:50%;border:8px solid #333;background:#fff;margin:0 auto 16px;position:relative;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.clock-face::before{content:'';position:absolute;top:50%;left:50%;width:10px;height:10px;background:#333;border-radius:50%;transform:translate(-50%,-50%);z-index:3;}
.clock-num{position:absolute;font-weight:900;font-size:.7rem;color:#333;}
.clock-num.n12{top:6px;left:50%;transform:translateX(-50%);}
.clock-num.n3{right:6px;top:50%;transform:translateY(-50%);}
.clock-num.n6{bottom:6px;left:50%;transform:translateX(-50%);}
.clock-num.n9{left:6px;top:50%;transform:translateY(-50%);}
.clock-hand-h{position:absolute;bottom:50%;left:50%;width:5px;border-radius:4px 4px 0 0;background:#333;transform-origin:bottom center;margin-left:-2.5px;}
.clock-hand-m{position:absolute;bottom:50%;left:50%;width:3px;border-radius:4px 4px 0 0;background:#E53935;transform-origin:bottom center;margin-left:-1.5px;}
.clock-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:320px;margin:0 auto 14px;}
.clock-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;font-size:1rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.clock-opt:hover{transform:scale(1.06);border-color:#E65100;}
.clock-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.clock-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── Compare ── */
.cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:360px;margin:0 auto 18px;}
.cmp-box{background:#fff;border:3px solid #eee;border-radius:18px;padding:16px 8px;cursor:pointer;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.cmp-box:hover{transform:scale(1.04);border-color:#AD1457;}
.cmp-box.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.cmp-box.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}
.cmp-em{font-size:2.8rem;display:block;margin-bottom:6px;}
.cmp-lbl{font-size:.7rem;font-weight:700;color:#666;}

/* ── Count Up ── */
.count-display{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:320px;margin:0 auto 18px;background:#f5f5f5;border-radius:16px;padding:14px;}
.count-em{font-size:1.8rem;line-height:1.2;}
.skip-row{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.skip-item{font-size:1.4rem;font-weight:900;color:#333;background:#f5f5f5;border-radius:12px;padding:8px 14px;min-width:52px;text-align:center;}
.skip-blank{font-size:1.4rem;font-weight:900;background:#e8f5e9;border:3px dashed #4CAF50;border-radius:12px;padding:8px 14px;min-width:52px;text-align:center;animation:blink 1.2s ease-in-out infinite;}
</style>
</head>
<body data-page-title="&#10133; Math Magic" data-page-sub="Add, Shapes &amp; Time" data-page-gradient="linear-gradient(135deg,#2E7D32,#66BB6A)" data-page-back="../home.html">

<div class="subbody">
  <div class="submain" id="mathMain">
  </div>
</div>

<nav class="math-dock">
  <button class="math-dock-btn" data-tab="add"      onclick="showMath('add')">     <span class="dock-ico">&#10133;</span>Add It!</button>
  <button class="math-dock-btn" data-tab="subtract" onclick="showMath('subtract')"><span class="dock-ico">&#10134;</span>Take Away</button>
  <button class="math-dock-btn" data-tab="shapes"   onclick="showMath('shapes')">  <span class="dock-ico">&#128314;</span>Shapes</button>
  <button class="math-dock-btn" data-tab="clock"    onclick="showMath('clock')">   <span class="dock-ico">&#128336;</span>Clock</button>
  <button class="math-dock-btn" data-tab="compare"  onclick="showMath('compare')"> <span class="dock-ico">&#9878;</span>Compare</button>
  <button class="math-dock-btn" data-tab="countup"  onclick="showMath('countup')"> <span class="dock-ico">&#128290;</span>Count Up</button>
</nav>

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */

/* ADD IT – two groups, find sum */
var ADD_DATA=[
  {a:2,b:3,em:'🍎'},{a:4,b:2,em:'⭐'},{a:3,b:5,em:'🐠'},
  {a:6,b:3,em:'🌸'},{a:5,b:4,em:'🎈'},{a:7,b:2,em:'🍭'},
  {a:1,b:8,em:'🐱'},{a:4,b:6,em:'🌙'},{a:3,b:7,em:'🦋'},
  {a:8,b:5,em:'🍕'},{a:6,b:6,em:'❤️'},{a:9,b:4,em:'🌟'},
  {a:5,b:7,em:'🐶'},{a:8,b:8,em:'🎵'},{a:7,b:6,em:'🌈'}
];

/* TAKE AWAY – total minus remove */
var SUB_DATA=[
  {total:5,rem:2,em:'🍪'},{total:8,rem:3,em:'🌸'},{total:7,rem:4,em:'🍎'},
  {total:10,rem:5,em:'⭐'},{total:9,rem:3,em:'🎈'},{total:6,rem:2,em:'🐠'},
  {total:12,rem:4,em:'🦋'},{total:11,rem:6,em:'🍭'},{total:15,rem:7,em:'🌙'},
  {total:10,rem:3,em:'🐱'},{total:14,rem:8,em:'❤️'},{total:13,rem:5,em:'🌟'}
];

/* SHAPES */
var SHAPES_2D=[
  {em:'⭕',name:'Circle',   fact:'Round with no corners',sides:0},
  {em:'⬛',name:'Square',   fact:'4 equal sides & 4 corners',sides:4},
  {em:'🔺',name:'Triangle', fact:'3 sides & 3 corners',sides:3},
  {em:'▬',name:'Rectangle',fact:'2 long, 2 short sides',sides:4},
  {em:'🔷',name:'Diamond',  fact:'4 equal sides, pointy top',sides:4},
  {em:'⭐',name:'Star',     fact:'5 points sticking out',sides:5},
  {em:'🥚',name:'Oval',     fact:'Like a stretched circle',sides:0},
  {em:'❤️',name:'Heart',   fact:'Two bumps on top',sides:0}
];
var SHAPES_3D=[
  {em:'📦',name:'Cube',     fact:'6 square faces, like a box',faces:6},
  {em:'🌐',name:'Sphere',   fact:'Round like a ball',faces:0},
  {em:'🥫',name:'Cylinder', fact:'2 circles + 1 curved face',faces:3},
  {em:'🍦',name:'Cone',     fact:'Round base + pointed top',faces:2},
  {em:'🎲',name:'Cuboid',   fact:'6 faces, like a brick',faces:6},
  {em:'🔮',name:'Pyramid',  fact:'Square base + 4 triangles',faces:5}
];
var shapeMode='2d'; /* '2d' or '3d' */

/* CLOCK – o'clock and half past */
var CLOCK_DATA=[
  {h:3,m:0,label:'3 o\'clock',   opts:['3:00','6:00','9:00','12:00']},
  {h:6,m:0,label:'6 o\'clock',   opts:['3:00','6:00','9:00','12:00']},
  {h:9,m:0,label:'9 o\'clock',   opts:['3:00','6:00','9:00','12:00']},
  {h:12,m:0,label:'12 o\'clock', opts:['3:00','6:00','9:00','12:00']},
  {h:1,m:0,label:'1 o\'clock',   opts:['1:00','2:00','4:00','5:00']},
  {h:2,m:0,label:'2 o\'clock',   opts:['1:00','2:00','4:00','5:00']},
  {h:4,m:0,label:'4 o\'clock',   opts:['1:00','2:00','4:00','5:00']},
  {h:7,m:0,label:'7 o\'clock',   opts:['7:00','8:00','10:00','11:00']},
  {h:3,m:30,label:'Half past 3', opts:['Half past 3','Half past 6','3 o\'clock','6 o\'clock']},
  {h:6,m:30,label:'Half past 6', opts:['Half past 3','Half past 6','Half past 9','Half past 12']},
  {h:9,m:30,label:'Half past 9', opts:['Half past 6','Half past 9','Half past 12','9 o\'clock']},
  {h:12,m:30,label:'Half past 12',opts:['Half past 9','Half past 12','12 o\'clock','Half past 3']}
];

/* COMPARE */
var CMP_DATA=[
  {q:'Which is BIGGER?',  a:{em:'🐘',l:'Elephant'}, b:{em:'🐁',l:'Mouse'},   ans:'a'},
  {q:'Which is LONGER?',  a:{em:'🐍',l:'Snake'},    b:{em:'🐛',l:'Caterpillar'},ans:'a'},
  {q:'Which is HEAVIER?', a:{em:'🪨',l:'Rock'},      b:{em:'🪶',l:'Feather'},  ans:'a'},
  {q:'Which is FASTER?',  a:{em:'🐆',l:'Cheetah'},   b:{em:'🐢',l:'Turtle'},   ans:'a'},
  {q:'Which is TALLER?',  a:{em:'🦒',l:'Giraffe'},   b:{em:'🐇',l:'Rabbit'},   ans:'a'},
  {q:'Which is BIGGER?',  a:{em:'🌊',l:'Ocean'},      b:{em:'🛁',l:'Bathtub'},  ans:'a'},
  {q:'Which is SMALLER?', a:{em:'🐝',l:'Bee'},        b:{em:'🦅',l:'Eagle'},    ans:'a'},
  {q:'Which is LIGHTER?', a:{em:'🎈',l:'Balloon'},    b:{em:'🏋️',l:'Weights'}, ans:'a'},
  {q:'Which is SHORTER?', a:{em:'🐜',l:'Ant'},        b:{em:'🦕',l:'Dinosaur'}, ans:'a'},
  {q:'Which is SLOWER?',  a:{em:'🐌',l:'Snail'},      b:{em:'✈️',l:'Airplane'}, ans:'a'},
  {q:'Which is BIGGER?',  a:{em:'🌍',l:'Earth'},      b:{em:'🍎',l:'Apple'},    ans:'a'},
  {q:'Which is HEAVIER?', a:{em:'🚂',l:'Train'},      b:{em:'🚲',l:'Bicycle'},  ans:'a'}
];

/* COUNT UP */
var COUNT_DATA=[
  /* count objects */ {type:'count',em:'🍎',n:12,opts:[10,11,12,13]},
  {type:'count',em:'⭐',n:15,opts:[13,14,15,16]},
  {type:'count',em:'🌸',n:18,opts:[16,17,18,19]},
  {type:'count',em:'🐠',n:20,opts:[18,19,20,21]},
  {type:'count',em:'🎈',n:14,opts:[12,13,14,15]},
  {type:'count',em:'🦋',n:17,opts:[15,16,17,18]},
  /* skip counting */ {type:'skip',seq:[2,4,6,8],next:10,step:2,opts:[9,10,11,12]},
  {type:'skip',seq:[5,10,15,20],next:25,step:5,opts:[22,23,25,28]},
  {type:'skip',seq:[10,20,30,40],next:50,step:10,opts:[45,48,50,55]},
  {type:'skip',seq:[3,6,9,12],next:15,step:3,opts:[13,14,15,16]},
  {type:'skip',seq:[4,8,12,16],next:20,step:4,opts:[18,19,20,21]},
  {type:'skip',seq:[2,4,6],next:8,step:2,opts:[7,8,9,10]}
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
var addOrder=ADD_DATA.map(function(_,i){return i;}),addIdx=0,addSc=0,addAns=false;
var subOrder=SUB_DATA.map(function(_,i){return i;}),subIdx=0,subSc=0,subAns=false;
var shpOrder=SHAPES_2D.map(function(_,i){return i;}),shpIdx=0,shpSc=0,shpAns=false;
var clkOrder=CLOCK_DATA.map(function(_,i){return i;}),clkIdx=0,clkSc=0,clkAns=false;
var cmpOrder=CMP_DATA.map(function(_,i){return i;}),cmpIdx=0,cmpSc=0,cmpAns=false;
var cntOrder=COUNT_DATA.map(function(_,i){return i;}),cntIdx=0,cntSc=0,cntAns=false;
var _nextFn=null;
function nextMath(){if(_nextFn)_nextFn();}

/* ══════════════════════════════════════
   ROUTER
══════════════════════════════════════ */
var MATH_HEADERS={
  add:     {bg:'linear-gradient(135deg,#2E7D32,#66BB6A)',em:'&#10133;',title:'Add It!'},
  subtract:{bg:'linear-gradient(135deg,#1565C0,#42A5F5)',em:'&#10134;',title:'Take Away'},
  shapes:  {bg:'linear-gradient(135deg,#6A1B9A,#CE93D8)',em:'&#128314;',title:'Shapes'},
  clock:   {bg:'linear-gradient(135deg,#E65100,#FF9800)',em:'&#128336;',title:'What Time?'},
  compare: {bg:'linear-gradient(135deg,#AD1457,#F06292)',em:'&#9878;', title:'Compare'},
  countup: {bg:'linear-gradient(135deg,#00695C,#26A69A)',em:'&#128290;',title:'Count Up!'}
};

function showMath(name){
  window.speechSynthesis.cancel();
  document.querySelectorAll('.math-dock-btn').forEach(function(b){
    b.classList.remove('active');b.style.background='';
  });
  var btn=document.querySelector('.math-dock-btn[data-tab="'+name+'"]');
  if(btn)btn.classList.add('active');
  var h=MATH_HEADERS[name];
  document.getElementById('mathMain').innerHTML=
    '<div class="bigbox" style="background:'+h.bg+'"><div class="bigchar">'+h.em+'</div><div class="bigsub">'+h.title+'</div></div>'
    +'<div id="mathArea"></div>';
  resetMath(name);
  ({add:buildAdd,subtract:buildSub,shapes:buildShapes,clock:buildClock,compare:buildCmp,countup:buildCount})[name]();
}

function resetMath(name){
  if(name==='add')     {addOrder=ADD_DATA.map(function(_,i){return i;});addIdx=0;addSc=0;addAns=false;}
  if(name==='subtract'){subOrder=SUB_DATA.map(function(_,i){return i;});subIdx=0;subSc=0;subAns=false;}
  if(name==='shapes')  {shpOrder=SHAPES_2D.map(function(_,i){return i;});shpIdx=0;shpSc=0;shpAns=false;shapeMode='2d';}
  if(name==='clock')   {clkOrder=CLOCK_DATA.map(function(_,i){return i;});clkIdx=0;clkSc=0;clkAns=false;}
  if(name==='compare') {cmpOrder=CMP_DATA.map(function(_,i){return i;});cmpIdx=0;cmpSc=0;cmpAns=false;}
  if(name==='countup') {cntOrder=COUNT_DATA.map(function(_,i){return i;});cntIdx=0;cntSc=0;cntAns=false;}
}

function getArea(){return document.getElementById('mathArea');}
function scoreH(cur,tot,sc){return '<div class="scorebar">Q <b>'+cur+'</b>/'+tot+' &nbsp;&#183;&nbsp; Score: <b>'+sc+'</b></div>';}
function navBtns(prevFn,showNext){
  return '<div class="nav-row">'
    +(prevFn?'<button class="prvbtn" onclick="'+prevFn+'">&#8592; Prev</button>':'')
    +(showNext
      ?'<button class="nxtbtn" id="nxtBtn" onclick="nextMath()">Next &#8594;</button>'
      :'<button class="nxtbtn" id="nxtBtn" style="display:none" onclick="nextMath()">Next &#8594;</button>')
    +'</div>';
}
function showNxt(){var b=document.getElementById('nxtBtn');if(b)b.style.display='inline-block';}
function wrongFlash(el,msgId){
  el.classList.add('wrong');
  spk('Try again!');
  setTimeout(function(){el.classList.remove('wrong');if(msgId)document.getElementById(msgId).innerHTML='';},900);
}
function scoreScrn(sc,tot,great,ok,gameId){
  var pct=Math.round(sc/tot*100);
  getArea().innerHTML='<div class="scorescreen">'
    +'<div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div>'
    +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+sc+' / '+tot+'</div>'
    +'<div style="color:#777;margin-bottom:16px">'+(pct>=80?great:pct>=50?ok:'Keep practising!')+'</div>'
    +'<button class="rbtn" onclick="showMath(\''+gameId+'\')">Play Again &#128257;</button></div>';
  spk(pct>=80?great:ok);
}
function shufBar(fn){return '<div style="text-align:right;margin-bottom:8px"><button class="shufbtn" onclick="'+fn+'">&#128256; Shuffle</button></div>';}

function makeDots(n,em){
  var h='<div class="math-group-dots">';
  for(var i=0;i<n;i++)h+='<span class="math-dot">'+em+'</span>';
  return h+'</div><div class="math-group-num">'+n+'</div>';
}
function makeNumOpts(ans,range,id){
  /* generate 3 wrong options near the answer */
  var opts=[ans];
  var off=1;
  while(opts.length<4){
    var c=ans+(off%2===0?off/2:-Math.ceil(off/2));
    if(c>=0&&opts.indexOf(c)<0)opts.push(c);
    off++;
  }
  opts.sort(function(){return Math.random()-.5;});
  var correctIdx=opts.indexOf(ans);
  return opts.map(function(n,i){
    return '<div class="num-opt" id="'+id+i+'" onclick="chkNum(\''+id+'\','+i+','+correctIdx+')">'+n+'</div>';
  }).join('');
}
function chkNum(id,i,correctIdx){
  /* generic number-choice checker; caller sets up specific state via flag */
  /* used by add and subtract */
}

/* ══════════════════════════════════════
   GAME 1 – ADD IT!
══════════════════════════════════════ */
function shuffleAdd(){addOrder.sort(function(){return Math.random()-.5;});addIdx=0;addSc=0;buildAdd();}
function buildAdd(){
  if(addIdx>=ADD_DATA.length){scoreScrn(addSc,ADD_DATA.length,'Addition Ace!','Good adding!','add');return;}
  var p=ADD_DATA[addOrder[addIdx]];
  _nextFn=function(){addIdx++;buildAdd();};
  addAns=false;
  var ans=p.a+p.b;
  var opts=[ans];
  var off=1;
  while(opts.length<4){var c=ans+(off%2===0?off/2:-Math.ceil(off/2));if(c>=0&&opts.indexOf(c)<0)opts.push(c);off++;}
  opts.sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(ans);

  var optsHTML=opts.map(function(n,i){
    return '<div class="num-opt" id="aopt'+i+'" onclick="chkAdd('+i+','+ci+')">'+n+'</div>';
  }).join('');

  getArea().innerHTML=scoreH(addIdx+1,ADD_DATA.length,addSc)
    +shufBar('shuffleAdd()')
    +'<div class="ibox">'
    +'<div class="iq">&#10133; How many altogether?</div>'
    +'<div class="math-groups">'
    +'<div class="math-group">'+makeDots(p.a,p.em)+'</div>'
    +'<div class="math-op">+</div>'
    +'<div class="math-group">'+makeDots(p.b,p.em)+'</div>'
    +'<div class="math-eq">=</div>'
    +'<div class="math-blank">?</div>'
    +'</div>'
    +'<div class="num-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="addR"></div>'
    +navBtns(addIdx>0?'addIdx--;buildAdd()':'',false)
    +'</div>';
  spk(p.a+' plus '+p.b+' equals how many?');
}
function chkAdd(i,ci){
  if(addAns)return;
  var p=ADD_DATA[addOrder[addIdx]];
  var el=document.getElementById('aopt'+i);
  if(i===ci){
    addAns=true;addSc++;
    el.classList.add('correct');
    document.getElementById('addR').innerHTML='&#11088; '+(p.a+p.b)+' is correct!';
    spk('Correct! '+p.a+' plus '+p.b+' equals '+(p.a+p.b)+'!');showNxt();
  }else{wrongFlash(el,'addR');}
}

/* ══════════════════════════════════════
   GAME 2 – TAKE AWAY
══════════════════════════════════════ */
function shuffleSub(){subOrder.sort(function(){return Math.random()-.5;});subIdx=0;subSc=0;buildSub();}
function buildSub(){
  if(subIdx>=SUB_DATA.length){scoreScrn(subSc,SUB_DATA.length,'Subtraction Star!','Good work!','subtract');return;}
  var p=SUB_DATA[subOrder[subIdx]];
  _nextFn=function(){subIdx++;buildSub();};
  subAns=false;
  var ans=p.total-p.rem;
  var opts=[ans];
  var off=1;
  while(opts.length<4){var c=ans+(off%2===0?off/2:-Math.ceil(off/2));if(c>=0&&opts.indexOf(c)<0)opts.push(c);off++;}
  opts.sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(ans);

  /* Build dots with some crossed out */
  var dotsHTML='<div class="math-group-dots" style="max-width:200px">';
  for(var di=0;di<p.total;di++){
    if(di<p.rem) dotsHTML+='<span class="math-dot" style="opacity:.25;text-decoration:line-through">'+p.em+'</span>';
    else dotsHTML+='<span class="math-dot">'+p.em+'</span>';
  }
  dotsHTML+='</div>';

  var optsHTML=opts.map(function(n,i){
    return '<div class="num-opt" id="sopt'+i+'" onclick="chkSub('+i+','+ci+')">'+n+'</div>';
  }).join('');

  getArea().innerHTML=scoreH(subIdx+1,SUB_DATA.length,subSc)
    +shufBar('shuffleSub()')
    +'<div class="ibox">'
    +'<div class="iq">&#10134; '+p.total+' take away '+p.rem+' = ?</div>'
    +'<div style="text-align:center;margin-bottom:16px">'+dotsHTML+'</div>'
    +'<div class="num-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="subR"></div>'
    +navBtns(subIdx>0?'subIdx--;buildSub()':'',false)
    +'</div>';
  spk(p.total+' take away '+p.rem+' equals how many?');
}
function chkSub(i,ci){
  if(subAns)return;
  var p=SUB_DATA[subOrder[subIdx]];
  var el=document.getElementById('sopt'+i);
  if(i===ci){
    subAns=true;subSc++;
    el.classList.add('correct');
    document.getElementById('subR').innerHTML='&#11088; '+(p.total-p.rem)+' left!';
    spk('Correct! '+(p.total-p.rem)+' left!');showNxt();
  }else{wrongFlash(el,'subR');}
}

/* ══════════════════════════════════════
   GAME 3 – SHAPES
══════════════════════════════════════ */
function switchShapeMode(mode){
  shapeMode=mode;
  var data=shapeMode==='2d'?SHAPES_2D:SHAPES_3D;
  shpOrder=data.map(function(_,i){return i;});
  shpIdx=0;shpSc=0;buildShapes();
}
function shuffleShapes(){shpOrder.sort(function(){return Math.random()-.5;});shpIdx=0;shpSc=0;buildShapes();}
function buildShapes(){
  var data=shapeMode==='2d'?SHAPES_2D:SHAPES_3D;
  if(shpIdx>=data.length){scoreScrn(shpSc,data.length,'Shape Expert!','Good spotting!','shapes');return;}
  var p=data[shpOrder[shpIdx]];
  _nextFn=function(){shpIdx++;buildShapes();};
  shpAns=false;

  /* 3 random wrong options */
  var pool=data.filter(function(_,i){return i!==shpOrder[shpIdx];}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var allOpts=[p].concat(pool).sort(function(){return Math.random()-.5;});
  var ci=allOpts.indexOf(p);

  var optsHTML=allOpts.map(function(s,i){
    return '<div class="shape-opt" id="shop'+i+'" onclick="chkShape('+i+','+ci+')">'
      +'<span class="shem">'+s.em+'</span>'+s.name+'</div>';
  }).join('');

  getArea().innerHTML=scoreH(shpIdx+1,data.length,shpSc)
    +shufBar('shuffleShapes()')
    +'<div class="ibox">'
    +'<div class="shape-tabs">'
    +'<button class="shape-tab'+(shapeMode==='2d'?' active':'')+'" onclick="switchShapeMode(\'2d\')">2D Shapes</button>'
    +'<button class="shape-tab'+(shapeMode==='3d'?' active':'')+'" onclick="switchShapeMode(\'3d\')">3D Shapes</button>'
    +'</div>'
    +'<div class="iq">Which shape is a <b>'+p.name+'</b>?</div>'
    +'<div class="shape-opts">'+optsHTML+'</div>'
    +'<div class="shape-name-box"><div class="shape-name">'+p.em+' '+p.name+'</div><div class="shape-fact">'+p.fact+'</div></div>'
    +'<div class="rmsg" id="shpR"></div>'
    +navBtns(shpIdx>0?'shpIdx--;buildShapes()':'',false)
    +'</div>';
  spk('Which shape is a '+p.name+'?');
}
function chkShape(i,ci){
  if(shpAns)return;
  var el=document.getElementById('shop'+i);
  if(i===ci){
    var data=shapeMode==='2d'?SHAPES_2D:SHAPES_3D;
    var p=data[shpOrder[shpIdx]];
    shpAns=true;shpSc++;
    el.classList.add('correct');
    document.getElementById('shpR').innerHTML='&#11088; '+p.name+'! '+p.fact;
    spk('Correct! '+p.name+'! '+p.fact);showNxt();
  }else{wrongFlash(el,'shpR');}
}

/* ══════════════════════════════════════
   GAME 4 – CLOCK
══════════════════════════════════════ */
function shuffleClock(){clkOrder.sort(function(){return Math.random()-.5;});clkIdx=0;clkSc=0;buildClock();}
function buildClock(){
  if(clkIdx>=CLOCK_DATA.length){scoreScrn(clkSc,CLOCK_DATA.length,'Time Teller!','Good reading!','clock');return;}
  var p=CLOCK_DATA[clkOrder[clkIdx]];
  _nextFn=function(){clkIdx++;buildClock();};
  clkAns=false;

  /* Hour hand angle: each hour = 30 deg, minutes add 0.5 deg each */
  var hAngle=((p.h%12)+p.m/60)*30;
  var mAngle=p.m*6;
  /* Shuffle options */
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.label);

  var optsHTML=opts.map(function(o,i){
    return '<div class="clock-opt" id="copt'+i+'" onclick="chkClock('+i+','+ci+')">'+o+'</div>';
  }).join('');

  getArea().innerHTML=scoreH(clkIdx+1,CLOCK_DATA.length,clkSc)
    +shufBar('shuffleClock()')
    +'<div class="ibox">'
    +'<div class="iq">&#128336; What time is it?</div>'
    +'<div class="clock-face">'
    +'<span class="clock-num n12">12</span>'
    +'<span class="clock-num n3">3</span>'
    +'<span class="clock-num n6">6</span>'
    +'<span class="clock-num n9">9</span>'
    +'<div class="clock-hand-h" style="height:44px;transform:rotate('+hAngle+'deg)"></div>'
    +'<div class="clock-hand-m" style="height:58px;transform:rotate('+mAngle+'deg)"></div>'
    +'</div>'
    +'<div class="clock-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="clkR"></div>'
    +navBtns(clkIdx>0?'clkIdx--;buildClock()':'',false)
    +'</div>';
  spk('What time does the clock show?');
}
function chkClock(i,ci){
  if(clkAns)return;
  var p=CLOCK_DATA[clkOrder[clkIdx]];
  var el=document.getElementById('copt'+i);
  if(i===ci){
    clkAns=true;clkSc++;
    el.classList.add('correct');
    document.getElementById('clkR').innerHTML='&#11088; It is '+p.label+'!';
    spk('Correct! It is '+p.label+'!');showNxt();
  }else{wrongFlash(el,'clkR');}
}

/* ══════════════════════════════════════
   GAME 5 – COMPARE
══════════════════════════════════════ */
function shuffleCmp(){cmpOrder.sort(function(){return Math.random()-.5;});cmpIdx=0;cmpSc=0;buildCmp();}
function buildCmp(){
  if(cmpIdx>=CMP_DATA.length){scoreScrn(cmpSc,CMP_DATA.length,'Compare Champion!','Good comparing!','compare');return;}
  var p=CMP_DATA[cmpOrder[cmpIdx]];
  _nextFn=function(){cmpIdx++;buildCmp();};
  cmpAns=false;

  /* Randomly swap a/b so answer isn't always left */
  var swapped=Math.random()<0.5;
  var left =swapped?p.b:p.a;
  var right=swapped?p.a:p.b;
  var ans  =swapped?(p.ans==='a'?'right':'left'):(p.ans==='a'?'left':'right');

  getArea().innerHTML=scoreH(cmpIdx+1,CMP_DATA.length,cmpSc)
    +shufBar('shuffleCmp()')
    +'<div class="ibox">'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="cmp-row">'
    +'<div class="cmp-box" id="cmpL" onclick="chkCmp(\'left\',\''+ans+'\')"><span class="cmp-em">'+left.em+'</span><div class="cmp-lbl">'+left.l+'</div></div>'
    +'<div class="cmp-box" id="cmpR" onclick="chkCmp(\'right\',\''+ans+'\')"><span class="cmp-em">'+right.em+'</span><div class="cmp-lbl">'+right.l+'</div></div>'
    +'</div>'
    +'<div class="rmsg" id="cmpR"></div>'
    +navBtns(cmpIdx>0?'cmpIdx--;buildCmp()':'',false)
    +'</div>';
  spk(p.q);
}
function chkCmp(side,ans){
  if(cmpAns)return;
  cmpAns=true;
  var el=document.getElementById(side==='left'?'cmpL':'cmpR');
  var otherEl=document.getElementById(side==='left'?'cmpR':'cmpL');
  if(side===ans){
    cmpSc++;
    el.classList.add('correct');
    document.getElementById('cmpR').innerHTML='&#11088; Correct!';
    spk('Correct! Well done!');
  }else{
    el.classList.add('wrong');
    otherEl.classList.add('correct');
    document.getElementById('cmpR').innerHTML='The other one!';
    spk('Not quite! Look again!');
  }
  showNxt();
}

/* ══════════════════════════════════════
   GAME 6 – COUNT UP
══════════════════════════════════════ */
function shuffleCount(){cntOrder.sort(function(){return Math.random()-.5;});cntIdx=0;cntSc=0;buildCount();}
function buildCount(){
  if(cntIdx>=COUNT_DATA.length){scoreScrn(cntSc,COUNT_DATA.length,'Counting Champion!','Great counting!','countup');return;}
  var p=COUNT_DATA[cntOrder[cntIdx]];
  _nextFn=function(){cntIdx++;buildCount();};
  cntAns=false;

  var bodyHTML='';
  var question='';

  if(p.type==='count'){
    var dots='<div class="count-display">';
    for(var i=0;i<p.n;i++)dots+='<span class="count-em">'+p.em+'</span>';
    dots+='</div>';
    bodyHTML=dots;
    question='How many '+p.em+' do you see?';
  }else{
    var row='<div class="skip-row">';
    p.seq.forEach(function(n){row+='<span class="skip-item">'+n+'</span><span style="font-size:1.2rem;color:#aaa">&#8594;</span>';});
    row+='<span class="skip-blank">?</span></div>';
    bodyHTML=row;
    question='What comes next? Count in '+p.step+'s!';
  }

  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.type==='count'?p.n:p.next);

  var optsHTML=opts.map(function(n,i){
    return '<div class="num-opt" id="cnopt'+i+'" onclick="chkCount('+i+','+ci+')">'+n+'</div>';
  }).join('');

  getArea().innerHTML=scoreH(cntIdx+1,COUNT_DATA.length,cntSc)
    +shufBar('shuffleCount()')
    +'<div class="ibox">'
    +'<div class="iq">&#128290; '+question+'</div>'
    +bodyHTML
    +'<div class="num-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="cntR"></div>'
    +navBtns(cntIdx>0?'cntIdx--;buildCount()':'',false)
    +'</div>';
  spk(question);
}
function chkCount(i,ci){
  if(cntAns)return;
  var p=COUNT_DATA[cntOrder[cntIdx]];
  var el=document.getElementById('cnopt'+i);
  if(i===ci){
    cntAns=true;cntSc++;
    el.classList.add('correct');
    var ans=p.type==='count'?p.n:p.next;
    document.getElementById('cntR').innerHTML='&#11088; '+ans+' is correct!';
    spk('Correct! '+ans+'!');showNxt();
  }else{wrongFlash(el,'cntR');}
}
