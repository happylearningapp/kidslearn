<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Explorer</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(90px + env(safe-area-inset-bottom))!important;overflow-y:auto;}
#sdrawer{top:66px!important;}
.cs-dock{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));gap:3px;}
.cs-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px 5px;border-radius:12px;border:none;background:#f5f5f5;color:#ccc;font-family:var(--f);font-size:.46rem;font-weight:800;cursor:default;line-height:1.2;}
.cs-btn .dock-ico{font-size:.9rem;line-height:1;}
.cs-center{text-align:center;padding:40px 20px 20px;}
.cs-icon{font-size:4rem;display:block;margin-bottom:14px;}
.cs-title{font-size:1.3rem;font-weight:900;color:#444;margin-bottom:8px;}
.cs-sub{font-size:.88rem;color:#888;line-height:1.6;margin-bottom:20px;}
.cs-pill{display:inline-block;background:#f0f0f0;border-radius:20px;padding:6px 16px;font-size:.75rem;font-weight:900;color:#aaa;}
</style>
</head>
<body data-page-title="&#127757; World Explorer" data-page-sub="Countries, Maps &amp; Cultures" data-page-gradient="linear-gradient(135deg,#E65100,#FF9800)" data-page-back="../home.html">
<div class="subbody">
  <div class="submain">
    <div class="bigbox" style="background:linear-gradient(135deg,#E65100,#FF9800)">
      <div class="bigchar">&#127757;</div>
      <div class="bigsub">World Explorer</div>
    </div>
    <div class="cs-center">
      <span class="cs-icon">&#128679;</span>
      <div class="cs-title">Coming Soon!</div>
      <div class="cs-sub">This section is being built with<br>exciting content for Young Achievers.<br>Check back soon!</div>
      <span class="cs-pill">&#127381; In Progress</span>
    </div>
  </div>
</div>
<nav class="cs-dock">
  <button class="cs-btn"><span class="dock-ico">&#127757;</span>Continents</button>
  <button class="cs-btn"><span class="dock-ico">&#127988;</span>Flags</button>
  <button class="cs-btn"><span class="dock-ico">&#127963;</span>Landmarks</button>
  <button class="cs-btn"><span class="dock-ico">&#127869;</span>Food &amp; Culture</button>
  <button class="cs-btn"><span class="dock-ico">&#9732;</span>Maps</button>
</nav>
</body>
</html>
