<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Word Power &#128172;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="data.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(90px + env(safe-area-inset-bottom))!important;overflow-y:auto;}
#sdrawer{top:66px!important;}

.words-dock{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);display:grid;grid-template-columns:repeat(5,1fr);padding:5px 3px calc(5px + env(safe-area-inset-bottom));gap:3px;}
.words-dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 2px 4px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-family:var(--f);font-size:.44rem;font-weight:800;cursor:pointer;line-height:1.2;transition:all .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;}
.words-dock-btn.active{color:#fff;transform:scale(1.05);}
.words-dock-btn .dock-ico{font-size:.9rem;line-height:1;}
.words-dock-btn[data-tab="opposites"].active{background:linear-gradient(135deg,#AD1457,#F06292);}
.words-dock-btn[data-tab="synonyms"].active {background:linear-gradient(135deg,#1565C0,#42A5F5);}
.words-dock-btn[data-tab="families"].active {background:linear-gradient(135deg,#E65100,#FF9800);}
.words-dock-btn[data-tab="compound"].active {background:linear-gradient(135deg,#00695C,#26A69A);}
.words-dock-btn[data-tab="vocab"].active    {background:linear-gradient(135deg,#6A1B9A,#CE93D8);}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1);opacity:1}}
.ibox{background:#fff;border-radius:20px;padding:16px;box-shadow:0 5px 20px rgba(0,0,0,.10);margin-bottom:14px;}
.iq{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:14px;text-align:center;line-height:1.4;}
.rmsg{min-height:22px;text-align:center;font-size:.85rem;font-weight:900;color:#4CAF50;margin-bottom:8px;}
.scorebar{background:#f7f7f7;border-radius:12px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#666;margin-bottom:10px;}
.scorescreen{text-align:center;padding:30px 20px;}
.rbtn{padding:13px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#AD1457,#F06292);color:#fff;font-family:var(--f);font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s;}
.rbtn:active{transform:scale(.96);}
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto 14px;}
.mcq-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:700;font-size:.88rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;width:100%;box-sizing:border-box;}
.mcq-opt:hover{transform:scale(1.03);}
.mcq-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.mcq-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* Opposites */
.opp-word{font-size:2rem;font-weight:900;color:#AD1457;text-align:center;padding:14px;background:#FCE4EC;border-radius:16px;margin-bottom:16px;}
.opp-em{font-size:3rem;display:block;margin-bottom:4px;}

/* Synonyms */
.syn-word{font-size:2rem;font-weight:900;text-align:center;padding:16px;background:linear-gradient(135deg,#1565C0,#42A5F5);color:#fff;border-radius:16px;margin-bottom:16px;}

/* Word families */
.wfam-root{background:linear-gradient(135deg,#E65100,#FF9800);border-radius:20px;padding:16px;text-align:center;margin-bottom:14px;box-shadow:0 6px 20px rgba(230,81,0,.25);}
.wfam-root-label{font-size:2.2rem;font-weight:900;color:#fff;letter-spacing:2px;}
.wfam-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;}
.wfam-chip{background:#fff;border:2px solid #E65100;border-radius:20px;padding:8px 14px;font-family:var(--f);font-weight:700;font-size:.9rem;color:#E65100;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;}
.wfam-chip:active{transform:scale(.96);background:#FFF3E0;}

/* Compound */
.cmpd-display{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.cmpd-part{background:#f5f5f5;border-radius:14px;padding:10px 18px;font-size:1.3rem;font-weight:900;color:#333;}
.cmpd-plus{font-size:1.8rem;color:#aaa;font-weight:900;}
.cmpd-blank{background:#E8F5E9;border:3px dashed #4CAF50;border-radius:14px;padding:10px 18px;font-size:1.3rem;font-weight:900;color:#4CAF50;}
</style>
</head>
<body data-page-title="&#128172; Word Power" data-page-sub="Opposites &amp; Vocab" data-page-gradient="linear-gradient(135deg,#AD1457,#F06292)" data-page-back="../home.html">

<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML='<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'
    +'<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'
    +'<div class="hdr-right">'
    +'<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'
    +'<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'
    +'</div>';
})();</script>

<div class="subbody">
  <div class="submain" id="wordsMain"></div>
</div>

<nav class="words-dock">
  <button class="words-dock-btn" data-tab="opposites" onclick="showWords('opposites')"><span class="dock-ico">&#8596;</span>Opposites</button>
  <button class="words-dock-btn" data-tab="synonyms"  onclick="showWords('synonyms')"> <span class="dock-ico">&#128101;</span>Synonyms</button>
  <button class="words-dock-btn" data-tab="families"  onclick="showWords('families')"> <span class="dock-ico">&#128209;</span>Families</button>
  <button class="words-dock-btn" data-tab="compound"  onclick="showWords('compound')"> <span class="dock-ico">&#128279;</span>Compound</button>
  <button class="words-dock-btn" data-tab="vocab"     onclick="showWords('vocab')">    <span class="dock-ico">&#129504;</span>Vocab</button>
</nav>

<script>
/* ── STATE ── */
var oppOrder=OPPOSITES_46.map(function(_,i){return i;}),oppIdx=0,oppSc=0,oppAns=false;
var synOrder=SYNONYMS_DATA.map(function(_,i){return i;}),synIdx=0,synSc=0,synAns=false;
var famOrder=WORD_FAMILIES.map(function(_,i){return i;}),famIdx=0;
var cmpOrder=COMPOUND_WORDS.map(function(_,i){return i;}),cmpIdx=0,cmpSc=0,cmpAns=false;
var vcbOrder=VOCAB_QUIZ_46.map(function(_,i){return i;}),vcbIdx=0,vcbSc=0,vcbAns=false;
var _nextFn=null;
function nextWords(){if(_nextFn)_nextFn();}

/* ── ROUTER ── */
var WORDS_HEADERS={
  opposites:{bg:'linear-gradient(135deg,#AD1457,#F06292)',em:'&#8596;',title:'Opposites'},
  synonyms: {bg:'linear-gradient(135deg,#1565C0,#42A5F5)',em:'&#128101;',title:'Synonyms'},
  families: {bg:'linear-gradient(135deg,#E65100,#FF9800)',em:'&#128209;',title:'Word Families'},
  compound: {bg:'linear-gradient(135deg,#00695C,#26A69A)',em:'&#128279;',title:'Compound Words'},
  vocab:    {bg:'linear-gradient(135deg,#6A1B9A,#CE93D8)',em:'&#129504;',title:'Vocab Quiz'}
};

var currentWordsTab='opposites';
var wordsShufOn=false;

function showWords(name){
  window.speechSynthesis.cancel();
  currentWordsTab=name;
  wordsShufOn=false;
  document.querySelectorAll('.words-dock-btn').forEach(function(b){b.classList.remove('active');b.style.background='';});
  var btn=document.querySelector('.words-dock-btn[data-tab="'+name+'"]');
  if(btn){btn.classList.add('active');var h=WORDS_HEADERS[name];if(h)btn.style.background=h.bg;}
  document.getElementById('wordsMain').innerHTML=
    '<div class="shuf-row"><button class="shuf-toggle" id="wordsShufBtn" onclick="toggleWordsShuf()">&#128256; Shuffle OFF</button></div>'
    +'<div id="wordsArea"></div>';
  resetWords(name);
  ({opposites:buildOpp,synonyms:buildSyn,families:buildFam,compound:buildCmpd,vocab:buildVcb})[name]();
}

function toggleWordsShuf(){
  wordsShufOn=!wordsShufOn;
  var btn=document.getElementById('wordsShufBtn');
  if(btn){btn.classList.toggle('on',wordsShufOn);btn.innerHTML='&#128256; Shuffle '+(wordsShufOn?'ON':'OFF');}
  resetWords(currentWordsTab);
  if(wordsShufOn){
    var ord=currentWordsTab==='opposites'?oppOrder:currentWordsTab==='synonyms'?synOrder:currentWordsTab==='families'?famOrder:currentWordsTab==='compound'?cmpOrder:vcbOrder;
    if(ord)ord.sort(function(){return Math.random()-.5;});
  }
  ({opposites:buildOpp,synonyms:buildSyn,families:buildFam,compound:buildCmpd,vocab:buildVcb})[currentWordsTab]();
}

function resetWords(name){
  if(name==='opposites'){oppOrder=OPPOSITES_46.map(function(_,i){return i;});oppIdx=0;oppSc=0;oppAns=false;}
  if(name==='synonyms') {synOrder=SYNONYMS_DATA.map(function(_,i){return i;});synIdx=0;synSc=0;synAns=false;}
  if(name==='families') {famOrder=WORD_FAMILIES.map(function(_,i){return i;});famIdx=0;}
  if(name==='compound') {cmpOrder=COMPOUND_WORDS.map(function(_,i){return i;});cmpIdx=0;cmpSc=0;cmpAns=false;}
  if(name==='vocab')    {vcbOrder=VOCAB_QUIZ_46.map(function(_,i){return i;});vcbIdx=0;vcbSc=0;vcbAns=false;}
}
function getArea(){return document.getElementById('wordsArea');}
function scoreH(cur,tot,sc){return '<div class="scorebar">Q <b>'+cur+'</b>/'+tot+' &nbsp;&#183;&nbsp; Score: <b>'+sc+'</b></div>';}
function navBtns(prevFn,showNext){
  return '<div class="nav-row">'
    +(prevFn?'<button class="prvbtn" onclick="'+prevFn+'">&#8592; Prev</button>':'')
    +(showNext
      ?'<button class="nxtbtn" id="nxtBtn" onclick="nextWords()">Next &#8594;</button>'
      :'<button class="nxtbtn" id="nxtBtn" style="display:none" onclick="nextWords()">Next &#8594;</button>')
    +'</div>';
}
function showNxt(){var b=document.getElementById('nxtBtn');if(b)b.style.display='inline-block';}
function wrongFlash(el,msgId){el.classList.add('wrong');spk('Try again!');setTimeout(function(){el.classList.remove('wrong');if(msgId)document.getElementById(msgId).innerHTML='';},900);}
function scoreScrn(sc,tot,great,ok,gameId){
  var pct=Math.round(sc/tot*100);
  getArea().innerHTML='<div class="scorescreen">'
    +'<div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div>'
    +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+sc+' / '+tot+'</div>'
    +'<div style="color:#777;margin-bottom:16px">'+(pct>=80?great:pct>=50?ok:'Keep practising!')+'</div>'
    +'<button class="rbtn" onclick="showWords(\''+gameId+'\')">Play Again &#128257;</button></div>';
  spk(pct>=80?great:ok);
}
function shufBar(fn){return '<div style="text-align:right;margin-bottom:8px"><button class="shufbtn" onclick="'+fn+'">&#128256; Shuffle</button></div>';}

/* ── OPPOSITES ── */
function shuffleOpp(){oppOrder.sort(function(){return Math.random()-.5;});oppIdx=0;oppSc=0;oppAns=false;buildOpp();}
function buildOpp(){
  _nextFn=function(){oppIdx++;oppAns=false;buildOpp();};
  if(oppIdx>=OPPOSITES_46.length){scoreScrn(oppSc,OPPOSITES_46.length,'Opposites Champion!','Good work!','opposites');return;}
  var p=OPPOSITES_46[oppOrder[oppIdx]];
  oppAns=false;
  // 4 MCQ options — correct is p.w2, 3 others from pool
  var pool=OPPOSITES_46.filter(function(_,i){return i!==oppOrder[oppIdx];}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var allOpts=[{w:p.w2,e:p.e2}].concat(pool.map(function(x){return {w:x.w2,e:x.e2};})).sort(function(){return Math.random()-.5;});
  var ci=allOpts.findIndex(function(x){return x.w===p.w2;});
  var optsHTML=allOpts.map(function(o,i){
    return '<div class="mcq-opt" id="oopt'+i+'" onclick="chkOpp('+i+','+ci+')">'+o.e+' '+o.w+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(oppIdx+1,OPPOSITES_46.length,oppSc)
    +'<div class="ibox">'
    +'<div class="opp-word"><span class="opp-em">'+p.e1+'</span>'+p.w1+'</div>'
    +'<div class="iq">What is the opposite?</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="oppR"></div>'
    +navBtns(oppIdx>0?'oppIdx--;oppAns=false;buildOpp()':'',false)
    +'</div>';
  spk('What is the opposite of '+p.w1+'?');
}
function chkOpp(i,ci){
  if(oppAns)return;
  var p=OPPOSITES_46[oppOrder[oppIdx]];
  var el=document.getElementById('oopt'+i);
  if(i===ci){
    oppAns=true;oppSc++;
    el.classList.add('correct');
    document.getElementById('oppR').innerHTML='&#11088; '+p.w2+'!';
    spk('Correct! The opposite of '+p.w1+' is '+p.w2+'!');showNxt();
  }else{wrongFlash(el,'oppR');}
}

/* ── SYNONYMS ── */
function shuffleSyn(){synOrder.sort(function(){return Math.random()-.5;});synIdx=0;synSc=0;synAns=false;buildSyn();}
function buildSyn(){
  _nextFn=function(){synIdx++;synAns=false;buildSyn();};
  if(synIdx>=SYNONYMS_DATA.length){scoreScrn(synSc,SYNONYMS_DATA.length,'Synonym Star!','Good vocabulary!','synonyms');return;}
  var p=SYNONYMS_DATA[synOrder[synIdx]];
  synAns=false;
  // correct = any of 4 synonyms; 4 options from the set
  var opts=p.synonyms.slice().sort(function(){return Math.random()-.5;});
  // add wrong options from other words if needed
  var pool=SYNONYMS_DATA.filter(function(_,i){return i!==synOrder[synIdx];});
  while(opts.length<4){var rw=pool[Math.floor(Math.random()*pool.length)];var ro=rw.synonyms[0];if(opts.indexOf(ro)<0)opts.push(ro);}
  opts=opts.slice(0,4);
  // all 4 are correct synonyms from the same word — pick one as "the" answer
  var ci=0; // first after sort is fine, just pick index of first
  var correctWord=opts[0];
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="sopt'+i+'" onclick="chkSyn('+i+',\''+p.word+'\')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(synIdx+1,SYNONYMS_DATA.length,synSc)
    +'<div class="ibox">'
    +'<div class="syn-word">'+p.em+' '+p.word+'</div>'
    +'<div class="iq">Which word means the same?</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="synR"></div>'
    +navBtns(synIdx>0?'synIdx--;synAns=false;buildSyn()':'',false)
    +'</div>';
  spk('Which word means the same as '+p.word+'?');
}
function chkSyn(i,word){
  if(synAns)return;
  var p=SYNONYMS_DATA[synOrder[synIdx]];
  var el=document.getElementById('sopt'+i);
  // All 4 options are valid synonyms
  synAns=true;synSc++;
  el.classList.add('correct');
  document.getElementById('synR').innerHTML='&#11088; Correct synonym!';
  spk('Correct! '+el.textContent+' means the same as '+p.word+'!');showNxt();
}

/* ── WORD FAMILIES ── */
function shuffleFam(){famOrder.sort(function(){return Math.random()-.5;});famIdx=0;buildFam();}
function buildFam(){
  _nextFn=function(){famIdx++;buildFam();};
  if(famIdx>=WORD_FAMILIES.length){famIdx=0;buildFam();return;}
  var p=WORD_FAMILIES[famOrder[famIdx]];
  var chipsHTML=p.words.map(function(w){
    return '<div class="wfam-chip" onclick="spk(\''+w.word+'\')">'+w.em+' '+w.word+'</div>';
  }).join('');
  getArea().innerHTML='<div class="wfam-root"><div class="wfam-root-label">'+p.root+'</div></div>'
    +'<div class="ibox"><div class="iq">Word Family: <b>'+p.root+'</b></div>'
    +'<div class="wfam-chips">'+chipsHTML+'</div>'
    +'<div class="rmsg">&#128266; Tap each word to hear it</div></div>'
    +navBtns(famIdx>0?'famIdx--;buildFam()':'',true);
  spk('Word family '+p.root+'. '+p.words.map(function(w){return w.word;}).join(', '));
}

/* ── COMPOUND WORDS ── */
function shuffleCmpd(){cmpOrder.sort(function(){return Math.random()-.5;});cmpIdx=0;cmpSc=0;cmpAns=false;buildCmpd();}
function buildCmpd(){
  _nextFn=function(){cmpIdx++;cmpAns=false;buildCmpd();};
  if(cmpIdx>=COMPOUND_WORDS.length){scoreScrn(cmpSc,COMPOUND_WORDS.length,'Compound Word Pro!','Good combining!','compound');return;}
  var p=COMPOUND_WORDS[cmpOrder[cmpIdx]];
  cmpAns=false;
  var pool=COMPOUND_WORDS.filter(function(_,i){return i!==cmpOrder[cmpIdx];}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var allOpts=[p].concat(pool).sort(function(){return Math.random()-.5;});
  var ci=allOpts.findIndex(function(x){return x.compound===p.compound;});
  var optsHTML=allOpts.map(function(o,i){
    return '<div class="mcq-opt" id="copt'+i+'" onclick="chkCmpd('+i+','+ci+')">'+o.em+' '+o.compound+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(cmpIdx+1,COMPOUND_WORDS.length,cmpSc)
    +'<div class="ibox">'
    +'<div class="iq">Combine to make one word!</div>'
    +'<div class="cmpd-display">'
    +'<div class="cmpd-part">'+p.w1+'</div>'
    +'<div class="cmpd-plus">+</div>'
    +'<div class="cmpd-part">'+p.w2+'</div>'
    +'<div class="cmpd-plus">=</div>'
    +'<div class="cmpd-blank">?</div>'
    +'</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="cmpdR"></div>'
    +navBtns(cmpIdx>0?'cmpIdx--;cmpAns=false;buildCmpd()':'',false)
    +'</div>';
  spk(p.w1+' and '+p.w2+' make which compound word?');
}
function chkCmpd(i,ci){
  if(cmpAns)return;
  var p=COMPOUND_WORDS[cmpOrder[cmpIdx]];
  var el=document.getElementById('copt'+i);
  if(i===ci){
    cmpAns=true;cmpSc++;
    el.classList.add('correct');
    document.getElementById('cmpdR').innerHTML='&#11088; '+p.compound+'!';
    spk('Correct! '+p.w1+' and '+p.w2+' make '+p.compound+'!');showNxt();
  }else{wrongFlash(el,'cmpdR');}
}

/* ── VOCAB QUIZ ── */
function shuffleVcb(){vcbOrder.sort(function(){return Math.random()-.5;});vcbIdx=0;vcbSc=0;vcbAns=false;buildVcb();}
function buildVcb(){
  _nextFn=function(){vcbIdx++;vcbAns=false;buildVcb();};
  if(vcbIdx>=VOCAB_QUIZ_46.length){scoreScrn(vcbSc,VOCAB_QUIZ_46.length,'Vocab Champion!','Good vocabulary!','vocab');return;}
  var p=VOCAB_QUIZ_46[vcbOrder[vcbIdx]];
  vcbAns=false;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.opts[p.a]);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="vopt'+i+'" onclick="chkVcb('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(vcbIdx+1,VOCAB_QUIZ_46.length,vcbSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="vcbR"></div>'
    +navBtns(vcbIdx>0?'vcbIdx--;vcbAns=false;buildVcb()':'',false)
    +'</div>';
  spk(p.q);
}
function chkVcb(i,ci){
  if(vcbAns)return;
  var p=VOCAB_QUIZ_46[vcbOrder[vcbIdx]];
  var el=document.getElementById('vopt'+i);
  if(i===ci){
    vcbAns=true;vcbSc++;
    el.classList.add('correct');
    document.getElementById('vcbR').innerHTML='&#11088; '+p.opts[p.a]+'!';
    spk('Correct! '+p.opts[p.a]+'!');showNxt();
  }else{wrongFlash(el,'vcbR');}
}

document.addEventListener('DOMContentLoaded',function(){showWords('opposites');});
</script>
</body>
</html>
