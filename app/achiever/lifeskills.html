<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Life Skills &#128336;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="data.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(90px + env(safe-area-inset-bottom))!important;overflow-y:auto;}
#sdrawer{top:66px!important;}

.life-dock{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);display:grid;grid-template-columns:repeat(5,1fr);padding:5px 3px calc(5px + env(safe-area-inset-bottom));gap:3px;}
.life-dock-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 2px 4px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-family:var(--f);font-size:.44rem;font-weight:800;cursor:pointer;line-height:1.2;transition:all .2s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;}
.life-dock-btn.active{color:#fff;transform:scale(1.05);}
.life-dock-btn .dock-ico{font-size:.9rem;line-height:1;}
.life-dock-btn[data-tab="clock"].active    {background:linear-gradient(135deg,#E65100,#FF9800);}
.life-dock-btn[data-tab="calendar"].active {background:linear-gradient(135deg,#1565C0,#42A5F5);}
.life-dock-btn[data-tab="money"].active    {background:linear-gradient(135deg,#2E7D32,#66BB6A);}
.life-dock-btn[data-tab="manners"].active  {background:linear-gradient(135deg,#AD1457,#F06292);}
.life-dock-btn[data-tab="safety"].active   {background:linear-gradient(135deg,#B71C1C,#EF5350);}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1);opacity:1}}
.ibox{background:#fff;border-radius:20px;padding:16px;box-shadow:0 5px 20px rgba(0,0,0,.10);margin-bottom:14px;}
.iq{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:14px;text-align:center;line-height:1.4;}
.rmsg{min-height:22px;text-align:center;font-size:.85rem;font-weight:900;color:#4CAF50;margin-bottom:8px;}
.scorebar{background:#f7f7f7;border-radius:12px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#666;margin-bottom:10px;}
.scorescreen{text-align:center;padding:30px 20px;}
.rbtn{padding:13px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#E65100,#FF9800);color:#fff;font-family:var(--f);font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s;}
.rbtn:active{transform:scale(.96);}
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto 14px;}
.mcq-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:700;font-size:.88rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;width:100%;box-sizing:border-box;}
.mcq-opt:hover{transform:scale(1.03);}
.mcq-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.mcq-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* Clock */
.clock-face{width:160px;height:160px;border-radius:50%;border:8px solid #333;background:#fff;margin:0 auto 16px;position:relative;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.clock-face::before{content:'';position:absolute;top:50%;left:50%;width:10px;height:10px;background:#333;border-radius:50%;transform:translate(-50%,-50%);z-index:3;}
.clock-num{position:absolute;font-weight:900;font-size:.7rem;color:#333;}
.clock-num.n12{top:6px;left:50%;transform:translateX(-50%);}
.clock-num.n3{right:6px;top:50%;transform:translateY(-50%);}
.clock-num.n6{bottom:6px;left:50%;transform:translateX(-50%);}
.clock-num.n9{left:6px;top:50%;transform:translateY(-50%);}
.clock-hand-h{position:absolute;bottom:50%;left:50%;width:5px;border-radius:4px 4px 0 0;background:#333;transform-origin:bottom center;margin-left:-2.5px;}
.clock-hand-m{position:absolute;bottom:50%;left:50%;width:3px;border-radius:4px 4px 0 0;background:#E53935;transform-origin:bottom center;margin-left:-1.5px;}
.clock-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:320px;margin:0 auto 14px;}
.clock-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;font-size:1rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.clock-opt:hover{transform:scale(1.06);border-color:#E65100;}
.clock-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.clock-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* Calendar */
.day-chip{display:inline-block;background:#fff;border:2px solid #1565C0;border-radius:12px;padding:8px 12px;margin:4px;font-family:var(--f);font-weight:700;font-size:.82rem;color:#1565C0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s;}
.day-chip:active{background:#1565C0;color:#fff;}
.month-chip{display:inline-block;background:#fff;border:2px solid #42A5F5;border-radius:12px;padding:6px 10px;margin:3px;font-family:var(--f);font-weight:700;font-size:.75rem;color:#1565C0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s;}
.month-chip:active{background:#42A5F5;color:#fff;}
.season-card{background:linear-gradient(135deg,#1565C0,#42A5F5);border-radius:14px;padding:12px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:8px;transition:all .18s;}
.season-card:active{transform:scale(.97);}

/* Money */
.money-card{background:#fff;border:3px solid #eee;border-radius:14px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.money-card:active{transform:scale(.97);}
.money-em{font-size:2rem;}
.money-info .money-coin{font-size:.95rem;font-weight:900;color:#333;}
.money-info .money-fact{font-size:.72rem;color:#777;margin-top:3px;}
.money-val{margin-left:auto;font-size:1.1rem;font-weight:900;color:#2E7D32;background:#E8F5E9;border-radius:10px;padding:6px 12px;}

/* Manners */
.manner-card{background:linear-gradient(135deg,#880E4F,#E91E63);border-radius:16px;padding:14px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:10px;transition:all .18s;}
.manner-card:active{transform:scale(.97);}
.manner-phrase{font-size:1.1rem;font-weight:900;margin-bottom:4px;}
.manner-when{font-size:.75rem;opacity:.85;}

/* Safety */
.safety-badge{display:inline-block;background:#B71C1C;color:#fff;border-radius:8px;padding:2px 10px;font-size:.65rem;font-weight:900;margin-bottom:8px;}
</style>
</head>
<body data-page-title="&#128336; Life Skills" data-page-sub="Clock, Calendar &amp; More" data-page-gradient="linear-gradient(135deg,#E65100,#FF9800)" data-page-back="../home.html">

<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML='<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'
    +'<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'
    +'<div class="hdr-right">'
    +'<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'
    +'<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'
    +'</div>';
})();</script>

<div class="subbody">
  <div class="submain" id="lifeMain"></div>
</div>

<nav class="life-dock">
  <button class="life-dock-btn" data-tab="clock"    onclick="showLife('clock')">   <span class="dock-ico">&#128336;</span>Clock</button>
  <button class="life-dock-btn" data-tab="calendar" onclick="showLife('calendar')"><span class="dock-ico">&#128197;</span>Calendar</button>
  <button class="life-dock-btn" data-tab="money"    onclick="showLife('money')">   <span class="dock-ico">&#128176;</span>Money</button>
  <button class="life-dock-btn" data-tab="manners"  onclick="showLife('manners')"> <span class="dock-ico">&#128591;</span>Manners</button>
  <button class="life-dock-btn" data-tab="safety"   onclick="showLife('safety')">  <span class="dock-ico">&#128737;</span>Safety</button>
</nav>

<script>
/* ── STATE ── */
var clkOrder=CLOCK_46.map(function(_,i){return i;}),clkIdx=0,clkSc=0,clkAns=false;
var calMode='days';
var calQOrder=CALENDAR_QUIZ.map(function(_,i){return i;}),calQIdx=0,calQSc=0,calQAns=false;
var monMode='learn';
var monQOrder=MONEY_QUIZ.map(function(_,i){return i;}),monQIdx=0,monQSc=0,monQAns=false;
var sfOrder=SAFETY_QUIZ.map(function(_,i){return i;}),sfIdx=0,sfSc=0,sfAns=false;
var _nextFn=null;
function nextLife(){if(_nextFn)_nextFn();}

/* ── ROUTER ── */
var LIFE_HEADERS={
  clock:   {bg:'linear-gradient(135deg,#E65100,#FF9800)',em:'&#128336;',title:'What Time Is It?'},
  calendar:{bg:'linear-gradient(135deg,#1565C0,#42A5F5)',em:'&#128197;',title:'Calendar'},
  money:   {bg:'linear-gradient(135deg,#2E7D32,#66BB6A)',em:'&#128176;',title:'Money Smart'},
  manners: {bg:'linear-gradient(135deg,#AD1457,#F06292)',em:'&#128591;',title:'Good Manners'},
  safety:  {bg:'linear-gradient(135deg,#B71C1C,#EF5350)',em:'&#128737;',title:'Stay Safe!'}
};

var currentLifeTab='clock';
var lifeShufOn=false;

function showLife(name){
  window.speechSynthesis.cancel();
  currentLifeTab=name;
  lifeShufOn=false;
  document.querySelectorAll('.life-dock-btn').forEach(function(b){b.classList.remove('active');b.style.background='';});
  var btn=document.querySelector('.life-dock-btn[data-tab="'+name+'"]');
  if(btn){btn.classList.add('active');var h=LIFE_HEADERS[name];if(h)btn.style.background=h.bg;}
  var hasShuf=(name==='clock'||name==='safety');
  var shufRowHTML=hasShuf
    ?'<div class="shuf-row"><button class="shuf-toggle" id="lifeShufBtn" onclick="toggleLifeShuf()">&#128256; Shuffle OFF</button></div>'
    :'';
  document.getElementById('lifeMain').innerHTML=shufRowHTML+'<div id="lifeArea"></div>';
  resetLife(name);
  ({clock:buildClock,calendar:buildCalendar,money:buildMoney,manners:buildManners,safety:buildSafety})[name]();
}

function toggleLifeShuf(){
  lifeShufOn=!lifeShufOn;
  var btn=document.getElementById('lifeShufBtn');
  if(btn){btn.classList.toggle('on',lifeShufOn);btn.innerHTML='&#128256; Shuffle '+(lifeShufOn?'ON':'OFF');}
  resetLife(currentLifeTab);
  if(lifeShufOn){
    var ord=currentLifeTab==='clock'?clkOrder:sfOrder;
    ord.sort(function(){return Math.random()-.5;});
  }
  ({clock:buildClock,calendar:buildCalendar,money:buildMoney,manners:buildManners,safety:buildSafety})[currentLifeTab]();
}

function resetLife(name){
  if(name==='clock')   {clkOrder=CLOCK_46.map(function(_,i){return i;});clkIdx=0;clkSc=0;clkAns=false;}
  if(name==='calendar'){calQOrder=CALENDAR_QUIZ.map(function(_,i){return i;});calQIdx=0;calQSc=0;calQAns=false;calMode='days';}
  if(name==='money')   {monQOrder=MONEY_QUIZ.map(function(_,i){return i;});monQIdx=0;monQSc=0;monQAns=false;monMode='learn';}
  if(name==='safety')  {sfOrder=SAFETY_QUIZ.map(function(_,i){return i;});sfIdx=0;sfSc=0;sfAns=false;}
}
function getArea(){return document.getElementById('lifeArea');}
function scoreH(cur,tot,sc){return '<div class="scorebar">Q <b>'+cur+'</b>/'+tot+' &nbsp;&#183;&nbsp; Score: <b>'+sc+'</b></div>';}
function navBtns(prevFn,showNext){
  return '<div class="nav-row">'
    +(prevFn?'<button class="prvbtn" onclick="'+prevFn+'">&#8592; Prev</button>':'')
    +(showNext
      ?'<button class="nxtbtn" id="nxtBtn" onclick="nextLife()">Next &#8594;</button>'
      :'<button class="nxtbtn" id="nxtBtn" style="display:none" onclick="nextLife()">Next &#8594;</button>')
    +'</div>';
}
function showNxt(){var b=document.getElementById('nxtBtn');if(b)b.style.display='inline-block';}
function wrongFlash(el,msgId){el.classList.add('wrong');spk('Try again!');setTimeout(function(){el.classList.remove('wrong');if(msgId)document.getElementById(msgId).innerHTML='';},900);}
function scoreScrn(sc,tot,great,ok,gameId){
  var pct=Math.round(sc/tot*100);
  getArea().innerHTML='<div class="scorescreen">'
    +'<div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div>'
    +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+sc+' / '+tot+'</div>'
    +'<div style="color:#777;margin-bottom:16px">'+(pct>=80?great:pct>=50?ok:'Keep practising!')+'</div>'
    +'<button class="rbtn" onclick="showLife(\''+gameId+'\')">Play Again &#128257;</button></div>';
  spk(pct>=80?great:ok);
}
function shufBar(fn){return '<div style="text-align:right;margin-bottom:8px"><button class="shufbtn" onclick="'+fn+'">&#128256; Shuffle</button></div>';}

/* ── CLOCK ── */
function shuffleClock(){clkOrder.sort(function(){return Math.random()-.5;});clkIdx=0;clkSc=0;clkAns=false;buildClock();}
function buildClock(){
  _nextFn=function(){clkIdx++;clkAns=false;buildClock();};
  if(clkIdx>=CLOCK_46.length){scoreScrn(clkSc,CLOCK_46.length,'Time Teller!','Good clock reading!','clock');return;}
  var p=CLOCK_46[clkOrder[clkIdx]];
  clkAns=false;
  var hAngle=((p.h%12)+p.m/60)*30;
  var mAngle=p.m*6;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.label);
  var optsHTML=opts.map(function(o,i){
    return '<div class="clock-opt" id="copt'+i+'" onclick="chkClock('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=scoreH(clkIdx+1,CLOCK_46.length,clkSc)
    +'<div class="ibox">'
    +'<div class="iq">&#128336; What time is it?</div>'
    +'<div class="clock-face">'
    +'<span class="clock-num n12">12</span>'
    +'<span class="clock-num n3">3</span>'
    +'<span class="clock-num n6">6</span>'
    +'<span class="clock-num n9">9</span>'
    +'<div class="clock-hand-h" style="height:44px;transform:rotate('+hAngle+'deg)"></div>'
    +'<div class="clock-hand-m" style="height:58px;transform:rotate('+mAngle+'deg)"></div>'
    +'</div>'
    +'<div class="clock-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="clkR"></div>'
    +navBtns(clkIdx>0?'clkIdx--;clkAns=false;buildClock()':'',false)
    +'</div>';
  spk('What time does the clock show?');
}
function chkClock(i,ci){
  if(clkAns)return;
  var p=CLOCK_46[clkOrder[clkIdx]];
  var el=document.getElementById('copt'+i);
  if(i===ci){
    clkAns=true;clkSc++;
    el.classList.add('correct');
    document.getElementById('clkR').innerHTML='&#11088; It is '+p.label+'!';
    spk('Correct! It is '+p.label+'!');showNxt();
  }else{wrongFlash(el,'clkR');}
}

/* ── CALENDAR ── */
function buildCalendar(){
  _nextFn=null;
  var calTabs='<div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap">'
    +'<button style="padding:6px 14px;border-radius:12px;border:2px solid #eee;background:'+(calMode==='days'?'#1565C0':'#f5f5f5')+';color:'+(calMode==='days'?'#fff':'#888')+';font-family:var(--f);font-size:.75rem;font-weight:900;cursor:pointer;" onclick="calMode=\'days\';buildCalendar()">Days</button>'
    +'<button style="padding:6px 14px;border-radius:12px;border:2px solid #eee;background:'+(calMode==='months'?'#1565C0':'#f5f5f5')+';color:'+(calMode==='months'?'#fff':'#888')+';font-family:var(--f);font-size:.75rem;font-weight:900;cursor:pointer;" onclick="calMode=\'months\';buildCalendar()">Months</button>'
    +'<button style="padding:6px 14px;border-radius:12px;border:2px solid #eee;background:'+(calMode==='seasons'?'#1565C0':'#f5f5f5')+';color:'+(calMode==='seasons'?'#fff':'#888')+';font-family:var(--f);font-size:.75rem;font-weight:900;cursor:pointer;" onclick="calMode=\'seasons\';buildCalendar()">Seasons</button>'
    +'<button style="padding:6px 14px;border-radius:12px;border:2px solid #eee;background:'+(calMode==='quiz'?'#1565C0':'#f5f5f5')+';color:'+(calMode==='quiz'?'#fff':'#888')+';font-family:var(--f);font-size:.75rem;font-weight:900;cursor:pointer;" onclick="calMode=\'quiz\';calQIdx=0;calQSc=0;calQAns=false;buildCalendar()">Quiz</button>'
    +'</div>';
  if(calMode==='days'){
    var daysHTML='<div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:14px">';
    CALENDAR_DATA.days.forEach(function(d,i){
      daysHTML+='<div class="day-chip" onclick="spk(\''+d+'\')"><b>'+(i+1)+'.</b> '+d+'</div>';
    });
    daysHTML+='</div>';
    getArea().innerHTML=calTabs+'<div class="ibox"><div class="iq">&#128197; Days of the Week</div>'+daysHTML+'<div class="rmsg">&#128266; Tap to hear each day</div></div>';
  } else if(calMode==='months'){
    var monthsHTML='<div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:14px">';
    CALENDAR_DATA.months.forEach(function(m,i){
      monthsHTML+='<div class="month-chip" onclick="spk(\''+(i+1)+'. '+m+'\')"><b>'+(i+1)+'.</b> '+m+'</div>';
    });
    monthsHTML+='</div>';
    getArea().innerHTML=calTabs+'<div class="ibox"><div class="iq">&#128198; Months of the Year</div>'+monthsHTML+'<div class="rmsg">&#128266; Tap to hear each month</div></div>';
  } else if(calMode==='seasons'){
    var seasHTML='';
    CALENDAR_DATA.seasons.forEach(function(s){
      seasHTML+='<div class="season-card" onclick="spk(\''+s.name+'. '+s.months+'\')">'
        +'<b style="font-size:1.1rem">'+s.em+' '+s.name+'</b>'
        +'<span style="font-size:.78rem;opacity:.8;margin-left:8px">'+s.months+'</span>'
        +'</div>';
    });
    getArea().innerHTML=calTabs+'<div class="ibox"><div class="iq">&#127974; The Four Seasons</div>'+seasHTML+'</div>';
  } else {
    buildCalQuiz(calTabs);
  }
}
function buildCalQuiz(tabs){
  _nextFn=function(){calQIdx++;calQAns=false;buildCalendar();};
  if(calQIdx>=CALENDAR_QUIZ.length){scoreScrn(calQSc,CALENDAR_QUIZ.length,'Calendar Expert!','Good time sense!','calendar');return;}
  var p=CALENDAR_QUIZ[calQOrder[calQIdx]];
  calQAns=false;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.opts[p.a]);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="caqopt'+i+'" onclick="chkCalQ('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=(tabs||'')
    +scoreH(calQIdx+1,CALENDAR_QUIZ.length,calQSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="caqR"></div>'
    +navBtns(calQIdx>0?'calQIdx--;calQAns=false;buildCalendar()':'',false)
    +'</div>';
  spk(p.q);
}
function chkCalQ(i,ci){
  if(calQAns)return;
  var p=CALENDAR_QUIZ[calQOrder[calQIdx]];
  var el=document.getElementById('caqopt'+i);
  if(i===ci){
    calQAns=true;calQSc++;
    el.classList.add('correct');
    document.getElementById('caqR').innerHTML='&#11088; '+p.opts[p.a]+'!';
    spk('Correct! '+p.opts[p.a]+'!');showNxt();
  }else{wrongFlash(el,'caqR');}
}

/* ── MONEY ── */
function buildMoney(){
  _nextFn=null;
  var tabs='<div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">'
    +'<button style="padding:7px 16px;border-radius:12px;border:2px solid #eee;background:'+(monMode==='learn'?'#2E7D32':'#f5f5f5')+';color:'+(monMode==='learn'?'#fff':'#888')+';font-family:var(--f);font-size:.75rem;font-weight:900;cursor:pointer;" onclick="monMode=\'learn\';buildMoney()">&#128218; Learn</button>'
    +'<button style="padding:7px 16px;border-radius:12px;border:2px solid #eee;background:'+(monMode==='quiz'?'#2E7D32':'#f5f5f5')+';color:'+(monMode==='quiz'?'#fff':'#888')+';font-family:var(--f);font-size:.75rem;font-weight:900;cursor:pointer;" onclick="monMode=\'quiz\';monQIdx=0;monQSc=0;monQAns=false;buildMoney()">&#127953; Quiz</button>'
    +'</div>';
  if(monMode==='learn'){
    var html=tabs+'<div class="ibox"><div class="iq">&#128176; Indian Coins &amp; Notes</div>';
    MONEY_DATA.forEach(function(m){
      html+='<div class="money-card" onclick="spk(\''+m.coin+'. '+m.fact+'\')">'
        +'<span class="money-em">'+m.em+'</span>'
        +'<div class="money-info"><div class="money-coin">'+m.coin+'</div><div class="money-fact">'+m.fact+'</div></div>'
        +'<div class="money-val">'+m.value+'</div>'
        +'</div>';
    });
    html+='</div>';
    getArea().innerHTML=html;
  } else {
    buildMoneyQuiz(tabs);
  }
}
function buildMoneyQuiz(tabs){
  _nextFn=function(){monQIdx++;monQAns=false;buildMoney();};
  if(monQIdx>=MONEY_QUIZ.length){scoreScrn(monQSc,MONEY_QUIZ.length,'Money Smart!','Good maths!','money');return;}
  var p=MONEY_QUIZ[monQOrder[monQIdx]];
  monQAns=false;
  var opts=p.opts.slice().sort(function(){return Math.random()-.5;});
  var ci=opts.indexOf(p.opts[p.a]);
  var optsHTML=opts.map(function(o,i){
    return '<div class="mcq-opt" id="mqopt'+i+'" onclick="chkMonQ('+i+','+ci+')">'+o+'</div>';
  }).join('');
  getArea().innerHTML=(tabs||'')
    +scoreH(monQIdx+1,MONEY_QUIZ.length,monQSc)
    +'<div class="ibox">'
    +'<div style="text-align:center;font-size:2.5rem;margin-bottom:8px">'+p.em+'</div>'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="mcq-grid">'+optsHTML+'</div>'
    +'<div class="rmsg" id="mqR"></div>'
    +navBtns(monQIdx>0?'monQIdx--;monQAns=false;buildMoney()':'',false)
    +'</div>';
  spk(p.q);
}
function chkMonQ(i,ci){
  if(monQAns)return;
  var p=MONEY_QUIZ[monQOrder[monQIdx]];
  var el=document.getElementById('mqopt'+i);
  if(i===ci){
    monQAns=true;monQSc++;
    el.classList.add('correct');
    document.getElementById('mqR').innerHTML='&#11088; '+p.opts[p.a]+'!';
    spk('Correct! '+p.opts[p.a]+'!');showNxt();
  }else{wrongFlash(el,'mqR');}
}

function buildManners(){
  _nextFn=null;

}
