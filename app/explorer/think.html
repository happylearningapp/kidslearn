<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Think Smart! &#129504;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="../questions.js"></script>
<style>
.subbody{display:block!important;}
.submain{padding:14px 12px calc(90px + env(safe-area-inset-bottom))!important;overflow-y:hidden;overflow-x:hidden;}
#sdrawer{top:66px!important;}

/* ── Bottom dock (7 tabs, single row) ── */
.think-dock{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:5px 3px calc(5px + env(safe-area-inset-bottom));gap:3px;
}
.think-dock-btn{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;padding:5px 2px 4px;border-radius:10px;
  border:none;background:#f5f5f5;color:#999;font-family:var(--f);
  font-size:.44rem;font-weight:800;cursor:pointer;line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.think-dock-btn.active{color:#fff;transform:scale(1.05);}
.think-dock-btn .dock-ico{font-size:.95rem;line-height:1;}
.think-dock-btn[data-tab="patterns"].active  {background:linear-gradient(135deg,#7B1FA2,#E91E63);}
.think-dock-btn[data-tab="sequence"].active  {background:linear-gradient(135deg,#1976D2,#00C9A7);}
.think-dock-btn[data-tab="feelings"].active  {background:linear-gradient(135deg,#FF6B6B,#FF8E53);}
.think-dock-btn[data-tab="spotit"].active    {background:linear-gradient(135deg,#43A047,#FFC300);}
.think-dock-btn[data-tab="sizeitup"].active  {background:linear-gradient(135deg,#00897B,#29B6F6);}
.think-dock-btn[data-tab="whybecause"].active{background:linear-gradient(135deg,#E65100,#FF8E53);}
.think-dock-btn[data-tab="whichmore"].active {background:linear-gradient(135deg,#6A1B9A,#1565C0);}

/* ── Shared game UI ── */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.ibox{background:#fff;border-radius:18px;padding:14px;box-shadow:0 5px 20px rgba(0,0,0,.10);margin-bottom:10px;}
.iq{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:10px;text-align:center;line-height:1.4;}
.rmsg{min-height:20px;text-align:center;font-size:var(--sm);font-weight:900;color:#FF6B6B;margin-bottom:6px;}
.scorebar{background:#f7f7f7;border-radius:12px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#666;margin-bottom:8px;}
.scorescreen{text-align:center;padding:30px 20px;}
.rbtn{padding:13px 32px;border-radius:18px;border:none;background:linear-gradient(135deg,#7B1FA2,#E91E63);color:#fff;font-family:var(--f);font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(123,31,162,.35);transition:all .2s;}
.rbtn:active{transform:scale(.96);}

/* ── Common Shuffle Toggle (matches games.html) ── */
.shuf-row{text-align:center;margin-bottom:8px;}
.shuf-toggle{
  padding:7px 20px;border-radius:20px;border:2px solid #ddd;
  background:#f5f5f5;font-family:var(--f);font-size:var(--sm);
  font-weight:800;cursor:pointer;transition:all .22s;color:#888;
  -webkit-tap-highlight-color:transparent;
}
.shuf-toggle.on{background:linear-gradient(135deg,#E91E63,#FF8E53);color:#fff;border-color:transparent;}

/* ── Options label ── */
.opts-lbl{font-size:var(--sm);font-weight:900;color:#888;text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:6px;}

/* ── PATTERNS ── */
.pat-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.pat-item{font-size:2rem;background:#f5f5f5;border-radius:12px;padding:8px 10px;min-width:46px;text-align:center;}
.pat-blank{font-size:2rem;background:#f0e8ff;border:3px dashed #9C27B0;border-radius:12px;padding:8px 10px;min-width:46px;text-align:center;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.pat-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;}
.pat-opt{font-size:1.9rem;background:#fff;border:3px solid #eee;border-radius:12px;padding:9px 12px;cursor:pointer;transition:all .18s;min-width:56px;text-align:center;-webkit-tap-highlight-color:transparent;}
.pat-opt:hover{transform:scale(1.1);border-color:#9C27B0;}
.pat-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.pat-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── SEQUENCE ── */
.seq-row{display:flex;align-items:center;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.seq-item{font-size:1.9rem;background:#f5f5f5;border-radius:12px;padding:8px 10px;text-align:center;}
.seq-arrow{font-size:1rem;color:#aaa;}
.seq-blank{font-size:1.9rem;background:#e8f4ff;border:3px dashed #1976D2;border-radius:12px;padding:8px 10px;text-align:center;animation:blink 1.2s ease-in-out infinite;}
.seq-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:300px;margin:0 auto 8px;}
.seq-opt{background:#fff;border:3px solid #eee;border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;font-size:.75rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.seq-opt span{font-size:1.6rem;display:block;margin-bottom:3px;}
.seq-opt:hover{transform:scale(1.04);border-color:#1976D2;}
.seq-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.seq-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── FEELINGS ── */
.feel-scene{background:linear-gradient(135deg,#fff7e6,#fff);border-radius:16px;padding:8px 12px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:8px;text-align:center;}
.feel-em{font-size:2.2rem;display:block;margin-bottom:4px;}
.feel-txt{font-size:var(--md);font-weight:900;color:#333;line-height:1.35;}
.feel-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;max-width:320px;margin:0 auto 6px;}
.feel-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:7px 6px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;font-size:.74rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.feel-opt span{font-size:1.5rem;display:block;margin-bottom:2px;}
.feel-opt:hover{transform:scale(1.06);border-color:#FF8E53;}
.feel-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.feel-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── SPOT IT ── */
.spot-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.spot-item{font-size:2rem;background:#f5f5f5;border-radius:12px;padding:9px 10px;cursor:pointer;min-width:48px;text-align:center;border:3px solid transparent;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.spot-item:hover{transform:scale(1.1);border-color:#43A047;}
.spot-item.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.spot-item.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── SIZE IT UP ── */
.size-hint{text-align:center;font-size:.78rem;font-weight:900;color:#00897B;background:#E0F2F1;border-radius:10px;padding:7px 12px;margin-bottom:10px;}
.size-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.size-item{background:#fff;border:3px solid #eee;border-radius:16px;padding:12px 8px;cursor:pointer;text-align:center;font-family:var(--f);font-weight:900;flex:1;min-width:76px;max-width:96px;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.size-item .size-em{font-size:1.9rem;display:block;margin-bottom:5px;}
.size-item .size-lbl{font-size:.58rem;color:#666;}
.size-item:hover{transform:scale(1.06);border-color:#00897B;}
.size-item.done{background:#E8F5E9;border-color:#4CAF50;pointer-events:none;}
.size-item.wrong{animation:shake .4s ease;}
.size-dots{display:flex;gap:8px;justify-content:center;margin-bottom:10px;}
.size-dot{width:14px;height:14px;border-radius:50%;background:#ddd;transition:background .3s;}
.size-dot.done{background:#4CAF50;}

/* ── WHY? BECAUSE! ── */
.why-cause{background:linear-gradient(135deg,#fff8f0,#fff);border-radius:16px;padding:8px 12px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:8px;text-align:center;}
.why-em{font-size:2rem;display:block;margin-bottom:4px;}
.why-txt{font-size:var(--md);font-weight:900;color:#333;margin-bottom:3px;}
.why-q{font-size:.72rem;color:#888;font-weight:700;}
.why-opts{display:grid;grid-template-columns:1fr;gap:5px;max-width:360px;margin:0 auto 6px;}
.why-opt{background:#fff;border:3px solid #eee;border-radius:12px;padding:6px 10px;cursor:pointer;text-align:left;font-family:var(--f);font-weight:700;font-size:.78rem;color:#333;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.why-opt:hover{transform:translateX(4px);border-color:#E65100;}
.why-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.why-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}

/* ── WHICH IS MORE? ── */
.more-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:340px;margin:0 auto 12px;}
.more-box{background:#fff;border:3px solid #eee;border-radius:16px;padding:12px 6px;cursor:pointer;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.more-box:hover{transform:scale(1.04);border-color:#6A1B9A;}
.more-box.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.more-box.wrong{background:#FFEBEE;border-color:#FF6B6B;animation:shake .4s ease;}
.more-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-bottom:6px;max-width:120px;}
.more-dot{font-size:1.3rem;line-height:1;}
.more-count{font-size:1.2rem;font-weight:900;color:#555;}
</style>
</head>
<body data-page-title="&#129504; Think Smart!" data-page-sub="Patterns, Logic &amp; Feelings" data-page-gradient="linear-gradient(135deg,#7B1FA2,#E91E63)" data-page-back="../home.html">

<div class="subbody">
  <div class="submain" id="thinkMain">
    <!-- injected by showThink() -->
  </div>
</div>

<!-- ══ BOTTOM DOCK ══ -->
<nav class="think-dock">
  <button class="think-dock-btn" data-tab="patterns"   onclick="showThink('patterns')">  <span class="dock-ico">&#128257;</span>Patterns</button>
  <button class="think-dock-btn" data-tab="sequence"   onclick="showThink('sequence')">  <span class="dock-ico">&#10145;</span>What Next</button>
  <button class="think-dock-btn" data-tab="feelings"   onclick="showThink('feelings')">  <span class="dock-ico">&#128578;</span>Feelings</button>
  <button class="think-dock-btn" data-tab="spotit"     onclick="showThink('spotit')">    <span class="dock-ico">&#128065;</span>Spot It!</button>
  <button class="think-dock-btn" data-tab="sizeitup"   onclick="showThink('sizeitup')">  <span class="dock-ico">&#128207;</span>Size It!</button>
  <button class="think-dock-btn" data-tab="whybecause" onclick="showThink('whybecause')"><span class="dock-ico">&#129300;</span>Why?</button>
  <button class="think-dock-btn" data-tab="whichmore"  onclick="showThink('whichmore')"> <span class="dock-ico">&#128290;</span>More!</button>
</nav>

<script>

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
var shufState={};  /* per-game shuffle toggle: true = ON */
var patOrder=PAT_DATA.map(function(_,i){return i;}),patIdx=0,patSc=0,patAns=false;
var seqOrder=SEQ_DATA.map(function(_,i){return i;}),seqIdx=0,seqSc=0,seqAns=false;
var feelOrder=FEEL_DATA.map(function(_,i){return i;}),feelIdx=0,feelSc=0,feelAns=false;
var spotOrder=SPOT_DATA.map(function(_,i){return i;}),spotIdx=0,spotSc=0,spotAns=false;
var sizeOrder=SIZE_DATA.map(function(_,i){return i;}),sizeIdx=0,sizeSc=0,sizeTapNext=0,sizeShuf=[];
var whyOrder=WHY_DATA.map(function(_,i){return i;}),whyIdx=0,whySc=0,whyAns=false;
var moreOrder=MORE_DATA.map(function(_,i){return i;}),moreIdx=0,moreSc=0,moreAns=false;

var _nextFn=null;
function nextThink(){if(_nextFn)_nextFn();}

/* ══════════════════════════════════════
   ROUTER
══════════════════════════════════════ */
var THINK_HEADERS={
  patterns:  {bg:'linear-gradient(135deg,#7B1FA2,#E91E63)'},
  sequence:  {bg:'linear-gradient(135deg,#1976D2,#00C9A7)'},
  feelings:  {bg:'linear-gradient(135deg,#FF6B6B,#FF8E53)'},
  spotit:    {bg:'linear-gradient(135deg,#43A047,#FFC300)'},
  sizeitup:  {bg:'linear-gradient(135deg,#00897B,#29B6F6)'},
  whybecause:{bg:'linear-gradient(135deg,#E65100,#FF8E53)'},
  whichmore: {bg:'linear-gradient(135deg,#6A1B9A,#1565C0)'}
};

var THINK_INITS={
  patterns:buildPat,sequence:buildSeq,feelings:buildFeel,
  spotit:buildSpot,sizeitup:buildSize,whybecause:buildWhy,whichmore:buildMore
};

function showThink(name){
  window.speechSynthesis.cancel();
  document.querySelectorAll('.think-dock-btn').forEach(function(b){
    b.classList.remove('active');b.style.background='';
  });
  var btn=document.querySelector('.think-dock-btn[data-tab="'+name+'"]');
  if(btn){
    btn.classList.add('active');
    var h=THINK_HEADERS[name];
    if(h)btn.style.background=''; /* handled by CSS active classes */
  }
  document.getElementById('thinkMain').innerHTML='<div id="thinkArea"></div>';
  resetThink(name);
  THINK_INITS[name]();
}

function resetThink(name){
  shufState[name]=false; /* always reset shuffle to OFF on tab switch */
  if(name==='patterns')  {patOrder=PAT_DATA.map(function(_,i){return i;});patIdx=0;patSc=0;patAns=false;}
  if(name==='sequence')  {seqOrder=SEQ_DATA.map(function(_,i){return i;});seqIdx=0;seqSc=0;seqAns=false;}
  if(name==='feelings')  {feelOrder=FEEL_DATA.map(function(_,i){return i;});feelIdx=0;feelSc=0;feelAns=false;}
  if(name==='spotit')    {spotOrder=SPOT_DATA.map(function(_,i){return i;});spotIdx=0;spotSc=0;spotAns=false;}
  if(name==='sizeitup')  {sizeOrder=SIZE_DATA.map(function(_,i){return i;});sizeIdx=0;sizeSc=0;sizeTapNext=0;}
  if(name==='whybecause'){whyOrder=WHY_DATA.map(function(_,i){return i;});whyIdx=0;whySc=0;whyAns=false;}
  if(name==='whichmore') {moreOrder=MORE_DATA.map(function(_,i){return i;});moreIdx=0;moreSc=0;moreAns=false;}
}

function getThinkArea(){return document.getElementById('thinkArea');}

/* ── Fisher-Yates shuffle ── */
function fisherYates(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}}

/* ── Shuffle toggle bar — same style as games.html ── */
function shufBar(name){
  var on=shufState[name]||false;
  return '<div class="shuf-row"><button class="shuf-toggle'+(on?' on':'')+'" onclick="doToggleShuf(\''+name+'\')">'
    +'&#128256; Shuffle '+(on?'ON':'OFF')+'</button></div>';
}

/* ── Toggle shuffle on/off, restart from Q1 ── */
function doToggleShuf(name){
  shufState[name]=!shufState[name];
  var on=shufState[name];
  spk(on?'Shuffle on':'Shuffle off');
  if(name==='patterns')  {patIdx=0;patSc=0;patOrder=PAT_DATA.map(function(_,i){return i;});if(on)fisherYates(patOrder);buildPat();}
  if(name==='sequence')  {seqIdx=0;seqSc=0;seqOrder=SEQ_DATA.map(function(_,i){return i;});if(on)fisherYates(seqOrder);buildSeq();}
  if(name==='feelings')  {feelIdx=0;feelSc=0;feelOrder=FEEL_DATA.map(function(_,i){return i;});if(on)fisherYates(feelOrder);buildFeel();}
  if(name==='spotit')    {spotIdx=0;spotSc=0;spotOrder=SPOT_DATA.map(function(_,i){return i;});if(on)fisherYates(spotOrder);buildSpot();}
  if(name==='sizeitup')  {sizeIdx=0;sizeSc=0;sizeOrder=SIZE_DATA.map(function(_,i){return i;});if(on)fisherYates(sizeOrder);buildSize();}
  if(name==='whybecause'){whyIdx=0;whySc=0;whyOrder=WHY_DATA.map(function(_,i){return i;});if(on)fisherYates(whyOrder);buildWhy();}
  if(name==='whichmore') {moreIdx=0;moreSc=0;moreOrder=MORE_DATA.map(function(_,i){return i;});if(on)fisherYates(moreOrder);buildMore();}
}

/* ── Helpers ── */
function scoreH(cur,tot,sc){
  return '<div class="scorebar">Q <b>'+cur+'</b>/'+tot+' &nbsp; Score: <b>'+sc+'</b></div>';
}
function navBtns(prevFn){
  return '<div class="nav-row">'
    +(prevFn?'<button class="prvbtn" onclick="'+prevFn+'">&#8592; Prev</button>':'<span></span>')
    +'<button class="nxtbtn" id="nxtBtn" onclick="nextThink()">Next &#8594;</button>'
    +'</div>';
}
function showNxt(){/* Next always visible — no-op */}
function wrongFlash(el,msgId,msg){
  el.classList.add('wrong');
  if(msgId)document.getElementById(msgId).innerHTML=msg;
  spk('Try again!');
  setTimeout(function(){el.classList.remove('wrong');if(msgId)document.getElementById(msgId).innerHTML='';},900);
}
function scoreScrn(sc,tot,great,ok,gameId){
  var pct=Math.round(sc/tot*100);
  getThinkArea().innerHTML='<div class="scorescreen">'
    +'<div style="font-size:4rem">'+(pct>=80?'&#127942;&#127942;&#127942;':pct>=50?'&#127942;&#127942;':'&#127942;')+'</div>'
    +'<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">'+sc+' / '+tot+'</div>'
    +'<div style="color:#777;margin-bottom:16px">'+(pct>=80?great:pct>=50?ok:'Keep trying!')+'</div>'
    +'<button class="rbtn" onclick="showThink(\''+gameId+'\')">Play Again &#128257;</button></div>';
  spk(pct>=80?great:ok);
}

/* ══════════════════════════════════════
   GAME 1 – PATTERNS
══════════════════════════════════════ */
function buildPat(){
  _nextFn=function(){patIdx++;buildPat();};
  if(patIdx>=PAT_DATA.length){scoreScrn(patSc,PAT_DATA.length,'Pattern Master!','Good spotting!','patterns');return;}
  var p=PAT_DATA[patOrder[patIdx]];
  patAns=false;

  var seqHTML=p.seq.map(function(em){return '<div class="pat-item">'+em+'</div>';}).join('')
    +'<div class="pat-blank">&#10067;</div>';

  var optsHTML=p.opts.map(function(em,i){
    return '<div class="pat-opt" id="popt'+i+'" onclick="chkPat('+i+')">'+em+'</div>';
  }).join('');

  getThinkArea().innerHTML=scoreH(patIdx+1,PAT_DATA.length,patSc)
    +shufBar('patterns')
    +'<div class="ibox">'
    +'<div class="iq">&#128257; What comes next in the pattern?</div>'
    +'<div class="pat-row">'+seqHTML+'</div>'
    +'<div class="opts-lbl">Options</div>'
    +'<div class="pat-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="patR"></div>'
    +navBtns(patIdx>0?'patIdx--;buildPat()':'')
    +'</div>';
  spk('What comes next in the pattern?');
}
function chkPat(i){
  if(patAns)return;
  var p=PAT_DATA[patOrder[patIdx]];
  var el=document.getElementById('popt'+i);
  if(p.opts[i]===p.ans){
    patAns=true;patSc++;
    el.classList.add('correct');
    document.getElementById('patR').innerHTML='&#11088; Yes! '+p.ans+' comes next!';
    spk('Correct! Great job!');showNxt();
  }else{wrongFlash(el,'patR','');}
}

/* ══════════════════════════════════════
   GAME 2 – WHAT COMES NEXT? (SEQUENCE)
══════════════════════════════════════ */
function buildSeq(){
  _nextFn=function(){seqIdx++;buildSeq();};
  if(seqIdx>=SEQ_DATA.length){scoreScrn(seqSc,SEQ_DATA.length,'Sequence Star!','Good thinking!','sequence');return;}
  var p=SEQ_DATA[seqOrder[seqIdx]];
  seqAns=false;

  var stepsHTML=p.steps.map(function(em,i){
    return (i>0?'<span class="seq-arrow">&#8594;</span>':'')+'<div class="seq-item">'+em+'</div>';
  }).join('')+'<span class="seq-arrow">&#8594;</span><div class="seq-blank">&#10067;</div>';

  var optsHTML=p.opts.map(function(opt,i){
    return '<div class="seq-opt" id="sopt'+i+'" onclick="chkSeq('+i+')">'
      +'<span>'+opt.e+'</span>'+opt.l+'</div>';
  }).join('');

  getThinkArea().innerHTML=scoreH(seqIdx+1,SEQ_DATA.length,seqSc)
    +shufBar('sequence')
    +'<div class="ibox">'
    +'<div class="iq">'+p.q+'</div>'
    +'<div class="seq-row">'+stepsHTML+'</div>'
    +'<div class="opts-lbl">Options</div>'
    +'<div class="seq-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="seqR"></div>'
    +navBtns(seqIdx>0?'seqIdx--;buildSeq()':'')
    +'</div>';
  spk(p.q);
}
function chkSeq(i){
  if(seqAns)return;
  var p=SEQ_DATA[seqOrder[seqIdx]];
  var el=document.getElementById('sopt'+i);
  if(p.opts[i].e===p.ans){
    seqAns=true;seqSc++;
    el.classList.add('correct');
    document.getElementById('seqR').innerHTML='&#11088; '+p.opts[i].e+' '+p.opts[i].l+'! Correct!';
    spk('Correct! Well done!');showNxt();
  }else{wrongFlash(el,'seqR','');}
}

/* ══════════════════════════════════════
   GAME 3 – FEELINGS
══════════════════════════════════════ */
function buildFeel(){
  _nextFn=function(){feelIdx++;buildFeel();};
  if(feelIdx>=FEEL_DATA.length){scoreScrn(feelSc,FEEL_DATA.length,'Feelings Expert!','Good empathy!','feelings');return;}
  var p=FEEL_DATA[feelOrder[feelIdx]];
  feelAns=false;

  var optsHTML=p.opts.map(function(opt,i){
    return '<div class="feel-opt" id="fopt'+i+'" onclick="chkFeel('+i+')">'
      +'<span>'+opt.e+'</span>'+opt.l+'</div>';
  }).join('');

  getThinkArea().innerHTML=scoreH(feelIdx+1,FEEL_DATA.length,feelSc)
    +shufBar('feelings')
    +'<div class="ibox">'
    +'<div class="feel-scene"><span class="feel-em">'+p.em+'</span><div class="feel-txt">'+p.text+'</div></div>'
    +'<div class="iq" style="font-size:var(--sm);margin-bottom:8px">How would you feel? &#128578;</div>'
    +'<div class="feel-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="feelR"></div>'
    +navBtns(feelIdx>0?'feelIdx--;buildFeel()':'')
    +'</div>';
  spk(p.text+' How do you feel?');
}
function chkFeel(i){
  if(feelAns)return;
  var p=FEEL_DATA[feelOrder[feelIdx]];
  var el=document.getElementById('fopt'+i);
  if(i===p.ans){
    feelAns=true;feelSc++;
    el.classList.add('correct');
    document.getElementById('feelR').innerHTML='&#11088; '+p.opts[p.ans].e+' '+p.opts[p.ans].l+'!';
    spk('Correct! '+p.opts[p.ans].l+'!');showNxt();
  }else{wrongFlash(el,'feelR','');}
}

/* ══════════════════════════════════════
   GAME 4 – SPOT IT!
══════════════════════════════════════ */
function buildSpot(){
  _nextFn=function(){spotIdx++;buildSpot();};
  if(spotIdx>=SPOT_DATA.length){scoreScrn(spotSc,SPOT_DATA.length,'Eagle Eyes!','Sharp vision!','spotit');return;}
  var p=SPOT_DATA[spotOrder[spotIdx]];
  spotAns=false;

  var rowHTML=p.row.map(function(em,i){
    return '<div class="spot-item" id="spitem'+i+'" onclick="chkSpot('+i+')">'+em+'</div>';
  }).join('');

  getThinkArea().innerHTML=scoreH(spotIdx+1,SPOT_DATA.length,spotSc)
    +shufBar('spotit')
    +'<div class="ibox">'
    +'<div class="iq">&#128065; Tap the one that is DIFFERENT!</div>'
    +'<div class="spot-row">'+rowHTML+'</div>'
    +'<div class="rmsg" id="spotR"></div>'
    +navBtns(spotIdx>0?'spotIdx--;buildSpot()':'')
    +'</div>';
  spk('Find the one that is different! Tap it!');
}
function chkSpot(i){
  if(spotAns)return;
  var p=SPOT_DATA[spotOrder[spotIdx]];
  var el=document.getElementById('spitem'+i);
  if(i===p.odd){
    spotAns=true;spotSc++;
    el.classList.add('correct');
    document.getElementById('spotR').innerHTML='&#11088; You found it!';
    spk('You found the different one! Great eyes!');showNxt();
  }else{wrongFlash(el,'spotR','');}
}

/* ══════════════════════════════════════
   GAME 5 – SIZE IT UP!  (no shuffle — ordering IS the game)
══════════════════════════════════════ */
function buildSize(){
  _nextFn=function(){sizeIdx++;buildSize();};
  if(sizeIdx>=SIZE_DATA.length){scoreScrn(sizeSc,SIZE_DATA.length,'Size Expert!','Good ordering!','sizeitup');return;}
  var p=SIZE_DATA[sizeOrder[sizeIdx]];
  sizeTapNext=0;

  sizeShuf=[0,1,2].sort(function(){return Math.random()-.5;});

  var dotsHTML='<div class="size-dots">'
    +'<div class="size-dot" id="sdot0"></div>'
    +'<div class="size-dot" id="sdot1"></div>'
    +'<div class="size-dot" id="sdot2"></div>'
    +'</div>';

  var hints=['Tap the SMALLEST first!','Now tap the MIDDLE one!','Now tap the BIGGEST!'];

  var itemsHTML='<div class="size-row">'+sizeShuf.map(function(origIdx,dispIdx){
    var it=p.items[origIdx];
    return '<div class="size-item" id="sitem'+dispIdx+'" onclick="chkSize('+dispIdx+','+origIdx+')">'
      +'<span class="size-em">'+it.e+'</span>'
      +'<div class="size-lbl">'+it.l+'</div>'
      +'</div>';
  }).join('')+'</div>';

  getThinkArea().innerHTML=scoreH(sizeIdx+1,SIZE_DATA.length,sizeSc)
    +shufBar('sizeitup')
    +'<div class="ibox">'
    +'<div class="iq">&#128207; Tap SMALLEST &#8594; BIGGEST!</div>'
    +'<div class="size-hint" id="sizeHint">'+hints[0]+'</div>'
    +dotsHTML
    +itemsHTML
    +'<div class="rmsg" id="sizeR"></div>'
    +navBtns(sizeIdx>0?'sizeIdx--;buildSize()':'')
    +'</div>';
  spk('Tap from smallest to biggest!');
}
function chkSize(dispIdx,origIdx){
  if(sizeTapNext>2)return;
  var el=document.getElementById('sitem'+dispIdx);
  if(el.classList.contains('done'))return;
  if(origIdx===sizeTapNext){
    el.classList.add('done');
    document.getElementById('sdot'+sizeTapNext).classList.add('done');
    sizeTapNext++;
    var hints=['Tap the SMALLEST first!','Now tap the MIDDLE one!','Now tap the BIGGEST!','Perfect order! &#127942;'];
    var hEl=document.getElementById('sizeHint');
    if(hEl)hEl.innerHTML=hints[sizeTapNext];
    if(sizeTapNext===3){
      sizeSc++;
      document.getElementById('sizeR').innerHTML='&#11088; Perfect order!';
      spk('Amazing! You sorted them all correctly!');
      showNxt();
    }else{
      spk(hints[sizeTapNext].replace(/&#\d+;/g,''));
    }
  }else{
    el.classList.add('wrong');
    spk('Try again! Find the smaller one first!');
    setTimeout(function(){el.classList.remove('wrong');},900);
  }
}

/* ══════════════════════════════════════
   GAME 6 – WHY? BECAUSE!
══════════════════════════════════════ */
function buildWhy(){
  _nextFn=function(){whyIdx++;buildWhy();};
  if(whyIdx>=WHY_DATA.length){scoreScrn(whySc,WHY_DATA.length,'Logic Champion!','Good reasoning!','whybecause');return;}
  var p=WHY_DATA[whyOrder[whyIdx]];
  whyAns=false;

  var allOpts=[p.ans].concat(p.wrong);
  allOpts.sort(function(){return Math.random()-.5;});
  var correctIdx=allOpts.indexOf(p.ans);

  var optsHTML=allOpts.map(function(opt,i){
    return '<div class="why-opt" id="wopt'+i+'" onclick="chkWhy('+i+','+correctIdx+')">'+opt+'</div>';
  }).join('');

  getThinkArea().innerHTML=scoreH(whyIdx+1,WHY_DATA.length,whySc)
    +shufBar('whybecause')
    +'<div class="ibox">'
    +'<div class="why-cause">'
    +'<span class="why-em">'+p.em+'</span>'
    +'<div class="why-txt">'+p.cause+'</div>'
    +'<div class="why-q">What happens because of this? &#129300;</div>'
    +'</div>'
    +'<div class="why-opts">'+optsHTML+'</div>'
    +'<div class="rmsg" id="whyR"></div>'
    +navBtns(whyIdx>0?'whyIdx--;buildWhy()':'')
    +'</div>';
  spk(p.cause+'. What happens because of this?');
}
function chkWhy(i,correctIdx){
  if(whyAns)return;
  var el=document.getElementById('wopt'+i);
  if(i===correctIdx){
    whyAns=true;whySc++;
    el.classList.add('correct');
    document.getElementById('whyR').innerHTML='&#11088; That\'s right!';
    spk('Correct! Good thinking!');showNxt();
  }else{wrongFlash(el,'whyR','');}
}

/* ══════════════════════════════════════
   GAME 7 – WHICH IS MORE?
══════════════════════════════════════ */
function buildMore(){
  _nextFn=function(){moreIdx++;buildMore();};
  if(moreIdx>=MORE_DATA.length){scoreScrn(moreSc,MORE_DATA.length,'Counting Champion!','Good counting!','whichmore');return;}
  var p=MORE_DATA[moreOrder[moreIdx]];
  moreAns=false;

  function makeGroup(count,em){
    var dots='<div class="more-dots">';
    for(var i=0;i<count;i++)dots+='<span class="more-dot">'+em+'</span>';
    return dots+'</div><div class="more-count">'+count+'</div>';
  }

  getThinkArea().innerHTML=scoreH(moreIdx+1,MORE_DATA.length,moreSc)
    +shufBar('whichmore')
    +'<div class="ibox">'
    +'<div class="iq">&#128290; Tap the group with MORE!</div>'
    +'<div class="more-row">'
    +'<div class="more-box" id="mboxL" onclick="chkMore(\'left\')">'+makeGroup(p.left,p.em)+'</div>'
    +'<div class="more-box" id="mboxR" onclick="chkMore(\'right\')">'+makeGroup(p.right,p.em)+'</div>'
    +'</div>'
    +'<div class="rmsg" id="moreR"></div>'
    +navBtns(moreIdx>0?'moreIdx--;buildMore()':'')
    +'</div>';
  spk('Which group has more? Tap it!');
}
function chkMore(side){
  if(moreAns)return;
  moreAns=true;
  var p=MORE_DATA[moreOrder[moreIdx]];
  var isCorrect=(side===p.ans);
  var el=document.getElementById(side==='left'?'mboxL':'mboxR');
  var otherEl=document.getElementById(side==='left'?'mboxR':'mboxL');
  if(isCorrect){
    moreSc++;
    el.classList.add('correct');
    document.getElementById('moreR').innerHTML='&#11088; That group has more!';
    spk('Correct! That group has more!');
  }else{
    el.classList.add('wrong');
    otherEl.classList.add('correct');
    var p2=MORE_DATA[moreOrder[moreIdx]];
    document.getElementById('moreR').innerHTML='The other group had '+(p2.ans==='left'?p2.left:p2.right)+' — more!';
    spk('Not quite! The other side has more!');
  }
  showNxt();
}
