<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABC World &#128292;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<style>
/* ══════════════════════════════════════════
   abc.html – mobile-first, kids-friendly redesign
   Bottom dock navigation (YouTube Kids / Duolingo style)
   ══════════════════════════════════════════ */

/* ── Layout: full column, content above bottom dock ── */
.subbody {
  flex-direction: column;
  min-height: calc(100vh - 95px);
}

/* ── Hide the shared sidebar tabs ── */
.stabs { display: none; }

/* ── Fixed bottom navigation dock ── */
.abc-dock {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: #fff;
  box-shadow: 0 -3px 20px rgba(0,0,0,.13);
  display: flex;
  padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
  gap: 4px;
}

.abc-dock-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 2px 6px;
  border-radius: 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--f);
  font-size: 0.58rem;
  font-weight: 900;
  color: #bbb;
  min-height: 64px;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color: transparent;
}

.abc-dock-btn .dock-ico {
  font-size: 1.65rem;
  display: block;
  line-height: 1;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}

/* Active state – each tab gets its own colour */
.abc-dock-btn.active { color: #fff; }
.abc-dock-btn.active .dock-ico { transform: translateY(-4px) scale(1.18); }

.abc-dock-btn[data-tab="alpha"].active  { background: #FF6B6B; }
.abc-dock-btn[data-tab="phonics"].active{ background: #FF8E53; }
.abc-dock-btn[data-tab="sight"].active  { background: #C2185B; }
.abc-dock-btn[data-tab="action"].active { background: #F57C00; }
.abc-dock-btn[data-tab="opp"].active    { background: #00897B; }
.abc-dock-btn[data-tab="trace"].active  { background: #7B1FA2; }
.abc-dock-btn[data-tab="find"].active   { background: #2E7D32; }

/* Inactive hover */
.abc-dock-btn:hover:not(.active) { background: #f5f5f5; color: #888; }
.abc-dock-btn:hover:not(.active) .dock-ico { transform: translateY(-2px); }

/* Dot indicator on inactive tabs */
.abc-dock-btn::after {
  content: '';
  display: block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: transparent;
  margin-top: 2px;
  transition: background .2s;
}
.abc-dock-btn.active::after { background: rgba(255,255,255,.7); }

/* ── Push content above the dock ── */
.submain {
  flex: 1;
  padding: 6px 10px calc(76px + env(safe-area-inset-bottom));
  overflow-y: auto;
  overflow-x: hidden;
}

/* ── Tab sections — self-contained, no dependency on shared.js timing ── */
.sec        { display: none; max-width: 800px; margin: 0 auto; }
.sec.active { display: block; }

/* ── Big letter box — tappable ── */
#lb { cursor: pointer; user-select: none; }

/* ── Word / phonics cards grid ── */
.cgrid  { gap: 7px; }
.crd    { padding: 9px 4px 7px; border-radius: 14px; }
.crdem  { font-size: calc(var(--b) * 2); }
.crdlbl { font-size: calc(var(--b) * 0.72); }

/* card grid — no extra padding needed (nav is in normal flow) */
#ac { padding-bottom: 0; }

/* ── Nav row — normal flow, no sticky ── */
.alpha-nav {
  background: rgba(255,253,231,.96);
  border-radius: 18px;
  margin-top: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
}
.alpha-nav-btn {
  padding: 10px 8px;
  min-height: 42px;
  font-size: var(--sm);
}

/* ── A-Z toggle button ── */
.alpha-toggle { padding: 9px 14px; font-size: var(--sm); margin-bottom: 8px; }

/* Dummy for stabico used elsewhere */
.stabico { display: none; }

/* ── Letter selector grid (A–Z buttons) ── */
.selgrid {
  gap: 8px;
  margin-bottom: 16px;
}
.selbtn {
  padding: 10px 12px;
  font-size: var(--lg);
  font-weight: 900;
  min-width: 48px;
  min-height: 48px;
  border-radius: 14px;
  transition: all .18s;
}

/* ── Big letter display box ── */
#lb {
  border-radius: 22px;
  padding: clamp(10px, 2.5vh, 20px) 14px clamp(8px, 2vh, 18px);
  margin-bottom: 8px;
  text-align: center;
}
#blc {
  font-size: clamp(4.5rem, 14vh, 8rem);
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-shadow: 0 4px 12px rgba(0,0,0,.18);
  display: block;
}
#bls {
  font-size: clamp(2rem, 5vh, 3rem);
  color: rgba(255,255,255,.75);
  font-weight: 700;
  display: block;
  margin-top: 4px;
}

/* ── Word cards grid ── */
.cgrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
@media(min-width: 480px) {
  .cgrid { grid-template-columns: repeat(4, 1fr); }
}
@media(min-width: 680px) {
  .cgrid { grid-template-columns: repeat(5, 1fr); }
}

/* Bigger cards for kids */
.crd {
  padding: 8px 4px 6px;
  border-radius: 14px;
  cursor: pointer;
  transition: transform .17s;
}
.crd:active { transform: scale(.95); }
.crdem  { font-size: 1.8rem; }
.crdlbl { font-size: var(--sm); font-weight: 700; }

/* ── Phonics section header box ── */
.bigbox {
  margin-bottom: 16px;
  border-radius: 24px;
  padding: 18px 14px;
}
.bigchar { font-size: calc(var(--b) * 3.5); }
.bigsub  { font-size: var(--lg); margin-top: 6px; }

/* ── Opposites ── */
.oppgrid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
@media(min-width: 480px) {
  .oppgrid { grid-template-columns: repeat(2, 1fr); }
}
.opppair {
  padding: 14px 12px;
  border-radius: 18px;
}
.opppair:active { transform: scale(.97); }
.oppem   { font-size: calc(var(--b) * 2.4); }
.oppword { font-size: calc(var(--b) * 0.9); font-weight: 700; }

/* ── Letter Tracing ── */
.trsel {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
  margin-bottom: 16px;
}
.trbtn {
  padding: 9px 14px;
  border-radius: 12px;
  border: none;
  background: #fff;
  color: #333;
  font-weight: 900;
  font-size: var(--md);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
  min-width: 46px;
  min-height: 46px;
  text-align: center;
  transition: all .15s;
  font-family: var(--f);
}
.trbtn.active { background: #FF6B6B; color: #fff; box-shadow: 0 3px 10px rgba(255,107,107,.45); }

.trwrap {
  background: #fff;
  border-radius: 18px;
  padding: 12px 12px 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,.10);
  text-align: center;
  margin-bottom: 8px;
}
.trwrap h3 {
  font-size: clamp(3rem, 10vh, 5rem);
  font-weight: 900;
  color: #FF6B6B;
  margin-bottom: 2px;
  line-height: 1;
}
.trwrap p {
  font-size: .68rem;
  color: #bbb;
  margin-bottom: 8px;
}

#trCanvas {
  border: 3px dashed #FF6B6B;
  border-radius: 16px;
  touch-action: none;
  cursor: crosshair;
  background: #FFF9F9;
  display: block;
  margin: 0 auto;
  width: 100%;
  max-width: 340px;
  height: clamp(200px, 28vh, 300px);
}

.trbtns {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 8px;
  flex-wrap: nowrap;
}
.trb {
  flex: 1;
  padding: 9px 8px;
  border-radius: 14px;
  border: none;
  font-family: var(--f);
  font-size: var(--sm);
  font-weight: 700;
  cursor: pointer;
  min-height: 38px;
}
.trb-g { background: #1976D2; color: #fff; }
.trb-c { background: #FF6B6B; color: #fff; }

.trtip {
  background: #FFF3E0;
  border-radius: 12px;
  padding: 6px 12px;
  font-size: .68rem;
  font-weight: 700;
  color: #F57C00;
  text-align: center;
  margin-bottom: 6px;
}

/* ── Color swatches ── */
.cswatch {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin: 0 auto 9px;
  box-shadow: 0 5px 15px rgba(0,0,0,.2);
  border: 5px solid rgba(255,255,255,.6);
}

/* ── Show / Hide A–Z toggle button ── */
.alpha-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px 20px;
  border-radius: 16px;
  border: 2.5px dashed #FF6B6B;
  background: #FFF5F5;
  color: #FF6B6B;
  font-family: var(--f);
  font-size: var(--md);
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.alpha-toggle.open {
  background: #FF6B6B;
  color: #fff;
  border-style: solid;
}
/* ── Common shuffle toggle (matches games/think pages) ── */
.shuf-row { text-align:center; margin-bottom:8px; }

/* ══ Find the Letter game ══ */
.find-question {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 900;
  color: #333;
  margin-bottom: 14px;
  padding: 14px 12px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 3px 14px rgba(0,0,0,.09);
}
.find-target {
  font-size: 2.8rem;
  color: #FF6B6B;
  display: inline-block;
  animation: bounce .5s ease;
  line-height: 1;
}
.find-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}
@media(min-width: 480px) { .find-grid { grid-template-columns: repeat(4, 1fr); } }
.find-opt {
  aspect-ratio: 1;
  border: none;
  border-radius: 20px;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 5px 16px rgba(0,0,0,.18);
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color: transparent;
  font-family: var(--f);
  text-shadow: 0 2px 6px rgba(0,0,0,.22);
  position: relative;
  overflow: hidden;
}
.find-opt:active { transform: scale(.88); }
.find-opt.find-correct {
  animation: popIn .35s ease forwards;
  outline: 5px solid #4CAF50;
  outline-offset: 2px;
}
.find-opt.find-wrong { animation: shake .4s ease; }
.find-feedback {
  text-align: center;
  font-size: 1.05rem;
  font-weight: 900;
  min-height: 40px;
  padding: 8px 12px;
  border-radius: 14px;
  margin-bottom: 4px;
  transition: all .25s;
}
.find-feedback.ok  { background: #E8F5E9; color: #2E7D32; }
.find-feedback.bad { background: #FFEBEE; color: #C62828; }
.shuf-toggle {
  padding:7px 20px; border-radius:20px; border:2px solid #ddd;
  background:#f5f5f5; font-family:var(--f); font-size:var(--sm);
  font-weight:800; cursor:pointer; transition:all .22s; color:#888;
  -webkit-tap-highlight-color:transparent;
}
.shuf-toggle.on { background:linear-gradient(135deg,#E91E63,#FF8E53); color:#fff; border-color:transparent; }

/* A-Z selector — hidden by default, shown via .open class */
#lg, #trSel {
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 8px;
}
#lg.open, #trSel.open { display: flex; }

/* ── Prev / Next letter nav buttons ── */
.alpha-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px;
}
.alpha-nav-btn {
  flex: 1;
  padding: 10px 8px;
  border-radius: 14px;
  border: none;
  background: #fff;
  color: #FF6B6B;
  font-family: var(--f);
  font-size: var(--sm);
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,.1);
  min-height: 40px;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color: transparent;
}
.alpha-nav-btn:active { transform: scale(.93); }

/* ── Phonics sound card (fills the 6th empty slot in word grid) ── */
.phcard {
  background: linear-gradient(135deg,#FFF8E1,#FFE082) !important;
  border: 3px solid rgba(255,142,83,.4) !important;
  position: relative;
  overflow: hidden;
}
.phcard::before {
  content: '';
  position: absolute;
  top: -10px; right: -10px;
  width: 40px; height: 40px;
  background: #FF8E53;
  border-radius: 50%;
  opacity: .15;
}
.phsound {
  font-size: calc(var(--b) * 0.78);
  font-weight: 900;
  color: #FF8E53;
  margin-top: 3px;
  letter-spacing: .4px;
}
.phsay {
  font-size: calc(var(--b) * 1.6);
  font-weight: 900;
  color: #E65100;
}



</style>
</head>
<body data-page-title="&#128292; ABC World" data-page-sub="Letters &amp; Language" data-page-gradient="linear-gradient(135deg,#FF6B6B,#FF8E53)" data-page-back="../home.html">
<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML=
    '<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'+
    '<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'+
    '<div class="hdr-right">'+
      '<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'+
      '<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'+
    '</div>';
})();</script>

<div class="subbody">

  <div class="submain">

    <!-- A-Z -->
    <div id="abc-alpha" class="sec active">

      <!-- Shuffle toggle row -->
      <div class="shuf-row">
        <button class="shuf-toggle" id="alphaShufBtn" onclick="shuffleAlpha()">&#128256; Shuffle OFF</button>
      </div>
      <!-- A-Z letter selector toggle -->
      <button class="alpha-toggle" id="alphaToggle" onclick="toggleAlpha()">
        &#128292; Show A&#8211;Z Alphabet &nbsp;&#9660;
      </button>

      <!-- Collapsible A-Z letter selector (hidden by default) -->
      <div class="selgrid" id="lg"></div>

      <!-- Big letter display – tap to hear the letter -->
      <div class="bigbox" id="lb" onclick="spk(curL.toLowerCase())">
        <div class="bigchar" id="blc"></div>
        <div class="bigsub"  id="bls"></div>
      </div>

      <!-- 5 word cards + 1 phonics sound card (fills empty 6th slot) -->
      <div class="cgrid" id="ac"></div>

      <!-- Prev / Next nav – at bottom for easy single-hand reach -->
      <div class="alpha-nav">
        <button class="alpha-nav-btn" id="prevBtn" onclick="prevL()" style="visibility:hidden">&#8592; ?</button>
        <button class="alpha-nav-btn" id="nextBtn" onclick="nextL()">B &#8594;</button>
      </div>

    </div>

    <!-- Sight Words -->
    <div id="abc-sight" class="sec">
      <div class="cgrid" id="sightCards"></div>
    </div>

    <!-- Action Words -->
    <div id="abc-action" class="sec">
      <div class="cgrid" id="actionCards"></div>
    </div>

    <!-- Opposites -->
    <div id="abc-opp" class="sec">
      <div class="oppgrid" id="opCards"></div>
    </div>

    <!-- Find the Letter -->
    <div id="abc-find" class="sec">
      <!-- Shuffle toggle -->
      <div class="shuf-row">
        <button class="shuf-toggle" id="findShufBtn" onclick="toggleFindShuffle()">&#128256; Shuffle OFF</button>
      </div>
      <!-- Dynamic content injected here -->
      <div id="findArea"></div>
    </div>

    <!-- Letter Tracing -->
    <div id="abc-trace" class="sec">
      <!-- Toggle A-Z letter selector -->
      <button class="alpha-toggle" id="trAlphaToggle" onclick="toggleTrAlpha()">
        &#9999; Show A&#8211;Z Letters &nbsp;&#9660;
      </button>
      <!-- Collapsible letter selector (hidden by default) -->
      <div class="trsel" id="trSel"></div>
      <div class="trwrap">
        <h3 id="trLetter">A</h3>
        <p>Trace with finger or mouse!</p>
        <canvas id="trCanvas" width="300" height="260"></canvas>
        <div class="trbtns">
          <button class="trb trb-g" id="trGuideBtn" onclick="toggleGuide()">Guide</button>
          <button class="trb trb-c" onclick="clearTrOnly()">Clear</button>
        </div>
      </div>
      <div class="trtip">&#128161; Guide shown by default &#8212; trace over it, then tap Clear to try again!</div>

      <!-- Prev / Next nav – at bottom for easy single-hand reach -->
      <div class="alpha-nav">
        <button class="alpha-nav-btn" id="trPrevBtn" onclick="trPrevL()" style="visibility:hidden">&#8592; ?</button>
        <button class="alpha-nav-btn" id="trNextBtn" onclick="trNextL()">B &#8594;</button>
      </div>
    </div>

  </div>
</div>

var alphaShuffled = false;
var alphaOriginal = Object.keys(AD); // A–Z original order

function fisherYates(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
}

function shuffleAlpha(){
  var btn = document.getElementById('alphaShufBtn');
  alphaShuffled = !alphaShuffled;
  btn.classList.toggle('on', alphaShuffled);
  btn.innerHTML = '&#128256; Shuffle ' + (alphaShuffled ? 'ON' : 'OFF');
  if(alphaShuffled){
    letters = alphaOriginal.slice();
    fisherYates(letters);
    spk('Shuffle on');
  } else {
    letters = alphaOriginal.slice();
    spk('Shuffle off');
  }
  buildAlphaGrid();
  rL(letters[0]);
}

// Dock tab switcher
function swDock(tab) {
  try { if(window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e) {}

  document.querySelectorAll('.sec').forEach(function(s){

/* ── LETTER TRACING ── */
var trABC='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var trLetter='A',trDrawing=false,trCanvas,trCtx,trGuideShown=false;

// Central function: activate a tracing letter (show guide + speak + update nav)
function trActiveLetter(l){
  trLetter=l;
  document.getElementById('trLetter').textContent=l;
  drawGuide(true);  // show guide silently
  spk(l.toLowerCase()); // lowercase prevents TTS saying "Capital B" etc.
  updateTrNav(l);
  document.querySelectorAll('.trbtn').forEach(function(b){b.classList.toggle('active',b.textContent===l);});
}
function updateTrNav(l){
  var i=trABC.indexOf(l);
  var pb=document.getElementById('trPrevBtn'),nb=document.getElementById('trNextBtn');
  pb.style.visibility=i===0?'hidden':'visible';
  if(i>0) pb.innerHTML='&#8592; '+trABC[i-1];
  nb.style.visibility=i===25?'hidden':'visible';
  if(i<25) nb.innerHTML=trABC[i+1]+' &#8594;';
}
function trPrevL(){var i=trABC.indexOf(trLetter);if(i>0)trActiveLetter(trABC[i-1]);}
function trNextL(){var i=trABC.indexOf(trLetter);if(i<25)trActiveLetter(trABC[i+1]);}
function toggleTrAlpha(){
  var g=document.getElementById('trSel'),btn=document.getElementById('trAlphaToggle');
  var nowShown=!g.classList.contains('open');
  g.classList.toggle('open',nowShown);
  btn.classList.toggle('open',nowShown);
  btn.innerHTML=(nowShown?'&#9999; Hide A&#8211;Z Letters &nbsp;&#9650;':'&#9999; Show A&#8211;Z Letters &nbsp;&#9660;');
}

document.addEventListener('DOMContentLoaded',function(){
  var el=document.getElementById('trSel');
  trABC.split('').forEach(function(l){
    var b=document.createElement('button');
    b.className='trbtn'+(l==='A'?' active':'');
    b.textContent=l;
    b.onclick=function(){trActiveLetter(l);};
    el.appendChild(b);
  });
  trCanvas=document.getElementById('trCanvas');
  trCtx=trCanvas.getContext('2d');
  // Sync canvas buffer size to its CSS-rendered size so coords stay accurate
  trCanvas.width=trCanvas.offsetWidth||300;
  trCanvas.height=trCanvas.offsetHeight||240;
  setupTr();
  drawGuide(true);   // show guide by default on load
  updateTrNav('A');  // init nav state
});
function setupTr(){trCtx.fillStyle='#FFF9F9';trCtx.fillRect(0,0,trCanvas.width,trCanvas.height);trCtx.strokeStyle='#FF6B6B';trCtx.lineWidth=7;trCtx.lineCap='round';trCtx.lineJoin='round';}
function clearTr(){setupTr();}
function clearTrOnly(){
  clearTr();                          // wipe canvas
  if(trGuideShown) drawGuide(true);   // redraw guide silently if it was visible
}
function drawGuide(silent){
  clearTr();
  var sz=Math.round(trCanvas.height*0.78);
  trCtx.font='bold '+sz+'px Nunito,sans-serif';trCtx.fillStyle='rgba(255,107,107,0.14)';
  trCtx.textAlign='center';trCtx.textBaseline='middle';trCtx.fillText(trLetter,trCanvas.width/2,trCanvas.height/2);
  trCtx.strokeStyle='#FF6B6B';trCtx.lineWidth=7;trCtx.lineCap='round';trCtx.lineJoin='round';
  trGuideShown=true;
  var btn=document.getElementById('trGuideBtn');if(btn)btn.textContent='Hide';
  if(!silent)spk(trLetter+'! Trace the letter '+trLetter);
}
function toggleGuide(){
  if(trGuideShown){clearTr();trGuideShown=false;document.getElementById('trGuideBtn').textContent='Guide';}
  else{drawGuide();}
}
function gPos(e){var r=trCanvas.getBoundingClientRect();var sx=trCanvas.width/r.width,sy=trCanvas.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
/* ══════════════════════════════════════════
   FIND THE LETTER GAME
   ══════════════════════════════════════════ */
var FIND_ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
var findIdx = 0;
var findShuffled = false;
var findAnswered = false;
var findCorrectLetter = '';
var findInitDone = false;

var FIND_COLS = [
  '#FF6B6B','#FF8E53','#FFC300','#8BC34A','#56D364',
  '#00C9A7','#0097A7','#1976D2','#7B1FA2','#C2185B',
  '#E91E63','#FF5722','#00BCD4','#4CAF50','#FF7043',
  '#2196F3','#9C27B0','#E040FB','#F06292','#FF8A65',
  '#80DEEA','#DCE775','#4DB6AC','#81C784','#BA68C8','#FFD54F'
];

function shuffArr(a) {
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function buildFindGame() {
  findAnswered = false;
  var letter = FIND_ALPHA[findIdx];
  findCorrectLetter = letter;

  // Always 9 options
  var distractors = shuffArr(FIND_ALPHA.filter(function(l){ return l !== letter; })).slice(0, 8);
  var options = shuffArr(distractors.concat(letter));

  // Shuffle a fresh copy of colors for this round
  var cols = shuffArr(FIND_COLS.slice());

  // Question — show letter only when sound is off, tap to repeat when sound is on
  var soundOff = (typeof isSoundOn === 'function') && !isSoundOn();
  var html = '<div class="find-question" onclick="spk(\'Can you find the letter \'+findCorrectLetter)" style="cursor:pointer">'
    + '&#128269; Can you find the letter' + (soundOff ? ' ' + letter + '?' : '?')
    + '<div style="font-size:.72rem;color:#aaa;font-weight:700;margin-top:4px">' + (soundOff ? '' : '&#128266; Tap to hear again') + '</div>'
    + '</div>';
  html += '<div class="find-grid">';
  options.forEach(function(opt, i) {
    html += '<button class="find-opt" style="background:'+cols[i % cols.length]+'" onclick="chkFind(this,\''+opt+'\')" data-letter="'+opt+'">'+opt+'</button>';
  });
  html += '</div>';
  html += '<div class="find-feedback" id="findFeedback"></div>';

  // Nav — generic labels, no letter names
  var prevHide = findIdx === 0 ? 'style="visibility:hidden"' : '';
  var nextHide = (findIdx === FIND_ALPHA.length - 1 && !findShuffled) ? 'style="visibility:hidden"' : '';

  html += '<div class="alpha-nav" style="margin-top:10px">';
  html += '<button class="alpha-nav-btn" '+prevHide+' onclick="findPrev()">&#8592; Prev</button>';
  html += '<button class="alpha-nav-btn" '+nextHide+' onclick="findNext()">Next &#8594;</button>';
  html += '</div>';

  document.getElementById('findArea').innerHTML = html;
  spk('Can you find the letter ' + letter);
}

function chkFind(btn, letter) {
  if(findAnswered) return;
  var fb = document.getElementById('findFeedback');
  if(letter === findCorrectLetter) {
    findAnswered = true;
    btn.classList.add('find-correct');
    fb.className = 'find-feedback ok';
    fb.innerHTML = '&#127881; Yes! That\'s <b>'+letter+'</b>! Well done!';
    spk('Yes! That is ' + letter + '. Well done!');
  } else {
    btn.classList.add('find-wrong');
    fb.className = 'find-feedback bad';
    fb.innerHTML = '&#128577; Not quite! Find <b>'+findCorrectLetter+'</b>';
    spk('Try again! Find ' + findCorrectLetter);
    setTimeout(function(){ btn.classList.remove('find-wrong'); fb.innerHTML=''; fb.className='find-feedback'; }, 800);
  }
}

function findNext() {
  if(findShuffled) {
    var next;
    do { next = Math.floor(Math.random() * FIND_ALPHA.length); } while(next === findIdx && FIND_ALPHA.length > 1);
    findIdx = next;
  } else {
    if(findIdx < FIND_ALPHA.length - 1) findIdx++;
  }
  buildFindGame();
}

function findPrev() {
  if(findIdx > 0) findIdx--;
  buildFindGame();
}

function toggleFindShuffle() {
  findShuffled = !findShuffled;
  var btn = document.getElementById('findShufBtn');
  btn.classList.toggle('on', findShuffled);
  btn.innerHTML = '&#128256; Shuffle ' + (findShuffled ? 'ON' : 'OFF');
  spk('Shuffle ' + (findShuffled ? 'on' : 'off'));
  buildFindGame();
}

function initFind() {
  if(!findInitDone) { findInitDone = true; findIdx = 0; }
  buildFindGame();
}

document.addEventListener('DOMContentLoaded',function(){
  trCanvas=document.getElementById('trCanvas');
  trCtx=trCanvas.getContext('2d');
  trCanvas.addEventListener('mousedown',function(e){trDrawing=true;var p=gPos(e);trCtx.beginPath();trCtx.moveTo(p.x,p.y);});
  trCanvas.addEventListener('mousemove',function(e){if(!trDrawing)return;var p=gPos(e);trCtx.lineTo(p.x,p.y);trCtx.stroke();});
  trCanvas.addEventListener('mouseup',function(){trDrawing=false;trCtx.beginPath();});
  trCanvas.addEventListener('mouseleave',function(){trDrawing=false;});
  trCanvas.addEventListener('touchstart',function(e){e.preventDefault();trDrawing=true;var p=gPos(e);trCtx.beginPath();trCtx.moveTo(p.x,p.y);},{passive:false});
  trCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!trDrawing)return;var p=gPos(e);trCtx.lineTo(p.x,p.y);trCtx.stroke();},{passive:false});
  trCanvas.addEventListener('touchend',function(){trDrawing=false;trCtx.beginPath();});
});
</script>
