<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABC World &#128292;</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="../shared.js"></script>
<style>
/* ══════════════════════════════════════════
   abc.html – mobile-first, kids-friendly redesign
   Bottom dock navigation (YouTube Kids / Duolingo style)
   ══════════════════════════════════════════ */

/* ── Layout: full column, content above bottom dock ── */
.subbody {
  flex-direction: column;
  min-height: calc(100vh - 95px);
}

/* ── Hide the shared sidebar tabs ── */
.stabs { display: none; }

/* ── Fixed bottom navigation dock ── */
.abc-dock {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: #fff;
  box-shadow: 0 -3px 20px rgba(0,0,0,.13);
  display: flex;
  padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
  gap: 4px;
}

.abc-dock-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 2px 6px;
  border-radius: 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--f);
  font-size: 0.58rem;
  font-weight: 900;
  color: #bbb;
  min-height: 64px;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color: transparent;
}

.abc-dock-btn .dock-ico {
  font-size: 1.65rem;
  display: block;
  line-height: 1;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}

/* Active state – each tab gets its own colour */
.abc-dock-btn.active { color: #fff; }
.abc-dock-btn.active .dock-ico { transform: translateY(-4px) scale(1.18); }

.abc-dock-btn[data-tab="alpha"].active  { background: #FF6B6B; }
.abc-dock-btn[data-tab="phonics"].active{ background: #FF8E53; }
.abc-dock-btn[data-tab="sight"].active  { background: #C2185B; }
.abc-dock-btn[data-tab="action"].active { background: #F57C00; }
.abc-dock-btn[data-tab="opp"].active    { background: #00897B; }
.abc-dock-btn[data-tab="trace"].active  { background: #7B1FA2; }

/* Inactive hover */
.abc-dock-btn:hover:not(.active) { background: #f5f5f5; color: #888; }
.abc-dock-btn:hover:not(.active) .dock-ico { transform: translateY(-2px); }

/* Dot indicator on inactive tabs */
.abc-dock-btn::after {
  content: '';
  display: block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: transparent;
  margin-top: 2px;
  transition: background .2s;
}
.abc-dock-btn.active::after { background: rgba(255,255,255,.7); }

/* ── Push content above the dock ── */
.submain {
  flex: 1;
  padding: 14px 12px calc(88px + env(safe-area-inset-bottom));
  overflow-y: auto;
}

/* ── Tab sections — self-contained, no dependency on shared.js timing ── */
.sec         { display: none;  max-width: 800px; margin: 0 auto; }
.sec.active  { display: block; }

/* Dummy for stabico used elsewhere */
.stabico { display: none; }

/* ── Letter selector grid (A–Z buttons) ── */
.selgrid {
  gap: 8px;
  margin-bottom: 16px;
}
.selbtn {
  padding: 10px 12px;
  font-size: var(--lg);
  font-weight: 900;
  min-width: 48px;
  min-height: 48px;
  border-radius: 14px;
  transition: all .18s;
}

/* ── Big letter display box ── */
#lb {
  border-radius: 26px;
  padding: 20px 20px 18px;
  margin-bottom: 16px;
  text-align: center;
}
#blc {
  font-size: calc(var(--b) * 7);
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-shadow: 0 6px 18px rgba(0,0,0,.18);
  display: block;
}
#bls {
  font-size: calc(var(--b) * 4);
  color: rgba(255,255,255,.75);
  font-weight: 700;
  display: block;
  margin-top: 4px;
}

/* ── Word cards grid ── */
.cgrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
@media(min-width: 480px) {
  .cgrid { grid-template-columns: repeat(4, 1fr); }
}
@media(min-width: 680px) {
  .cgrid { grid-template-columns: repeat(5, 1fr); }
}

/* Bigger cards for kids */
.crd {
  padding: 14px 6px 11px;
  border-radius: 18px;
  cursor: pointer;
  transition: transform .17s;
}
.crd:active { transform: scale(.95); }
.crdem  { font-size: calc(var(--b) * 2.6); }
.crdlbl { font-size: calc(var(--b) * 0.84); font-weight: 700; }

/* ── Phonics section header box ── */
.bigbox {
  margin-bottom: 16px;
  border-radius: 24px;
  padding: 18px 14px;
}
.bigchar { font-size: calc(var(--b) * 3.5); }
.bigsub  { font-size: var(--lg); margin-top: 6px; }

/* ── Opposites ── */
.oppgrid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
@media(min-width: 480px) {
  .oppgrid { grid-template-columns: repeat(2, 1fr); }
}
.opppair {
  padding: 14px 12px;
  border-radius: 18px;
}
.opppair:active { transform: scale(.97); }
.oppem   { font-size: calc(var(--b) * 2.4); }
.oppword { font-size: calc(var(--b) * 0.9); font-weight: 700; }

/* ── Letter Tracing ── */
.trsel {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
  margin-bottom: 16px;
}
.trbtn {
  padding: 9px 14px;
  border-radius: 12px;
  border: none;
  background: #fff;
  color: #333;
  font-weight: 900;
  font-size: var(--md);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
  min-width: 46px;
  min-height: 46px;
  text-align: center;
  transition: all .15s;
  font-family: var(--f);
}
.trbtn.active { background: #FF6B6B; color: #fff; box-shadow: 0 3px 10px rgba(255,107,107,.45); }

.trwrap {
  background: #fff;
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 5px 20px rgba(0,0,0,.12);
  text-align: center;
  margin-bottom: 14px;
}
.trwrap h3 {
  font-size: calc(var(--b) * 2);
  font-weight: 900;
  color: #FF6B6B;
  margin-bottom: 4px;
}
.trwrap p {
  font-size: var(--sm);
  color: #aaa;
  margin-bottom: 12px;
}

#trCanvas {
  border: 3px dashed #FF6B6B;
  border-radius: 16px;
  touch-action: none;
  cursor: crosshair;
  background: #FFF9F9;
  display: block;
  margin: 0 auto;
  width: 100%;
  max-width: 340px;
  height: auto;
  aspect-ratio: 300 / 260;
}

.trbtns {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 14px;
  flex-wrap: wrap;
}
.trb {
  padding: 12px 26px;
  border-radius: 18px;
  border: none;
  font-family: var(--f);
  font-size: var(--md);
  font-weight: 700;
  cursor: pointer;
  min-height: 50px;
  min-width: 120px;
}
.trb-g { background: #1976D2; color: #fff; }
.trb-c { background: #FF6B6B; color: #fff; }

.trtip {
  background: #FFF3E0;
  border-radius: 14px;
  padding: 12px 16px;
  font-size: var(--sm);
  font-weight: 700;
  color: #F57C00;
  text-align: center;
}

/* ── Color swatches ── */
.cswatch {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin: 0 auto 9px;
  box-shadow: 0 5px 15px rgba(0,0,0,.2);
  border: 5px solid rgba(255,255,255,.6);
}

/* ── Show / Hide A–Z toggle button ── */
.alpha-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px 20px;
  border-radius: 16px;
  border: 2.5px dashed #FF6B6B;
  background: #FFF5F5;
  color: #FF6B6B;
  font-family: var(--f);
  font-size: var(--md);
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.alpha-toggle.open {
  background: #FF6B6B;
  color: #fff;
  border-style: solid;
}
/* flex row: [toggle button] [shuffle icon] */
.alpha-ctrl { display:flex; gap:8px; align-items:stretch; margin-bottom:12px; }
.alpha-ctrl .alpha-toggle { flex:1; margin-bottom:0; }
.alpha-shuf {
  padding:12px 14px; border-radius:16px; border:2.5px solid #FF6B6B33;
  background:#FFF5F5; color:#FF6B6B;
  font-size:1.1rem; cursor:pointer; font-family:var(--f); font-weight:900;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.alpha-shuf:active { transform:scale(.88); }

/* ── Prev / Next letter navigation ── */
.alpha-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding: 6px;
  border-radius: 22px;
  background: rgba(255,253,231,.94);
  box-shadow: 0 4px 18px rgba(0,0,0,.08);
}
.alpha-nav-btn {
  flex: 1;
  padding: 14px 10px;
  border-radius: 16px;
  border: none;
  background: #fff;
  color: #FF6B6B;
  font-family: var(--f);
  font-size: var(--md);
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(0,0,0,.1);
  min-height: 54px;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color: transparent;
}
.alpha-nav-btn:active { transform: scale(.93); }

/* ── Phonics sound card (fills the 6th empty slot in word grid) ── */
.phcard {
  background: linear-gradient(135deg,#FFF8E1,#FFE082) !important;
  border: 3px solid rgba(255,142,83,.4) !important;
  position: relative;
  overflow: hidden;
}
.phcard::before {
  content: '';
  position: absolute;
  top: -10px; right: -10px;
  width: 40px; height: 40px;
  background: #FF8E53;
  border-radius: 50%;
  opacity: .15;
}
.phsound {
  font-size: calc(var(--b) * 0.78);
  font-weight: 900;
  color: #FF8E53;
  margin-top: 3px;
  letter-spacing: .4px;
}
.phsay {
  font-size: calc(var(--b) * 1.6);
  font-weight: 900;
  color: #E65100;
}

/* ── Big letter box is tappable ── */
#lb { cursor: pointer; user-select: none; }

</style>
</head>

  <div class="submain">

    <div id="abc-alpha" class="sec active">

      <div class="alpha-ctrl">

        </button>
        <button class="alpha-shuf" onclick="shuffleAlpha()" title="Shuffle order">&#128256;</button>
      </div>

      <!-- Collapsible A-Z letter selector (hidden by default) -->
      <div class="selgrid" id="lg" style="display:none"></div>

      <!-- Big letter display – tap to hear the letter -->
      <div class="bigbox" id="lb" onclick="spk(curL.toLowerCase())">
        <div class="bigchar" id="blc"></div>
        <div class="bigsub"  id="bls"></div>

      <!-- 5 word cards + 1 phonics sound card (fills empty 6th slot) -->

        <button class="alpha-nav-btn" id="prevBtn" onclick="prevL()" style="visibility:hidden">&#8592; ?</button>
        <button class="alpha-nav-btn" id="nextBtn" onclick="nextL()">B &#8594;</button>

    </div>

    <!-- Sight Words -->
    <div id="abc-sight" class="sec">
      <div class="bigbox" style="background:linear-gradient(135deg,#C2185B,#E91E63)">
        <div class="bigchar">&#128065;</div><div class="bigsub">Sight Words</div>
      </div>
      <div class="cgrid" id="sightCards"></div>
    </div>

    <!-- Action Words -->
    <div id="abc-action" class="sec">
      <div class="bigbox" style="background:linear-gradient(135deg,#F57C00,#FFC300)">
        <div class="bigchar">&#127939;</div><div class="bigsub">Action Words</div>
      </div>
      <div class="cgrid" id="actionCards"></div>
    </div>

    <!-- Opposites -->
    <div id="abc-opp" class="sec">
      <div class="bigbox" style="background:linear-gradient(135deg,#00897B,#26C6DA)">
        <div class="bigchar">&#8596;</div><div class="bigsub">Opposites</div>
      </div>
      <div class="oppgrid" id="opCards"></div>
    </div>

    <!-- Letter Tracing -->
    <div id="abc-trace" class="sec">
      <div class="bigbox" style="background:linear-gradient(135deg,#FF6B6B,#FF8E53)">
        <div class="bigchar">&#9999;</div><div class="bigsub">Letter Tracing</div>
      </div>
      <!-- Toggle A-Z letter selector -->
      <button class="alpha-toggle" id="trAlphaToggle" onclick="toggleTrAlpha()">
        &#9999; Show A&#8211;Z Letters &nbsp;&#9660;

      <!-- Collapsible letter selector (hidden by default) -->
      <div class="trsel" id="trSel" style="display:none"></div>
      <div class="trwrap">
        <h3 id="trLetter">A</h3>
        <p>Trace with finger or mouse!</p>
        <canvas id="trCanvas" width="300" height="260"></canvas>
        <div class="trbtns">
          <button class="trb trb-g" id="trGuideBtn" onclick="toggleGuide()">Hide Guide</button>
          <button class="trb trb-c" onclick="clearTrOnly()">Clear</button>
        </div>
      </div>
      <div class="trtip">&#128161; Guide shown by default &#8212; trace over it, then tap Clear to try again!</div>

      <!-- Prev / Next nav – at bottom for easy single-hand reach -->
      <div class="alpha-nav">
        <button class="alpha-nav-btn" id="trPrevBtn" onclick="trPrevL()" style="visibility:hidden">&#8592; ?</button>
        <button class="alpha-nav-btn" id="trNextBtn" onclick="trNextL()">B &#8594;</button>
      </div>
    </div>

  </div>
</div>

  var ph=PH.filter(function(p){return p[0]===l;})[0];
  var phCard=ph
    ?'<div class="crd phcard" onclick="spkSeq([\''+l+' says '+ph[2]+'\',\'like in '+ph[3]+'\'])"><span class="crdem phsay">&#128266;</span><div class="phsound">'+l+' = &ldquo;'+ph[2]+'&rdquo;</div><div class="crdlbl" style="color:#E65100;margin-top:2px">&#128226; Tap!</div></div>'
    :'';
  document.getElementById('ac').innerHTML=d.w.map(function(w){return mcard(w[1],w[0],d.c);}).join('')+phCard;
  updateNav(l);
  spk(l.toLowerCase()); // lowercase prevents TTS saying "Capital A"
}

/* ── A-Z navigation helpers ── */
function updateNav(l){
  var i=letters.indexOf(l);
  var pb=document.getElementById('prevBtn'),nb=document.getElementById('nextBtn');
  pb.style.visibility=i===0?'hidden':'visible';
  if(i>0) pb.innerHTML='&#8592; '+letters[i-1];
  nb.style.visibility=i===letters.length-1?'hidden':'visible';
  if(i<letters.length-1) nb.innerHTML=letters[i+1]+' &#8594;';
}
function prevL(){var i=letters.indexOf(curL);if(i>0)rL(letters[i-1]);}
function nextL(){var i=letters.indexOf(curL);if(i<letters.length-1)rL(letters[i+1]);}
function toggleAlpha(){
  var g=document.getElementById('lg'),btn=document.getElementById('alphaToggle');
  var shown=g.style.display!=='none';
  g.style.display=shown?'none':'';
  btn.classList.toggle('open',!shown);
  btn.innerHTML=(!shown?'&#128292; Hide A&#8211;Z Alphabet &nbsp;&#9650;':'&#128292; Show A&#8211;Z Alphabet &nbsp;&#9660;');
}

// Build A-Z selector grid (called on init and after shuffle)
function buildAlphaGrid(){
  var el=document.getElementById('lg');
  el.innerHTML='';
  letters.forEach(function(l){
    var b=document.createElement('button');
    b.className='selbtn lbtn';b.textContent=l;
    b.onclick=function(){rL(l);};
    el.appendChild(b);
  });
}
buildAlphaGrid();

function shuffleAlpha(){
  letters=Object.keys(AD).sort(function(){return Math.random()-.5;});
  buildAlphaGrid();
  rL(letters[0]);     // navigate to first letter in new order
  spk('shuffled!');
}

// Sight Words
document.getElementById('sightCards').innerHTML=SW.map(function(s){
  return '<div class="crd" style="border:3px solid #C2185B33;background:linear-gradient(135deg,#FCE4EC,#fff)" onclick="spkSeq([\''+s[0]+'\',\''+s[1]+'\'])">'
    +'<span class="crdem" style="font-size:2rem;font-weight:900;color:#C2185B">'+s[0]+'</span>'
    +'<div class="crdlbl">'+s[1]+'</div></div>';
}).join('');

// Action Words
document.getElementById('actionCards').innerHTML=AW.map(function(a){
  var safe=a[2].replace(/'/g,"&#39;");
  return '<div class="crd" style="border:3px solid #F57C0033" onclick="spk(\''+a[0]+'. '+safe+'\')">'
    +'<span class="crdem">'+a[1]+'</span>'

// Opposites
document.getElementById('opCards').innerHTML=OPP.map(function(o){

    +'<div class="oppside"><span class="oppem">'+o[1]+'</span><div class="oppword" style="color:#00897B">'+o[0]+'</div></div>'
    +'<div style="font-size:var(--lg);font-weight:900;color:#ccc">vs</div>'
    +'<div class="oppside"><span class="oppem">'+o[3]+'</span><div class="oppword" style="color:#00897B">'+o[2]+'</div></div></div>';
}).join('');

// Init first letter
document.addEventListener('DOMContentLoaded',function(){
  rL('A');
  swDock('alpha');
});

// Dock tab switcher
function swDock(tab) {
  try { if(window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e) {}
  // show/hide sections
  document.querySelectorAll('.sec').forEach(function(s){
    s.classList.toggle('active', s.id === 'abc-' + tab);
  });
  // update dock buttons
  document.querySelectorAll('.abc-dock-btn').forEach(function(b){
    var on = b.getAttribute('data-tab') === tab;
    b.classList.toggle('active', on);
  });
}

/* ── LETTER TRACING ── */
var trABC='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var trLetter='A',trDrawing=false,trCanvas,trCtx,trGuideShown=false;

// Central function: activate a tracing letter (show guide + speak + update nav)
function trActiveLetter(l){
  trLetter=l;
  document.getElementById('trLetter').textContent=l;
  drawGuide(true);  // show guide silently
  spk(l.toLowerCase()); // lowercase prevents TTS saying "Capital B" etc.
  updateTrNav(l);
  document.querySelectorAll('.trbtn').forEach(function(b){b.classList.toggle('active',b.textContent===l);});
}
function updateTrNav(l){
  var i=trABC.indexOf(l);
  var pb=document.getElementById('trPrevBtn'),nb=document.getElementById('trNextBtn');
  pb.style.visibility=i===0?'hidden':'visible';
  if(i>0) pb.innerHTML='&#8592; '+trABC[i-1];
  nb.style.visibility=i===25?'hidden':'visible';
  if(i<25) nb.innerHTML=trABC[i+1]+' &#8594;';
}
function trPrevL(){var i=trABC.indexOf(trLetter);if(i>0)trActiveLetter(trABC[i-1]);}
function trNextL(){var i=trABC.indexOf(trLetter);if(i<25)trActiveLetter(trABC[i+1]);}
function toggleTrAlpha(){
  var g=document.getElementById('trSel'),btn=document.getElementById('trAlphaToggle');
  var shown=g.style.display!=='none';
  g.style.display=shown?'none':'';
  btn.classList.toggle('open',!shown);
  btn.innerHTML=(!shown?'&#9999; Hide A&#8211;Z Letters &nbsp;&#9650;':'&#9999; Show A&#8211;Z Letters &nbsp;&#9660;');
}

document.addEventListener('DOMContentLoaded',function(){
  var el=document.getElementById('trSel');
  trABC.split('').forEach(function(l){
    var b=document.createElement('button');
    b.className='trbtn'+(l==='A'?' active':'');
    b.textContent=l;
    b.onclick=function(){trActiveLetter(l);};
    el.appendChild(b);
  });
  trCanvas=document.getElementById('trCanvas');
  trCtx=trCanvas.getContext('2d');
  setupTr();
  drawGuide(true);   // show guide by default on load
  updateTrNav('A');  // init nav state
});
function setupTr(){trCtx.fillStyle='#FFF9F9';trCtx.fillRect(0,0,trCanvas.width,trCanvas.height);trCtx.strokeStyle='#FF6B6B';trCtx.lineWidth=7;trCtx.lineCap='round';trCtx.lineJoin='round';}
function clearTr(){setupTr();}
function clearTrOnly(){
  clearTr();trGuideShown=false;
  var btn=document.getElementById('trGuideBtn');if(btn)btn.textContent='Show Guide';
}
function drawGuide(silent){
  clearTr();
  trCtx.font='bold 190px Nunito,sans-serif';trCtx.fillStyle='rgba(255,107,107,0.14)';
  trCtx.textAlign='center';trCtx.textBaseline='middle';trCtx.fillText(trLetter,150,140);
  trCtx.strokeStyle='#FF6B6B';trCtx.lineWidth=7;trCtx.lineCap='round';trCtx.lineJoin='round';
  trGuideShown=true;
  var btn=document.getElementById('trGuideBtn');if(btn)btn.textContent='Hide Guide';
  if(!silent)spk(trLetter+'! Trace the letter '+trLetter);
}
function toggleGuide(){
  if(trGuideShown){clearTr();trGuideShown=false;document.getElementById('trGuideBtn').textContent='Show Guide';}
  else{drawGuide();}
}
function gPos(e){var r=trCanvas.getBoundingClientRect();var sx=trCanvas.width/r.width,sy=trCanvas.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
document.addEventListener('DOMContentLoaded',function(){
  trCanvas=document.getElementById('trCanvas');
  trCtx=trCanvas.getContext('2d');
  trCanvas.addEventListener('mousedown',function(e){trDrawing=true;var p=gPos(e);trCtx.beginPath();trCtx.moveTo(p.x,p.y);});
  trCanvas.addEventListener('mousemove',function(e){if(!trDrawing)return;var p=gPos(e);trCtx.lineTo(p.x,p.y);trCtx.stroke();});
  trCanvas.addEventListener('mouseup',function(){trDrawing=false;trCtx.beginPath();});
  trCanvas.addEventListener('mouseleave',function(){trDrawing=false;});
  trCanvas.addEventListener('touchstart',function(e){e.preventDefault();trDrawing=true;var p=gPos(e);trCtx.beginPath();trCtx.moveTo(p.x,p.y);},{passive:false});
  trCanvas.addEventListener('touchmove',function(e){e.preventDefault();if(!trDrawing)return;var p=gPos(e);trCtx.lineTo(p.x,p.y);trCtx.stroke();},{passive:false});
  trCanvas.addEventListener('touchend',function(){trDrawing=false;trCtx.beginPath();});
});
</script>
