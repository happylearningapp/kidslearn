<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fun Games &#127918;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="../questions.js"></script>
<style>
/* ── Override shared sidebar layout ── */
.subbody { display: block !important; }
.submain { padding: 14px 12px calc(110px + env(safe-area-inset-bottom)) !important; overflow-y: hidden; overflow-x: hidden; }
#sdrawer { top: 66px !important; }

/* ── Bottom dock (2-row grid for 12 games) ── */
.games-dock {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:#fff; box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:grid; grid-template-columns: repeat(6, 1fr);
  padding:5px 4px calc(5px + env(safe-area-inset-bottom)); gap:4px;
}
.games-dock-btn {
  flex:1 1 0; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; padding:5px 2px 4px; border-radius:12px;
  border:none; background:#f5f5f5; color:#888; font-family:var(--f);
  font-size:.48rem; font-weight:800; cursor:pointer; line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.games-dock-btn.active { color:#fff; transform:scale(1.05); }
.games-dock-btn .dock-ico { font-size:1rem; line-height:1; }

/* ── Common Shuffle Toggle ── */
.shuf-row { text-align:center; margin-bottom:8px; }
.shuf-toggle {
  padding:7px 20px; border-radius:20px; border:2px solid #ddd;
  background:#f5f5f5; font-family:var(--f); font-size:var(--sm);
  font-weight:800; cursor:pointer; transition:all .22s; color:#888;
  -webkit-tap-highlight-color:transparent;
}
.shuf-toggle.on {
  background:linear-gradient(135deg,#E91E63,#FF8E53);
  color:#fff; border-color:transparent;
}

/* ── Memory ── */
.mgame-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;margin:0 auto 12px;}
.mcard{aspect-ratio:1;border-radius:14px;border:none;background:linear-gradient(135deg,#FF6B6B,#FF8E53);cursor:pointer;font-size:1.8rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.mcard.flipped{background:#fff;border:3px solid #FF6B6B;}
.mcard.matched{background:linear-gradient(135deg,#4CAF50,#00C9A7);}

/* ── Odd One Out ── */
.ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:360px;margin:0 auto 10px;}
.ocrd{border-radius:14px;padding:7px 4px;text-align:center;cursor:pointer;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);border:3px solid transparent;}
.ocrd.correct{background:#E8F5E9;border-color:#4CAF50;}
.ocrd.wrong{background:#FFEBEE;border-color:#FF6B6B;}

/* ── Count & Tap ── */
.ctarea{background:#fff;border-radius:18px;padding:14px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:10px;text-align:center;}
.ctnbtn{padding:9px 14px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:var(--f);font-size:var(--lg);font-weight:900;cursor:pointer;transition:all .2s;min-width:46px;}
.ctnbtn.correct{background:#4CAF50;color:#fff;border-color:#4CAF50;}
.ctnbtn.wrong{background:#FF6B6B;color:#fff;border-color:#FF6B6B;}

/* ── Word Match ── */
.wmbox{background:#fff;border-radius:18px;padding:14px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:10px;text-align:center;}
.wopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin:0 auto 8px;}
.wopt{padding:11px 8px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:var(--f);font-size:var(--md);font-weight:900;cursor:pointer;letter-spacing:.4px;}
.wopt.correct{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20;}
.wopt.wrong{background:#FFEBEE;border-color:#FF6B6B;}
.wopt.reveal{background:#E8F5E9;border-color:#4CAF50;}

/* ── Balloon Pop ── */
.balarea{position:relative;background:linear-gradient(180deg,#87CEEB,#B0E0FF 60%,#E8F5FF);border-radius:20px;height:340px;overflow:hidden;margin-bottom:10px;box-shadow:0 5px 20px rgba(0,0,0,.1);}
.balq{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);border-radius:16px;padding:8px 18px;font-size:var(--lg);font-weight:900;color:#333;z-index:10;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.1);}
.bal{position:absolute;cursor:pointer;text-align:center;width:60px;}
.balbody{font-size:2.6rem;display:block;line-height:1;}
.balnum{display:block;font-size:.9rem;font-weight:900;color:#333;margin-top:-4px;}
.balstr{width:2px;height:24px;background:rgba(0,0,0,.2);margin:0 auto;}
@keyframes bpop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}

/* ── Quiz (GQ) — 2×2 card layout ── */
.gq-card{background:#fff;border-radius:18px;padding:0 0 12px;box-shadow:0 6px 22px rgba(0,0,0,.12);overflow:hidden;margin-bottom:10px;}
.gq-qhd{background:linear-gradient(135deg,#43A047,#FFC300);padding:10px 14px;text-align:center;}
.gq-qbadge{background:rgba(255,255,255,.25);border-radius:18px;padding:3px 14px;font-size:var(--sm);font-weight:900;color:#fff;display:inline-block;}
.gq-q{font-size:var(--lg);font-weight:900;color:#333;text-align:center;padding:12px 14px 10px;line-height:1.4;cursor:pointer;}
.gq-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 12px;}
.gq-opt{padding:10px 8px;border-radius:13px;border:2.5px solid #eee;background:#fafafa;font-family:var(--f);font-size:var(--md);font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;}
.gq-ltr{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;color:#fff;flex-shrink:0;}
.gq-ltr-a{background:#7B1FA2;}.gq-ltr-b{background:#E91E63;}
.gq-ltr-c{background:#1565C0;}.gq-ltr-d{background:#E65100;}
.gq-opt.correct{background:#E8F5E9;border-color:#4CAF50;}
.gq-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;}
.gq-fb{min-height:28px;display:flex;align-items:center;justify-content:center;font-size:var(--md);font-weight:900;color:#555;padding:6px 12px 0;}

/* ── Shadow Match ── */
.shadow-box{background:#fff;border-radius:18px;padding:14px 12px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:10px;text-align:center;}
.shadow-em{font-size:4.5rem;display:block;filter:brightness(0);margin-bottom:8px;}
.shadow-opts-lbl{font-size:var(--sm);font-weight:900;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.shadow-opts{display:flex;gap:8px;justify-content:center;flex-wrap:nowrap;overflow:hidden;margin-bottom:8px;}
.shadow-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:10px 6px;cursor:pointer;font-size:2.2rem;flex:1;min-width:0;text-align:center;transition:all .2s;}
.shadow-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.shadow-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;}

/* ── What's Missing ── */
.missing-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.missing-item{font-size:2.4rem;background:#f5f5f5;border-radius:12px;padding:9px;min-width:56px;text-align:center;}
.missing-item.hidden{background:#ddd;color:transparent;}
.missing-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
.missing-opt{background:#fff;border:3px solid #eee;border-radius:14px;padding:10px 8px;cursor:pointer;font-size:2.2rem;min-width:64px;text-align:center;transition:all .2s;}
.missing-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.missing-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;}

/* ── Sort It ── */
.sort-item-box{text-align:center;margin-bottom:10px;}
.sort-item-em{font-size:2.4rem;display:block;margin-bottom:3px;animation:popIn .4s ease;}
.sort-buckets{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;max-width:300px;margin:0 auto 10px;}
.sort-bucket{border-radius:13px;padding:7px 4px;text-align:center;cursor:pointer;border:3px solid transparent;transition:all .2s;}
.sort-bucket.correct{animation:popIn .3s ease;border-color:#fff!important;}
.sort-bucket.wrong{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.sort-bucket-em{font-size:1.3rem;display:block;margin-bottom:2px;}
.sort-bucket-lbl{font-size:.72rem;font-weight:900;color:#fff;}

/* ── Simon ── */
.simon-board{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:290px;margin:0 auto 12px;}
.simon-btn{height:100px;border-radius:18px;border:none;cursor:pointer;font-size:.9rem;font-weight:900;color:#fff;opacity:.5;text-shadow:1px 1px 3px rgba(0,0,0,.3);transition:opacity .15s;}
.simon-btn.lit{opacity:1;transform:scale(1.06);}
.simon-status{text-align:center;font-size:var(--lg);font-weight:900;color:#333;margin-bottom:10px;min-height:26px;}
.simon-seq{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;}
.simon-dot{width:13px;height:13px;border-radius:50%;background:#ddd;display:inline-block;}
.simon-dot.done{background:#4CAF50;}

/* ── True / False ── */
.tf-card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 5px 20px rgba(0,0,0,.12);margin-bottom:10px;text-align:center;}
.tf-em{font-size:3rem;display:block;margin-bottom:8px;}
.tf-stmt{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:14px;line-height:1.4;}
.tf-btns{display:flex;gap:10px;justify-content:center;}
.tf-btn{padding:10px 24px;border-radius:14px;border:none;font-family:var(--f);font-size:var(--md);font-weight:900;cursor:pointer;transition:all .2s;}
.tf-true{background:#4CAF50;color:#fff;}
.tf-false{background:#FF6B6B;color:#fff;}
.tf-btn.correct{box-shadow:0 0 0 4px #FFC300;animation:popIn .3s ease;}
.tf-btn.wrong{opacity:.4;}

/* ── Color Tap ── */
.ctap-word{font-size:2.2rem;font-weight:900;text-align:center;padding:10px;border-radius:16px;margin-bottom:10px;letter-spacing:1px;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.ctap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:190px;margin:0 auto 8px;}
.ctap-circle{width:100%;aspect-ratio:1;max-height:84px;border-radius:50%;border:4px solid #fff;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.ctap-circle:active{transform:scale(0.92);}
.ctap-circle.correct{border-color:#4CAF50;box-shadow:0 0 0 5px #4CAF5066,0 4px 12px rgba(0,0,0,.18);animation:popIn .3s ease;}
.ctap-circle.wrong{border-color:#FF6B6B;animation:shake .4s ease;}

/* ── Patterns row (Odd One Out / Missing) ── */
.ptrow{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.pitem{font-size:2.2rem;padding:6px;background:#f5f5f5;border-radius:12px;min-width:48px;text-align:center;}
.pblank{font-size:2.2rem;padding:6px;background:#f0f0f0;border-radius:12px;min-width:48px;text-align:center;border:3px dashed #ccc;}
.cprow{display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.cpitem{background:#f9f9f9;border-radius:14px;padding:12px 14px;text-align:center;cursor:pointer;border:3px solid #eee;flex:1;min-width:100px;}
</style>
</head>
<body data-page-title="&#127918; Fun Games" data-page-sub="Play, Learn &amp; Win!" data-page-gradient="linear-gradient(135deg,#FF6B00,#FFC300)" data-page-back="../home.html">

<div class="subbody">
  <div class="submain" id="gameMain">
    <!-- content injected here by showGame() -->
  </div>
</div>

<!-- ══ BOTTOM DOCK ══ -->
<nav class="games-dock" id="gamesDock">
  <!-- Row 1 -->
  <button class="games-dock-btn" data-game="odd"      onclick="showGame('odd')">     <span class="dock-ico">&#127919;</span>Odd One</button>
  <button class="games-dock-btn" data-game="count"    onclick="showGame('count')">   <span class="dock-ico">&#128290;</span>Count</button>
  <button class="games-dock-btn" data-game="quiz"     onclick="showGame('quiz')">    <span class="dock-ico">&#127942;</span>Quiz</button>
  <button class="games-dock-btn" data-game="word"     onclick="showGame('word')">    <span class="dock-ico">&#128292;</span>Words</button>
  <button class="games-dock-btn" data-game="shadow"   onclick="showGame('shadow')">  <span class="dock-ico">&#128065;</span>Shadow</button>
  <button class="games-dock-btn" data-game="missing"  onclick="showGame('missing')"> <span class="dock-ico">&#10067;</span>Missing</button>
  <!-- Row 2 -->
  <button class="games-dock-btn" data-game="balloon"  onclick="showGame('balloon')"> <span class="dock-ico">&#127880;</span>Balloons</button>
  <button class="games-dock-btn" data-game="memory"   onclick="showGame('memory')">  <span class="dock-ico">&#129513;</span>Memory</button>
  <button class="games-dock-btn" data-game="simon"    onclick="showGame('simon')">   <span class="dock-ico">&#127912;</span>Simon</button>
  <button class="games-dock-btn" data-game="sortit"   onclick="showGame('sortit')">  <span class="dock-ico">&#128230;</span>Sort It</button>
  <button class="games-dock-btn" data-game="tf"       onclick="showGame('tf')">      <span class="dock-ico">&#9989;</span>True/False</button>
  <button class="games-dock-btn" data-game="colortap" onclick="showGame('colortap')"><span class="dock-ico">&#127752;</span>Colors</button>
</nav>

<script>
/* ── GAME ROUTER ── */
var currentGame = '';
var GAME_HEADERS = {
  odd:      {bg:'linear-gradient(135deg,#E91E63,#7B1FA2)', em:'&#127919;', title:'Odd One Out'},
  count:    {bg:'linear-gradient(135deg,#1976D2,#00C9A7)', em:'&#128290;', title:'Count &amp; Tap'},
  quiz:     {bg:'linear-gradient(135deg,#43A047,#FFC300)', em:'&#127942;', title:'Quick Quiz'},
  word:     {bg:'linear-gradient(135deg,#7B1FA2,#E91E63)', em:'&#128292;', title:'Word Match'},
  balloon:  {bg:'linear-gradient(135deg,#FF6B6B,#29B6F6)', em:'&#127880;', title:'Balloon Pop!'},
  shadow:   {bg:'linear-gradient(135deg,#37474F,#607D8B)', em:'&#128065;', title:'Shadow Match'},
  missing:  {bg:'linear-gradient(135deg,#6A1B9A,#29B6F6)', em:'&#10067;', title:"What's Missing?"},
  simon:    {bg:'linear-gradient(135deg,#E91E63,#FF6B00)', em:'&#127912;', title:'Simon Says Colors'},
  sortit:   {bg:'linear-gradient(135deg,#43A047,#1976D2)', em:'&#128230;', title:'Sort It!'},
  tf:       {bg:'linear-gradient(135deg,#00897B,#6A1B9A)', em:'&#9989;',  title:'True or False?'},
  memory:   {bg:'linear-gradient(135deg,#FF6B00,#FFC300)', em:'&#129513;', title:'Memory Match'},
  colortap: {bg:'linear-gradient(135deg,#FF6B6B,#A855F7)', em:'&#127752;', title:'Tap the Color!'}
};
var GAME_INITS = {
  odd: buildOdd, count: buildCT, quiz: buildGQ, word: buildWM,
  balloon: nextBal, shadow: buildShadow, missing: buildMissing,
  simon: buildSimonBoard, sortit: buildSort, tf: buildTF, memory: renderMem,
  colortap: buildCtap
};

function showGame(name) {
  window.speechSynthesis.cancel();
  currentGame = name;
  document.querySelectorAll('.games-dock-btn').forEach(function(b) {
    var on = b.getAttribute('data-game') === name;
    b.classList.toggle('active', on);
    var h = GAME_HEADERS[name];
    b.style.background = on ? (h ? h.bg : '#FF6B00') : '';
  });
  document.getElementById('gameMain').innerHTML = '<div id="gameArea"></div>';
  resetState(name);
  GAME_INITS[name]();
}

function resetState(name) {
  shufState[name] = false; // always reset shuffle to OFF on game switch
  if(name==='odd')    { oddOrder=ODD.map(function(_,i){return i;}); oddIdx=0; oddSc=0; }
  if(name==='count')  { ctOrder=CTD.map(function(_,i){return i;}); ctIdx=0; ctSc=0; ctAnswered=false; }
  if(name==='quiz')   { gqOrder=GQD.map(function(_,i){return i;}); gqIdx=0; gqSc=0; gqAnswered=false; }
  if(name==='word')   { wmOrder=WMD.map(function(_,i){return i;}); wmIdx=0; wmSc=0; wmAns=false; }
  if(name==='balloon'){ balSc=0; balRd=0; }
  if(name==='shadow') { shOrder=SHDW.map(function(_,i){return i;}); shIdx=0; shSc=0; shAnswered=false; }
  if(name==='missing'){ msOrder=MISS.map(function(_,i){return i;}); msIdx=0; msSc=0; msAnswered=false; }
  if(name==='simon')  { simonSeq=[]; simonStep=0; simonRound=0; simonSc=0; simonPlaying=false; }
  if(name==='sortit') { sortPool=SORT_POOL.slice(); sortOrder=sortPool.map(function(_,i){return i;}); sortIdx=0; sortSc=0; sortAnswered=false; }
  if(name==='tf')       { tfOrder=TFD.map(function(_,i){return i;}); tfIdx=0; tfSc=0; tfAnswered=false; }
  if(name==='memory')   { var p=memE.concat(memE); p.sort(function(){return Math.random()-.5;}); memSt={cards:p,fl:[],ma:[],lk:false,sc:0,mv:0}; }
  if(name==='colortap') { ctapOrder=CTAP.map(function(_,i){return i;}); ctapIdx=0; ctapSc=0; ctapAnswered=false; }
}

function getArea() { return document.getElementById('gameArea'); }

/* ── DATA ── */
var SIMON_COLORS=[{id:'s0',bg:'#E53935',lbl:'Red'},{id:'s1',bg:'#1E88E5',lbl:'Blue'},{id:'s2',bg:'#43A047',lbl:'Green'},{id:'s3',bg:'#FDD835',lbl:'Yellow'}];
/* ── GAME STATE ── */
var shufState = {}; // shuffle toggle state per game (true = on)
var oddOrder=ODD.map(function(_,i){return i;}),oddIdx=0,oddSc=0;
var ctOrder=CTD.map(function(_,i){return i;}),ctIdx=0,ctSc=0,ctAnswered=false;
var gqOrder=GQD.map(function(_,i){return i;}),gqIdx=0,gqSc=0,gqAnswered=false;
var wmOrder=WMD.map(function(_,i){return i;}),wmIdx=0,wmSc=0,wmAns=false;
var balSc=0,balRd=0,balTgt=0;
var shOrder=SHDW.map(function(_,i){return i;}),shIdx=0,shSc=0,shAnswered=false;
var msOrder=MISS.map(function(_,i){return i;}),msIdx=0,msSc=0,msAnswered=false,msMissIdx=0;
var simonSeq=[],simonStep=0,simonRound=0,simonSc=0,simonPlaying=false;
var sortPool=[],sortOrder=[],sortIdx=0,sortSc=0,sortAnswered=false;
var tfOrder=TFD.map(function(_,i){return i;}),tfIdx=0,tfSc=0,tfAnswered=false;
var memE=["&#127822;","&#127820;","&#128049;","&#128053;","&#11088;","&#127752;","&#128663;","&#127880;"];
var memSt={cards:[],fl:[],ma:[],lk:false,sc:0,mv:0};
var balC=["&#128308;","&#128993;","&#128994;","&#128309;","&#128992;","&#128310;","&#128995;"];
/* g = color-family group: ensures no two same-family colors appear in same question */
var CTAP=[
  {name:'RED',    bg:'#E53935', g:0},{name:'BLUE',   bg:'#1E88E5', g:1},{name:'GREEN',  bg:'#43A047', g:2},
  {name:'YELLOW', bg:'#FDD835', g:3},{name:'ORANGE', bg:'#FB8C00', g:4},{name:'PINK',   bg:'#E91E63', g:5},
  {name:'PURPLE', bg:'#8E24AA', g:6},{name:'WHITE',  bg:'#F5F5F5', g:7},{name:'BLACK',  bg:'#212121', g:8},
  {name:'BROWN',  bg:'#795548', g:9},{name:'GREY',   bg:'#9E9E9E', g:8},{name:'SKY',    bg:'#29B6F6', g:1}
];
var ctapOrder=CTAP.map(function(_,i){return i;}),ctapIdx=0,ctapSc=0,ctapAnswered=false;

/* ── HELPERS ── */
function fisherYates(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}}

/* Shuffle toggle bar — common across all games */
function shufBar(name){
  var on=shufState[name]||false;
  return '<div class="shuf-row"><button class="shuf-toggle'+(on?' on':'')+'" onclick="doToggleShuf(\''+name+'\')">'
    +'&#128256; Shuffle '+(on?'ON':'OFF')+'</button></div>';
}

/* Toggle shuffle on/off for a game, restart from Q1 */
function doToggleShuf(name){
  shufState[name]=!shufState[name];
  var on=shufState[name];
  spk(on?'Shuffle on':'Shuffle off');
  if(name==='odd')    { oddIdx=0;oddSc=0;oddOrder=ODD.map(function(_,i){return i;});if(on)fisherYates(oddOrder);buildOdd(); }
  if(name==='count')  { ctIdx=0;ctSc=0;ctOrder=CTD.map(function(_,i){return i;});if(on)fisherYates(ctOrder);buildCT(); }
  if(name==='quiz')   { gqIdx=0;gqSc=0;gqOrder=GQD.map(function(_,i){return i;});if(on)fisherYates(gqOrder);buildGQ(); }

/* ── COLOR TAP ── */
function buildCtap(){
  if(ctapIdx>=ctapOrder.length){scoreScrn(ctapSc,CTAP.length,'Amazing! You know all colors!','Good color spotting!','colortap');return;}
  ctapAnswered=false;
  var correct=CTAP[ctapOrder[ctapIdx]];
  var usedGroups=[correct.g];
  var pool=[];
  var shuffled=CTAP.filter(function(c){return c!==correct;}).sort(function(){return Math.random()-.5;});
  for(var pi=0;pi<shuffled.length&&pool.length<3;pi++){
    if(usedGroups.indexOf(shuffled[pi].g)<0){pool.push(shuffled[pi]);usedGroups.push(shuffled[pi].g);}
  }
  if(pool.length<3){
    var extra=CTAP.filter(function(c){return c!==correct&&pool.indexOf(c)<0;}).sort(function(){return Math.random()-.5;});
    while(pool.length<3&&extra.length)pool.push(extra.shift());
  }
  var all=[correct].concat(pool).sort(function(){return Math.random()-.5;});
  _nextFn=function(){ctapIdx++;buildCtap();};
  getArea().innerHTML=scoreH(ctapIdx+1,CTAP.length,ctapSc)
    +shufBar('colortap')
    +'<div class="ctap-word" style="color:'+correct.bg+'">'+correct.name+'</div>'
    +'<div class="ctap-grid">'+all.map(function(c,i){
      var ok=(c===correct);
      return '<div class="ctap-circle" id="ctap'+i+'" style="background:'+c.bg+';'+(c.bg==='#F5F5F5'?'border-color:#ccc;':'')+'" onclick="chkCtap(\'ctap'+i+'\','+ok+',\''+c.name+'\')"></div>';
    }).join('')+'</div>'
    +'<div class="rmsg" id="ctapR" style="text-align:center;font-size:var(--md);min-height:22px"></div>'
    +navBtns(ctapIdx>0?'ctapIdx--;buildCtap()':'',true);
  spk('Tap the color '+correct.name);
}
function chkCtap(sid,correct,name){
  if(ctapAnswered)return;
  var el=document.getElementById(sid);if(!el)return;
  if(correct){
    ctapAnswered=true;el.classList.add('correct');ctapSc++;
    document.getElementById('ctapR').innerHTML='&#127881; Yes! That is '+name+'!';
    spk('Correct! That is '+name+'!');showNxt();
  }else{
    wrongFlash(el,'ctapR','&#10060; Wrong! Try again!');
  }
}

/* ── MEMORY MATCH ── */
function renderMem(){
  var a=getArea();if(!a)return;
  var h='<div class="scorebar">Score: <b>'+memSt.sc+'</b> &nbsp; Moves: <b>'+memSt.mv+'</b></div><div class="mgame-grid">';
  memSt.cards.forEach(function(c,i){var isF=memSt.fl.indexOf(i)>=0||memSt.ma.indexOf(i)>=0;var isM=memSt.ma.indexOf(i)>=0;h+='<button class="mcard'+(isF?' flipped':'')+(isM?' matched':'')+'" onclick="flipC('+i+')">'+(isF?c:'&#127775;')+'</button>';});
  h+='</div>';
  if(memSt.ma.length===16){h+='<div class="ibox" style="text-align:center"><div style="font-size:3rem">&#127881;</div><div class="iq">All matched in '+memSt.mv+' moves!</div><button class="nxtbtn" onclick="showGame(\'memory\')">Play Again</button></div>';}
  else{h+='<button class="nxtbtn" style="background:#1976D2;margin-top:8px" onclick="showGame(\'memory\')">New Game</button>';}
  a.innerHTML=h;
}
function flipC(i){
  if(memSt.lk||memSt.fl.length>=2||memSt.ma.indexOf(i)>=0||memSt.fl.indexOf(i)>=0)return;
  memSt.fl.push(i);
  if(memSt.fl.length===2){memSt.mv++;memSt.lk=true;setTimeout(function(){var a=memSt.fl[0],b=memSt.fl[1];if(memSt.cards[a]===memSt.cards[b]){memSt.ma.push(a,b);memSt.sc++;spk('Match!');}else{spk('Try again!');}memSt.fl=[];memSt.lk=false;renderMem();},900);}
  renderMem();
}

/* ── START ── */
document.addEventListener('DOMContentLoaded',function(){
  showGame('odd');
});
</script>
