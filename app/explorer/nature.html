<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nature World &#128062;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<style>
/* ── Override shared sidebar layout ── */
.subbody { display: block !important; }
.submain { padding: 14px 12px calc(90px + env(safe-area-inset-bottom)) !important; overflow-y: auto; overflow-x: hidden; }
#sdrawer { top: 66px !important; }

/* ── Tab sections ── */
.sec { overflow-x: hidden; }

/* ── Animals / Birds / Fruits / Vegs: 3-col grid, no overflow ── */
#nat-animals .cgrid,
#nat-birds .cgrid,
#nat-fruits .cgrid,
#nat-vegs .cgrid { grid-template-columns: repeat(3, 1fr) !important; overflow: hidden; max-width: 100%; }
#nat-animals .crd,
#nat-birds .crd,
#nat-fruits .crd,
#nat-vegs .crd { min-width: 0; overflow: hidden; word-break: break-word; }

/* ── Solar grid ── */
.solgrid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
@media (max-width:480px) { .solgrid { grid-template-columns:repeat(3,1fr); } }

.plncrd { background:#111; border-radius:15px; padding:11px 5px 9px; text-align:center;
          box-shadow:0 4px 13px rgba(0,0,0,.3); cursor:pointer; transition:transform .17s; }
.plncrd:hover { transform:scale(1.05); }

/* ── Weather grid ── */
.wgrid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; }
@media (max-width:480px) { .wgrid3 { grid-template-columns:repeat(2,1fr); } }

.wcrd { border-radius:18px; padding:16px 9px; text-align:center;
        box-shadow:0 4px 13px rgba(0,0,0,.11); cursor:pointer; transition:transform .17s; }
.wcrd:hover { transform:scale(1.04); }

/* ── Bottom dock ── */
.nat-dock {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:#fff; box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:flex; padding:6px 3px calc(6px + env(safe-area-inset-bottom)); gap:2px;
}
.nat-dock-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; padding:6px 2px 5px; border-radius:14px;
  border:none; background:transparent; color:#999; font-family:var(--f);
  font-size:.52rem; font-weight:800; cursor:pointer; line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.nat-dock-btn.active { color:#fff; transform:scale(1.05); }
.nat-dock-btn .dock-ico { font-size:1.3rem; line-height:1; }

/* Tab colours */
.nat-dock-btn[data-tab="animals"].active { background:#FF8E53; }
.nat-dock-btn[data-tab="birds"].active   { background:#29B6F6; }
.nat-dock-btn[data-tab="fruits"].active  { background:#FF6B6B; }
.nat-dock-btn[data-tab="vegs"].active    { background:#43A047; }
.nat-dock-btn[data-tab="weather"].active { background:#0288D1; }
.nat-dock-btn[data-tab="solar"].active   { background:#1a1a2e; }
</style>
</head>
<body data-page-title="&#128062; Nature World"
      data-page-sub="Animals, Plants &amp; Universe"
      data-page-gradient="linear-gradient(135deg,#43A047,#00C9A7)"
      data-page-back="../home.html">
<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML=
    '<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'+
    '<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'+
    '<div class="hdr-right">'+
      '<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'+
      '<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'+
    '</div>';
})();</script>

<div class="subbody">
  <div class="submain">

    <!-- ══ ANIMALS ══ -->
    <div id="nat-animals" class="sec active">
      <div class="cgrid" id="anCards"></div>
    </div>

    <!-- ══ BIRDS ══ -->
    <div id="nat-birds" class="sec">
      <div class="cgrid" id="biCards"></div>
    </div>

    <!-- ══ FRUITS ══ -->
    <div id="nat-fruits" class="sec">
      <div class="cgrid" id="frCards"></div>
    </div>

    <!-- ══ VEGGIES ══ -->
    <div id="nat-vegs" class="sec">
      <div class="cgrid" id="veCards"></div>
    </div>

    <!-- ══ WEATHER ══ -->
    <div id="nat-weather" class="sec">
      <div class="wgrid3" id="weCards"></div>
    </div>

    <!-- ══ SOLAR SYSTEM ══ -->
    <div id="nat-solar" class="sec">
      <div class="solgrid" id="solCards"></div>
    </div>

  </div>
</div>

<!-- ══ BOTTOM DOCK ══ -->
<nav class="nat-dock">
  <button class="nat-dock-btn active" data-tab="animals" onclick="swNat('animals')">
    <span class="dock-ico">&#128062;</span>Animals
  </button>
  <button class="nat-dock-btn" data-tab="birds" onclick="swNat('birds')">
    <span class="dock-ico">&#128038;</span>Birds
  </button>
  <button class="nat-dock-btn" data-tab="fruits" onclick="swNat('fruits')">
    <span class="dock-ico">&#127822;</span>Fruits
  </button>
  <button class="nat-dock-btn" data-tab="vegs" onclick="swNat('vegs')">
    <span class="dock-ico">&#129382;</span>Veggies
  </button>
  <button class="nat-dock-btn" data-tab="weather" onclick="swNat('weather')">
    <span class="dock-ico">&#127782;</span>Weather
  </button>
  <button class="nat-dock-btn" data-tab="solar" onclick="swNat('solar')">
    <span class="dock-ico">&#129680;</span>Solar
  </button>
</nav>

<script>
/* ── Data ── */
var ANI=[
  ["Lion","&#129409;"],["Elephant","&#128024;"],["Tiger","&#128047;"],["Giraffe","&#129426;"],
  ["Zebra","&#129427;"],["Monkey","&#128018;"],["Bear","&#128059;"],["Wolf","&#128058;"],
  ["Fox","&#129418;"],["Rabbit","&#128048;"],["Dog","&#128053;"],["Cat","&#128049;"],
  ["Cow","&#128046;"],["Pig","&#128055;"],["Horse","&#128052;"],["Sheep","&#128017;"],
  ["Goat","&#128016;"],["Deer","&#129420;"],["Panda","&#128060;"],["Koala","&#128040;"],
  ["Frog","&#128056;"],["Turtle","&#128034;"],["Snake","&#128013;"],["Crocodile","&#128010;"],
  ["Kangaroo","&#129432;"]
];

var BRD=[
  ["Eagle","&#129413;"],["Owl","&#129417;"],["Parrot","&#129412;"],["Penguin","&#128039;"],
  ["Flamingo","&#129441;"],["Peacock","&#129434;"],["Swan","&#129442;"],["Duck","&#129414;"],
  ["Chick","&#128037;"],["Rooster","&#128016;"],["Turkey","&#129427;"],["Pigeon","&#128298;"],
  ["Crow","&#128038;"],["Sparrow","&#128038;"],["Robin","&#128038;"]
];

var FRT=[
  ["Apple","&#127822;"],["Banana","&#127820;"],["Mango","&#129389;"],["Grapes","&#127815;"],
  ["Orange","&#127818;"],["Strawberry","&#127827;"],["Watermelon","&#127817;"],["Pineapple","&#127821;"],
  ["Cherry","&#127826;"],["Peach","&#127825;"],["Lemon","&#127819;"],["Coconut","&#129381;"],
  ["Kiwi","&#129381;"],["Pear","&#127824;"],["Blueberry","&#129401;"]
];

var VEG=[
  ["Carrot","&#129365;"],["Broccoli","&#129382;"],["Tomato","&#127813;"],["Corn","&#127805;"],
  ["Onion","&#129485;"],["Potato","&#129364;"],["Eggplant","&#127814;"],["Pepper","&#127798;"],
  ["Cucumber","&#129362;"],["Mushroom","&#127812;"],["Garlic","&#129476;"],["Pumpkin","&#127875;"],
  ["Cabbage","&#129382;"],["Peas","&#129477;"],["Avocado","&#129361;"]
];

var WTH=[
  {n:"Sunny",  e:"&#9728;", bg:"#FDD835",t:"#333",d:"Bright and warm!",    i:["&#128526;","&#127803;","&#9728;","&#127774;","&#127958;"]},
  {n:"Rainy",  e:"&#127783;",bg:"#1E88E5",t:"#fff",d:"Get your umbrella!", i:["&#9730;","&#127752;","&#128056;","&#128167;","&#127783;"]},
  {n:"Cloudy", e:"&#9729;", bg:"#78909C",t:"#fff",d:"Grey skies today!",   i:["&#129137;","&#127787;","&#128038;","&#9729;","&#127746;"]},
  {n:"Windy",  e:"&#128168;",bg:"#4DD0E1",t:"#333",d:"Hold your hat!",     i:["&#129473;","&#127811;","&#128168;","&#129523;","&#127752;"]},
  {n:"Snowy",  e:"&#10052;",bg:"#B3E5FC",t:"#333",d:"Bundle up warm!",     i:["&#9923;","&#128752;","&#129510;","&#129523;","&#9968;"]},
  {n:"Stormy", e:"&#9928;", bg:"#37474F",t:"#fff",d:"Stay indoors!",       i:["&#9889;","&#127754;","&#127752;","&#127968;","&#9926;"]}
];

var SOL=[
  {n:"Sun",    e:"&#127774;",c:"#FDD835",f:"Our star!"},
  {n:"Mercury",e:"&#129298;",c:"#9E9E9E",f:"Closest to Sun"},
  {n:"Venus",  e:"&#127775;",c:"#FFA000",f:"Hottest planet"},
  {n:"Earth",  e:"&#127757;",c:"#1E88E5",f:"Our home!"},
  {n:"Moon",   e:"&#127765;",c:"#CFD8DC",f:"Earth's moon"},
  {n:"Mars",   e:"&#128308;",c:"#E53935",f:"Red planet"},
  {n:"Jupiter",e:"&#129684;",c:"#795548",f:"Largest planet"},
  {n:"Saturn", e:"&#129680;",c:"#F9A825",f:"Has rings!"},
  {n:"Uranus", e:"&#128309;",c:"#00BCD4",f:"Spins sideways"},
  {n:"Neptune",e:"&#128153;",c:"#1565C0",f:"Farthest planet"}
];

/* ── Tab names for speech ── */
var TAB_NAMES = {
  animals:'Animals', birds:'Birds', fruits:'Fruits',
  vegs:'Vegetables', weather:'Weather', solar:'Solar System'
};

/* ── Switch tab ── */
function swNat(tab) {
  document.querySelectorAll('.sec').forEach(function(s) { s.classList.remove('active'); });
  var sec = document.getElementById('nat-' + tab);
  if (sec) sec.classList.add('active');

  document.querySelectorAll('.nat-dock-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.nat-dock-btn[data-tab="' + tab + '"]');
  if (btn) btn.classList.add('active');

  spk(TAB_NAMES[tab] || tab);
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', function() {
  sg(ANI, '#FF8E53', 'anCards');
  sg(BRD, '#29B6F6', 'biCards');
  sg(FRT, '#FF6B6B', 'frCards');
  sg(VEG, '#43A047', 'veCards');

  document.getElementById('weCards').innerHTML = WTH.map(function(w) {
    return '<div class="wcrd" style="background:' + w.bg + '" onclick="spk(\'' + w.n + '\')">'
      + '<span style="font-size:2.4rem;display:block;margin-bottom:4px">' + w.e + '</span>'
      + '<div style="font-size:var(--md);font-weight:700;color:' + w.t + '">' + w.n + '</div>'
      + '<div style="font-size:var(--sm);color:' + w.t + '">' + w.d + '</div>'
      + '<div style="margin-top:6px;font-size:1.2rem">' + w.i.join(' ') + '</div></div>';
  }).join('');

  document.getElementById('solCards').innerHTML = SOL.map(function(p) {
    return '<div class="plncrd" style="border:2px solid ' + p.c + '44;box-shadow:0 4px 13px rgba(0,0,0,.3),0 0 10px ' + p.c + '33" onclick="spk(\'' + p.n + '. ' + p.f + '\')">'
      + '<span style="font-size:2rem;display:block;margin-bottom:3px;filter:drop-shadow(0 0 6px ' + p.c + ')">' + p.e + '</span>'
      + '<div style="font-size:var(--sm);font-weight:700;color:' + p.c + '">' + p.n + '</div>'
      + '<div style="font-size:.58rem;color:#bbb;margin-top:1px">' + p.f + '</div></div>';
  }).join('');
});
</script>
</body>
</html>
