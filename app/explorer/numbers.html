<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Numbers &amp; Colors &#128290;</title>
<link rel="stylesheet" href="../fonts/fonts.css"/>
<script src="../shared.js"></script>
<script src="../questions.js"></script>
<style>
/* ── Override shared layout to full-width (no sidebar) ── */
.subbody { display: block !important; }
.submain { padding: 8px 10px calc(80px + env(safe-area-inset-bottom)) !important; overflow-y: hidden; overflow-x: hidden; }
#sdrawer { top: 66px !important; }

/* ── Tab sections: self-contained visibility — no shared.js timing dependency ── */
.sec        { display: none;  max-width: 700px; margin: 0 auto; }
.sec.active { display: block; }

/* ── Bigbox base ── */
.bigbox { padding: 10px 14px !important; margin-bottom: 8px !important; border-radius: 18px; }

/* ── Numbers tab: compact display ── */#nb .bigchar { font-size: 5rem !important; line-height: 1 !important; }
#nb .bigsub  { font-size: 1.05rem !important; font-weight: 900 !important; margin-top: 2px !important; }
#nb { padding: 6px 14px !important; margin-bottom: 6px !important; }

/* ── Emoji count: compact, wrap, no scroll ── */
.cntbox {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 5px; padding: 8px 6px; border-radius: 14px;
  margin-bottom: 8px; min-height: 36px;
  width: 100%; box-sizing: border-box; overflow-x: hidden;
}
.cntem { font-size: 1.9rem !important; animation: popIn .3s ease forwards; opacity: 0; }

/* ── Nav: normal flow (no sticky) ── */
.num-nav-btn  { padding: 11px 10px !important; min-height: 44px !important; font-size: var(--sm) !important; }
.quiz-nav-btn { padding: 10px 8px  !important; min-height: 42px !important; font-size: var(--sm) !important; }
#num-numbers { overflow-x: hidden; }

/* ── Grid toggle button (standalone, no side-by-side shuffle) ── */
.num-toggle { padding: 9px 14px !important; font-size: var(--sm) !important; margin-bottom: 8px; }

/* ── Common shuffle toggle (matches games / think / abc pages) ── */
.shuf-row { text-align: center; margin-bottom: 8px; }
.shuf-toggle {
  padding: 7px 20px; border-radius: 20px; border: 2px solid #ddd;
  background: #f5f5f5; font-family: var(--f); font-size: var(--sm);
  font-weight: 800; cursor: pointer; transition: all .22s; color: #888;
  -webkit-tap-highlight-color: transparent;
}
.shuf-toggle.on { background: linear-gradient(135deg,#E91E63,#FF8E53); color: #fff; border-color: transparent; }

/* ── Selector grids: hidden by default, scrollable when open ── */
.hidden { display: none !important; }
#ng, #cog, #shg {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  max-height: 108px; overflow-y: auto; margin-bottom: 8px;
}

/* ── Compact color/shape cards ── */
.cgrid { gap: 7px !important; width: 100%; box-sizing: border-box; overflow: hidden; }
.crd { padding: 10px 4px 8px !important; border-radius: 14px !important; min-width: 0; overflow: hidden; }
.crdem { font-size: calc(var(--b) * 2) !important; }
.crdlbl { font-size: calc(var(--b) * 0.72) !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cswatch { width: 60px !important; height: 60px !important; margin-bottom: 6px !important; }

/* ── Color swatch & quiz elements ── */
.cswatch  { width:80px;height:80px;border-radius:50%;margin:0 auto 9px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);border:5px solid rgba(255,255,255,.6); }
.ptrow    { display:flex;gap:6px;justify-content:center;align-items:center;
            margin-bottom:10px;flex-wrap:wrap; }
.pitem    { font-size:1.7rem;padding:5px;background:#f5f5f5;border-radius:12px;
            min-width:40px;text-align:center; }
.pblank   { font-size:1.7rem;padding:5px;background:#f0f0f0;border-radius:12px;
            min-width:40px;text-align:center;border:3px dashed #ccc; }
.cprow    { display:flex;flex-direction:column;gap:8px;
            margin-bottom:12px; }
.cpitem   { background:#f9f9f9;border-radius:16px;padding:12px 16px;text-align:center;
            cursor:pointer;border:3px solid #eee;width:100%;box-sizing:border-box;
            transition:all .18s; }
.cpitem:active { transform:scale(.96); border-color:#FF8E53; }

/* ── Bottom dock ── */
.num-dock { position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#fff;box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:flex;padding:6px 3px calc(6px + env(safe-area-inset-bottom));gap:3px; }
.num-dock-btn { flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;padding:6px 2px 5px;border-radius:14px;border:none;
  background:transparent;color:#999;font-family:var(--f);font-size:.56rem;font-weight:800;
  cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent; }
.num-dock-btn.active { color:#fff;transform:scale(1.05); }
.num-dock-btn .dock-ico { font-size:1.3rem;line-height:1; }
.num-dock-btn[data-tab="numbers"].active  { background:#1976D2; }
.num-dock-btn[data-tab="colors"].active   { background:#E53935; }
.num-dock-btn[data-tab="shapes"].active   { background:#9C27B0; }
.num-dock-btn[data-tab="addition"].active { background:#00897B; }
.num-dock-btn[data-tab="patterns"].active { background:#E91E63; }
.num-dock-btn[data-tab="compare"].active  { background:#FF8E53; }
.num-dock-btn[data-tab="findit"].active   { background:#2E7D32; }

/* ══ Find It tab ══ */
.nfi-cat-row { display:flex; gap:7px; margin-bottom:8px; }
.nfi-cat-btn {
  flex:1; padding:10px 4px; border-radius:16px; border:2.5px solid transparent;
  font-family:var(--f); font-size:var(--sm); font-weight:900; cursor:pointer;
  background:#f0f0f0; color:#888; transition:all .2s;
  -webkit-tap-highlight-color:transparent; display:flex; flex-direction:column;
  align-items:center; gap:3px;
}
.nfi-cat-btn .cat-ico { font-size:1.3rem; line-height:1; }
.nfi-cat-btn.active { color:#fff; }
.nfi-cat-num.active { background:#1976D2; }
.nfi-cat-col.active { background:#E53935; }
.nfi-cat-sh.active  { background:#9C27B0; }

.nfi-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; margin-bottom:8px;
}
.nfi-opt {
  aspect-ratio:1; border:none; border-radius:20px;
  font-size:2.2rem; font-weight:900; cursor:pointer;
  box-shadow:0 5px 16px rgba(0,0,0,.18);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent; font-family:var(--f);
  text-shadow:0 2px 6px rgba(0,0,0,.18);
}
.nfi-opt:active { transform:scale(.88); }
.nfi-opt.nfi-correct { animation:popIn .35s ease forwards; outline:5px solid #4CAF50; outline-offset:2px; }
.nfi-opt.nfi-wrong   { animation:shake .4s ease; }
.nfi-feedback { text-align:center; font-size:1.05rem; font-weight:900; min-height:36px; padding:6px 12px; border-radius:14px; margin-bottom:4px; transition:all .25s; }
.nfi-feedback.ok  { background:#E8F5E9; color:#2E7D32; }
.nfi-feedback.bad { background:#FFEBEE; color:#C62828; }

/* ── Grid control row: toggle only ── */
.grid-ctrl { margin-bottom: 0; }

/* ── Grid toggle button ── */
.num-toggle { display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px 16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#E3F2FD,#BBDEFB);color:#1565C0;
  font-family:var(--f);font-size:var(--md);font-weight:900;cursor:pointer;
  margin-bottom:12px;transition:all .2s cubic-bezier(.34,1.56,.64,1); }
.num-toggle:active { transform:scale(.97); }
.num-toggle.open   { background:linear-gradient(135deg,#1976D2,#29B6F6);color:#fff; }

/* ── Prev / Next nav (Numbers, Colors, Shapes) ── */
.num-nav { display:flex;align-items:center;gap:8px;margin-top:8px;
  padding:5px;border-radius:18px;background:rgba(227,242,253,.94);
  box-shadow:0 2px 12px rgba(0,0,0,.07); }
.num-nav-btn { flex:1;padding:10px 8px;border-radius:13px;border:none;
  background:#fff;color:#1565C0;font-weight:900;font-size:var(--sm);
  min-height:40px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1); }
.num-nav-btn:active { transform:scale(.95); }

/* .quiz-top removed — replaced by .shuf-row */

/* ── Quiz: bottom prev/next ── */
.quiz-nav { display:flex;align-items:center;gap:8px;margin-top:8px;
  padding:5px;border-radius:18px;background:rgba(232,245,233,.94);
  box-shadow:0 2px 12px rgba(0,0,0,.07); }
.quiz-nav-btn { flex:1;padding:10px 8px;border-radius:13px;border:none;
  background:#fff;color:#2E7D32;font-weight:900;font-size:var(--sm);
  min-height:40px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1); }
.quiz-nav-btn:active { transform:scale(.95); }
/* color overrides per tab */
#num-compare .quiz-nav { background:rgba(255,243,224,.94); }
#num-compare .quiz-nav-btn { color:#E65100; }
#num-patterns .quiz-nav { background:rgba(252,228,236,.94); }
#num-patterns .quiz-nav-btn { color:#880E4F; }

/* ── Scorebar ── */
.scorebar { background:#fff;border-radius:12px;padding:8px 14px;margin-bottom:12px;
  font-size:var(--md);font-weight:700;color:#555;
  box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:6px; }
</style>
</head>
<body data-page-title="&#128290; Numbers &amp; Colors"
      data-page-sub="Count, Colours &amp; Shapes"
      data-page-gradient="linear-gradient(135deg,#1976D2,#29B6F6)"
      data-page-back="../home.html">
<div class="subhdr"></div>
<script>(function(){
  var b=document.body,h=document.querySelector('.subhdr');
  if(!b||!h)return;
  h.style.background=b.getAttribute('data-page-gradient')||'';
  h.innerHTML=
    '<a class="hdr-home" href="'+(b.getAttribute('data-page-back')||'../home.html')+'">&#8592;</a>'+
    '<div class="hdr-title">'+(b.getAttribute('data-page-title')||'')+'<small>'+(b.getAttribute('data-page-sub')||'')+'</small></div>'+
    '<div class="hdr-right">'+
      '<button id="sndIconBtn" class="hdr-snd-btn" onclick="toggleSoundBtn()">&#128266;</button>'+
      '<button class="hdr-gear" onclick="toggleSettings(event)">&#9881;</button>'+
    '</div>';
})();</script>

<div class="subbody">
  <div class="submain">

    <!-- ══ NUMBERS ══ -->
    <div id="num-numbers" class="sec active">
      <div class="shuf-row">
        <button class="shuf-toggle" id="numShufBtn" onclick="shuffleNums()">&#128256; Shuffle OFF</button>
      </div>
      <div class="grid-ctrl">
        <button class="num-toggle" id="numToggle" onclick="toggleNumGrid()">
          &#128290; Show All Numbers &#9660;
        </button>
      </div>
      <div class="selgrid hidden" id="ng"></div>
      <div class="bigbox" id="nb" style="cursor:pointer" onclick="spk(String(curN))">
        <div class="bigchar" id="bnc"></div>
        <div class="bigsub" id="bns"></div>
      </div>
      <div class="cntbox" id="cb" onclick="spkCntBox()" style="cursor:pointer"></div>
      <div class="num-nav">
        <button class="num-nav-btn" id="numPrev" onclick="prevN()" style="visibility:hidden">&#8592; ?</button>
        <button class="num-nav-btn" id="numNext" onclick="nextN()">1 &#8594;</button>
      </div>
    </div>

    <!-- ══ COLORS ══ -->
    <div id="num-colors" class="sec">
      <div class="shuf-row">
        <button class="shuf-toggle" id="colShufBtn" onclick="shuffleColors()">&#128256; Shuffle OFF</button>
      </div>
      <div class="grid-ctrl">
        <button class="num-toggle" id="colToggle" onclick="toggleColGrid()">
          &#127912; Show All Colors &#9660;
        </button>
      </div>
      <div class="selgrid hidden" id="cog"></div>
      <div class="bigbox" id="cob" style="cursor:pointer" onclick="spk(CD[colOrder[curCPos]].n)">
        <div class="cswatch" id="csw"></div>
        <div class="bigchar" id="cnb" style="font-size:var(--xxl)"></div>
      </div>
      <div class="cgrid" id="coCards"></div>
      <div class="num-nav">
        <button class="num-nav-btn" id="colPrev" onclick="prevC()" style="visibility:hidden">&#8592; ?</button>
        <button class="num-nav-btn" id="colNext" onclick="nextC()">? &#8594;</button>
      </div>
    </div>

    <!-- ══ SHAPES ══ -->
    <div id="num-shapes" class="sec">
      <div class="shuf-row">
        <button class="shuf-toggle" id="shShufBtn" onclick="shuffleShapes()">&#128256; Shuffle OFF</button>
      </div>
      <div class="grid-ctrl">
        <button class="num-toggle" id="shToggle" onclick="toggleShGrid()">
          &#128311; Show All Shapes &#9660;
        </button>
      </div>
      <div class="selgrid hidden" id="shg"></div>
      <div class="bigbox" id="shb" style="cursor:pointer" onclick="spk(SHD[shOrder[curShPos]].n)">
        <div class="bigchar" id="shE"></div>
        <div class="bigsub" id="shN"></div>
      </div>
      <div class="cgrid" id="shCards"></div>
      <div class="num-nav">
        <button class="num-nav-btn" id="shPrev" onclick="prevSh()" style="visibility:hidden">&#8592; ?</button>
        <button class="num-nav-btn" id="shNext" onclick="nextSh()">? &#8594;</button>
      </div>
    </div>

    <!-- ══ ADDITION QUIZ ══ -->
    <div id="num-addition" class="sec">
      <div class="shuf-row">
        <button class="shuf-toggle" id="addShufBtn" onclick="shuffleAdd()">&#128256; Shuffle OFF</button>
      </div>
      <div id="addArea"></div>
      <div class="quiz-nav">
        <button class="quiz-nav-btn" id="addPrevBtn" onclick="addPrev()" style="visibility:hidden">&#8592; Prev</button>
        <button class="quiz-nav-btn" id="addNextBtn" onclick="addNext()" style="visibility:hidden">Next &#8594;</button>
      </div>
    </div>

    <!-- ══ PATTERNS QUIZ ══ -->
    <div id="num-patterns" class="sec">
      <div class="shuf-row">
        <button class="shuf-toggle" id="patShufBtn" onclick="shufflePat()">&#128256; Shuffle OFF</button>
      </div>
      <div id="patArea"></div>
      <div class="quiz-nav">
        <button class="quiz-nav-btn" id="patPrevBtn" onclick="patPrev()" style="visibility:hidden">&#8592; Prev</button>
        <button class="quiz-nav-btn" id="patNextBtn" onclick="patNext()" style="visibility:hidden">Next &#8594;</button>
      </div>
    </div>

    <!-- ══ BIG / SMALL ══ -->
    <div id="num-compare" class="sec">
      <div class="shuf-row">
        <button class="shuf-toggle" id="cmpShufBtn" onclick="shuffleCmp()">&#128256; Shuffle OFF</button>
      </div>
      <div id="cmpArea"></div>
      <div class="quiz-nav">
        <button class="quiz-nav-btn" id="cmpPrevBtn" onclick="cmpPrev()" style="visibility:hidden">&#8592; Prev</button>
        <button class="quiz-nav-btn" id="cmpNextBtn" onclick="cmpNext()" style="visibility:hidden">Next &#8594;</button>
      </div>
    </div>

    <!-- ══ FIND IT ══ -->
    <div id="num-findit" class="sec">
      <!-- Sub-category selector -->
      <div class="nfi-cat-row">
        <button class="nfi-cat-btn nfi-cat-num active" data-cat="num" onclick="setNFICat('num')">
          <span class="cat-ico">&#128290;</span>Numbers
        </button>
        <button class="nfi-cat-btn nfi-cat-col" data-cat="col" onclick="setNFICat('col')">
          <span class="cat-ico">&#127912;</span>Colors
        </button>
        <button class="nfi-cat-btn nfi-cat-sh" data-cat="sh" onclick="setNFICat('sh')">
          <span class="cat-ico">&#128311;</span>Shapes
        </button>
      </div>
      <!-- Shuffle toggle -->
      <div class="shuf-row">
        <button class="shuf-toggle" id="nfiShufBtn" onclick="toggleNFIShuffle()">&#128256; Shuffle OFF</button>
      </div>
      <!-- Dynamic game area -->
      <div id="nfiArea"></div>
    </div>

  </div><!-- /submain -->
</div><!-- /subbody -->

<!-- ══ BOTTOM DOCK ══ -->
<nav class="num-dock">
  <button class="num-dock-btn" data-tab="numbers"  onclick="swDock('numbers')">
    <span class="dock-ico">&#128290;</span>Numbers
  </button>
  <button class="num-dock-btn" data-tab="colors"   onclick="swDock('colors')">
    <span class="dock-ico">&#127912;</span>Colors
  </button>
  <button class="num-dock-btn" data-tab="shapes"   onclick="swDock('shapes')">
    <span class="dock-ico">&#128311;</span>Shapes
  </button>
  <button class="num-dock-btn" data-tab="addition" onclick="swDock('addition')">
    <span class="dock-ico">&#10133;</span>Addition
  </button>
  <button class="num-dock-btn" data-tab="patterns" onclick="swDock('patterns')">
    <span class="dock-ico">&#128308;</span>Patterns
  </button>
  <button class="num-dock-btn" data-tab="compare"  onclick="swDock('compare')">
    <span class="dock-ico">&#9878;</span>Big/Small
  </button>
  <button class="num-dock-btn" data-tab="findit"   onclick="swDock('findit')">
    <span class="dock-ico">&#128270;</span>Find It!
  </button>
</nav>

function swDock(tab) {
  try { if(window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e) {}
  document.querySelectorAll('.sec').forEach(function(s) {
    s.classList.toggle('active', s.id === 'num-' + tab);
  });
  document.querySelectorAll('.num-dock-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-tab') === tab);
  });
  // Re-init content on tab switch — ensures data shows even if DOMContentLoaded init failed
  if (tab === 'numbers'  && !document.getElementById('bnc').textContent)  rN(numOrder[0]);
  if (tab === 'colors'   && !document.getElementById('coCards').innerHTML) rC(colOrder[0]);
  if (tab === 'shapes'   && !document.getElementById('shCards').innerHTML) rSh(shOrder[0]);
  if (tab === 'addition' && !document.getElementById('addArea').innerHTML) buildAdd();
  if (tab === 'patterns' && !document.getElementById('patArea').innerHTML) buildPat();
  if (tab === 'compare'  && !document.getElementById('cmpArea').innerHTML) buildCmp();
  if (tab === 'findit'   && !document.getElementById('nfiArea').innerHTML)  buildNFI();
}

function rN(n) {
  numPos = numOrder.indexOf(n);
  curN   = n;
  var d  = ND[n];
  aS('nbtn', numPos, d.c);   // highlight by grid position
  var box = document.getElementById('nb');
  box.style.background  = d.c;
  box.style.boxShadow   = '0 8px 24px ' + d.c + '66';
  document.getElementById('bnc').textContent = n;
  document.getElementById('bns').innerHTML   =
    d.w + (n > 0 ? ' &nbsp;' + d.e + '&nbsp; ' + d.n + (n > 1 ? 's' : '') : '');
  var cnt = document.getElementById('cb');
  cnt.style.border = '3px solid ' + d.c + '44';
  if (n === 0) {
    cnt.innerHTML = '<div class="zeromsg">Nothing here… Zero! &#128565;</div>';
  } else {
    cnt.innerHTML = Array.from({length: n}, function(_, i) {
      return '<span class="cntem" style="animation-delay:' + (i * .08) + 's">' + d.e + '</span>';
    }).join('');

  spk(n === 0 ? 'zero' : d.w.toLowerCase());

var addIdx = 0, addSc = 0, addAnswered = false;
var addList = ADDP.slice(); // working copy – shuffle acts on this

function buildAdd() {
  var p = addList[addIdx];
  addAnswered = false;
  var opts = [p.ans];
  while (opts.length < 3) {
    var r = Math.floor(Math.random() * 8) + 1;
    if (opts.indexOf(r) < 0) opts.push(r);
  }
  opts.sort(function() { return Math.random() - .5; });
  var aE = Array(p.a).fill(p.ae).join('&nbsp;');
  var bE = Array(p.b).fill(p.be).join('&nbsp;');
  document.getElementById('addArea').innerHTML =
    '<div class="scorebar">&#10133; Question ' + (addIdx + 1) + '&nbsp;/&nbsp;' + addList.length +
    '&emsp;&#183;&emsp;Score: <b>' + addSc + '</b></div>' +
    '<div class="ibox">' +
      '<div class="iq">How many altogether?</div>' +
      '<div style="font-size:1.2rem;text-align:center;margin-bottom:12px;line-height:1.9;word-break:break-word;overflow-wrap:anywhere">' +
        aE + ' <b style="color:#00897B">+</b> ' + bE + ' <b>=</b> ?' +
      '</div>' +
      '<div class="achc">' +
        opts.map(function(o) {
          return '<button class="cbtn" onclick="chkAdd(this,' + o + ',' + p.ans + ')">' + o + '</button>';
        }).join('') +
      '</div>' +
      '<div class="rmsg" id="addR"></div>' +
    '</div>';
  updateAddNav();
}

function chkAdd(b, c, cr) {
  if (addAnswered) return;
  if (c === cr) {
    b.classList.add('correct');
    addSc++;
    addAnswered = true;
    document.getElementById('addR').innerHTML = '&#127881; Correct! Well done!';
    spk('Correct! Well done!');
  } else {
    b.classList.add('wrong');
    document.getElementById('addR').innerHTML = '&#10060; Wrong! Try again!';
    spk('Try again!');
  }
  updateAddNav();
}

function updateAddNav() {
  var p = document.getElementById('addPrevBtn');
  var x = document.getElementById('addNextBtn');

  btn.classList.toggle('on', nfiShuffled);
  btn.innerHTML = '&#128256; Shuffle ' + (nfiShuffled ? 'ON' : 'OFF');
  spk('Shuffle ' + (nfiShuffled ? 'on' : 'off'));
  buildNFI();
}

function buildNFI() {
  nfiAnswered = false;
  var ord = nfiOrd(), idx = nfiIdx();
  var correctI = ord[idx];
  nfiCorrectI = correctI;

  // Build 9 options: correct + 8 random wrong
  var wrong = nfiShuffArr(ord.filter(function(i){ return i !== correctI; })).slice(0, 8);
  var opts = nfiShuffArr(wrong.concat(correctI));

  var soundOff = (typeof isSoundOn === 'function') && !isSoundOn();
  var catLabel = nfiCat==='num' ? 'number' : nfiCat==='col' ? 'color' : 'shape';
  var name = nfiName(correctI);
  nfiCurrentQ = 'Can you find the ' + catLabel + ' ' + name;

  // Question box
  var html = '<div class="find-question" onclick="spk(nfiCurrentQ)" style="cursor:pointer">'
    + '&#128269; Can you find the ' + catLabel + (soundOff ? ' ' + name + '?' : '?')
    + '<div style="font-size:.72rem;color:#aaa;font-weight:700;margin-top:4px">'
    + (soundOff ? '' : '&#128266; Tap to hear again') + '</div></div>';

  // Options grid
  html += '<div class="nfi-grid">';
  opts.forEach(function(optI) {
    var bg, label, fsize, tcol;
    if(nfiCat === 'num') {
      bg = ND[optI].c; label = String(optI); fsize = '2.2rem'; tcol = '#fff';
    } else if(nfiCat === 'col') {
      bg = CD[optI].bg;
      label = soundOff ? CD[optI].n : '';
      fsize = soundOff ? '0.78rem' : '1rem';
      tcol = CD[optI].t;
    } else {
      bg = SHD[optI].c; label = SHD[optI].e; fsize = '2.2rem'; tcol = '#fff';
    }
    html += '<button class="nfi-opt" style="background:'+bg+';color:'+tcol+';font-size:'+fsize+'" onclick="chkNFI(this,'+optI+')" data-idx="'+optI+'">'+label+'</button>';
  });
  html += '</div>';

  // Feedback
  html += '<div class="nfi-feedback" id="nfiFeedback"></div>';

  // Nav
  var prevHide = idx === 0 ? 'style="visibility:hidden"' : '';
  var nextHide = (idx >= ord.length-1 && !nfiShuffled) ? 'style="visibility:hidden"' : '';
  html += '<div class="quiz-nav" style="margin-top:6px">';
  html += '<button class="quiz-nav-btn" '+prevHide+' onclick="nfiPrev()">&#8592; Prev</button>';
  html += '<button class="quiz-nav-btn" '+nextHide+' onclick="nfiNext()">Next &#8594;</button>';
  html += '</div>';

  document.getElementById('nfiArea').innerHTML = html;
  spk(nfiCurrentQ);
}

function chkNFI(btn, optI) {
  if(nfiAnswered) return;
  var fb = document.getElementById('nfiFeedback');
  var name = nfiName(nfiCorrectI);
  if(optI === nfiCorrectI) {
    nfiAnswered = true;
    btn.classList.add('nfi-correct');
    fb.className = 'nfi-feedback ok';
    fb.innerHTML = '&#127881; Yes! ' + name + '! Well done!';
    spk('Yes! ' + name + '. Well done!');
  } else {
    btn.classList.add('nfi-wrong');
    fb.className = 'nfi-feedback bad';
    fb.innerHTML = '&#128577; Try again!';
    spk('Try again!');
    setTimeout(function(){ btn.classList.remove('nfi-wrong'); fb.innerHTML=''; fb.className='nfi-feedback'; }, 800);
  }
}

function nfiNext() {
  var ord = nfiOrd(), cur = nfiIdx();
  if(nfiShuffled) {
    var next; do { next=Math.floor(Math.random()*ord.length); } while(next===cur && ord.length>1);
    nfiSetI(next);
  } else { if(cur < ord.length-1) nfiSetI(cur+1); }
  buildNFI();
}

function nfiPrev() {
  var cur = nfiIdx(); if(cur > 0) nfiSetI(cur-1); buildNFI();
}
</script>
</body>
</html>
