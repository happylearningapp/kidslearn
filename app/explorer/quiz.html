<style>
/* ── Override shared sidebar layout ── */
.subbody { display: block !important; }
.submain { padding: 14px 12px calc(90px + env(safe-area-inset-bottom)) !important; overflow-y: auto; }
#sdrawer { top: 66px !important; }

/* ── GK header controls: toggle + shuffle ── */
.gk-ctrl-row { display:flex; gap:8px; margin:0 0 12px; }
.gkctrlbtn {
  flex:1; padding:10px 8px; border-radius:14px; border:2px solid #ddd;
  background:#f5f5f5; font-family:var(--f); font-size:var(--sm); font-weight:700;
  cursor:pointer; transition:all .2s;
}
.gkctrlbtn.on      { background:linear-gradient(135deg,#6A1B9A,#1565C0); color:#fff; border-color:transparent; }
.gkctrlbtn-shuf.on { background:linear-gradient(135deg,#E91E63,#FF8E53); color:#fff; border-color:transparent; }

/* ── GK Section (accordion — one open at a time) ── */
.gksec   { margin-bottom:10px; border-radius:16px; overflow:hidden; box-shadow:0 3px 12px rgba(0,0,0,.1); }
.gkhd    { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; cursor:pointer; user-select:none; }
.gkhd-l  { display:flex; align-items:center; gap:10px; }
.gkt     { font-size:var(--md); font-weight:900; color:#fff; }
.gkprog  { font-size:var(--sm); font-weight:700; color:rgba(255,255,255,.85); }
.gkico   { font-size:.9rem; color:rgba(255,255,255,.8); font-weight:900; transition:transform .22s; }
.gkico.open { transform:rotate(180deg); }
.gkinner { padding:10px 10px 12px; background:#fff; display:none; }
.gkinner.open { display:block; }

/* ── Single-Q card (one question per section) ── */
.gk-qcard { border-radius:15px; padding:16px 14px; margin-bottom:10px; cursor:pointer; }
.gk-q     { font-size:var(--xl); font-weight:900; color:#222; line-height:1.4; margin-bottom:10px; }
.gk-qmeta { font-size:var(--sm); color:#999; margin-bottom:10px; }
.gk-ans   { margin-top:10px; border-radius:12px; padding:10px 14px; font-size:var(--lg);
            font-weight:900; display:none; }
.gk-ans.show { display:block; animation:popIn .22s ease; }

/* ── List-view card (all questions) ── */
.gkgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; }
@media(max-width:600px) { .gkgrid { grid-template-columns:1fr; } }
.gkcrd  { border-radius:15px; padding:12px 11px 10px; box-shadow:0 2px 8px rgba(0,0,0,.08); position:relative; }
.gknum  { position:absolute; top:8px; right:10px; font-size:var(--sm); font-weight:900; opacity:.35; }
.gktop  { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; cursor:pointer; }
.gkq    { font-size:var(--md); font-weight:700; color:#222; line-height:1.45; flex:1; }
.gkacts { display:flex; gap:7px; }
.gkabtn { flex:1; padding:6px 8px; border-radius:10px; border:none; font-family:var(--f); font-size:var(--sm); font-weight:700; cursor:pointer; }
.gkabtn-a { background:#E8F5E9; color:#2E7D32; }
.gkabtn-a:hover { background:#2E7D32; color:#fff; }
.gkans  { margin-top:8px; background:rgba(255,255,255,.85); border-radius:10px; padding:7px 10px; font-size:var(--md); font-weight:700; color:#333; display:none; }
.gkans.show { display:block; animation:popIn .22s ease; }

/* ── MCQ progress bar ── */
.mcqprog { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.mcqbar  { flex:1; height:10px; background:#e9e0f5; border-radius:5px; overflow:hidden; }
.mcqfill { height:100%; background:linear-gradient(90deg,#6A1B9A,#E91E63); border-radius:5px; transition:width .5s; }
.mcqcnt  { font-size:var(--md); font-weight:900; color:#999; white-space:nowrap; }

/* ── MCQ card ── */
.mcqcard { background:#fff; border-radius:22px; padding:0 0 18px;
           box-shadow:0 8px 28px rgba(106,27,162,.15); overflow:hidden; }

/* Gradient header strip with Q number */
.mcq-qhd { background:linear-gradient(135deg,#6A1B9A,#E91E63); padding:11px 16px;
            display:flex; align-items:center; justify-content:center; }
.mcq-qbadge { background:rgba(255,255,255,.22); border-radius:20px; padding:4px 16px;
               font-size:var(--sm); font-weight:900; color:#fff; letter-spacing:.5px; }

/* Question text */
.mcq-q { font-size:var(--xl); font-weight:900; color:#333; text-align:center;
          padding:18px 16px 14px; line-height:1.45; cursor:pointer; }

/* Option grid */
.mcqopts { display:grid; grid-template-columns:1fr 1fr; gap:10px;
            padding:0 16px; margin-bottom:14px; }
.mcqopt  { padding:13px 11px; border-radius:14px; border:2.5px solid #eee;
            background:#fafafa; font-family:var(--f); font-size:var(--md);
            font-weight:700; cursor:pointer; text-align:left;
            display:flex; align-items:center; gap:8px;
            transition:border-color .15s,background .15s;
            -webkit-tap-highlight-color:transparent; }
.mcqopt:active   { transform:scale(.97); }
.mcqopt.correct  { background:#E8F5E9; border-color:#4CAF50; color:#1B5E20; animation:popIn .3s ease; }
.mcqopt.wrong    { background:#FFEBEE; border-color:#FF6B6B; color:#B71C1C; animation:shake .4s ease; }

/* Coloured letter badges A/B/C/D */
.mcqltr   { width:28px; height:28px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:.72rem; font-weight:900; color:#fff; flex-shrink:0; }
.mcqltr-a { background:#7B1FA2; }
.mcqltr-b { background:#E91E63; }
.mcqltr-c { background:#1565C0; }
.mcqltr-d { background:#E65100; }

/* Feedback inside card */
.mcq-fb { min-height:36px; display:flex; align-items:center; justify-content:center;
           font-size:var(--lg); font-weight:900; color:#555; padding:0 16px; }
/* Nav buttons below card */
.mcq-nav-btns { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }

/* MCQ shuffle toggle */
.mcq-ctrl-row { display:flex; margin:0 0 10px; }
.mcqctrlbtn {
  padding:9px 16px; border-radius:14px; border:2px solid #ddd;
  background:#f5f5f5; font-family:var(--f); font-size:var(--sm); font-weight:700;
  cursor:pointer; transition:all .2s;
}
.mcqctrlbtn.on { background:linear-gradient(135deg,#E91E63,#FF8E53); color:#fff; border-color:transparent; }

/* ── Bottom dock ── */
.quiz-dock {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:#fff; box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:flex; padding:6px 3px calc(6px + env(safe-area-inset-bottom)); gap:4px;
}
.quiz-dock-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; padding:8px 4px 7px; border-radius:14px;
  border:none; background:transparent; color:#999; font-family:var(--f);
  font-size:.6rem; font-weight:800; cursor:pointer; line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.quiz-dock-btn.active { color:#fff; transform:scale(1.05); }
.quiz-dock-btn .dock-ico { font-size:1.5rem; line-height:1; }
.quiz-dock-btn[data-tab="gkqs"].active { background:#6A1B9A; }
.quiz-dock-btn[data-tab="mcq"].active  { background:#E91E63; }
</style>

/* ═══════════════════════════════════════════════
   GK — PER-SECTION SINGLE-Q / LIST VIEW
═══════════════════════════════════════════════ */
var gkView     = 'single';   /* 'single' | 'list' */
var gkOpen     = 0;           /* index of currently expanded section */
var gkCatIdx   = [];         /* current Q position (index into gkCatOrder) per section */
var gkCatOrder = [];         /* question order per section — supports shuffle */

/* Init orders */
GKCAT.forEach(function(cat, ci) {
  var n = GKBN[ci + 1] - GKBN[ci];
  gkCatIdx[ci]   = 0;
  gkCatOrder[ci] = [];
  for (var j = 0; j < n; j++) gkCatOrder[ci].push(j);
});

/* ── Toggle view ── */
function setGKView() {
  gkView = (gkView === 'single') ? 'list' : 'single';
  var btn = document.getElementById('gkViewBtn');
  btn.classList.toggle('on', gkView === 'single');
  btn.innerHTML = gkView === 'single' ? '&#10067; Single Q' : '&#128203; List All';
  gkOpen = 0;
  buildGKAll();
}

/* ── Shuffle toggle (on = random order, off = original order) ── */
var gkShuffled = false;

function toggleGKShuffle() {
  gkShuffled = !gkShuffled;
  document.getElementById('gkShufBtn').classList.toggle('on', gkShuffled);
  GKCAT.forEach(function(cat, ci) {
    var n = GKBN[ci + 1] - GKBN[ci];
    gkCatOrder[ci] = [];
    for (var j = 0; j < n; j++) gkCatOrder[ci].push(j);
    if (gkShuffled) fisherYates(gkCatOrder[ci]);
    gkCatIdx[ci] = 0;
  });
  gkOpen = 0;
  buildGKAll();
  spk(gkShuffled ? 'Shuffle on' : 'Shuffle off');
}

/* ── Accordion toggle — collapse current, expand clicked ── */
function gkToggle(ci) {
  if (gkOpen === ci) return; /* already open, do nothing */
  /* collapse current */
  var curBody = document.getElementById('gsBody' + gkOpen);
  var curIco  = document.getElementById('gsIco'  + gkOpen);
  if (curBody) curBody.classList.remove('open');
  if (curIco)  curIco.classList.remove('open');
  /* expand new */
  gkOpen = ci;
  var newBody = document.getElementById('gsBody' + ci);
  var newIco  = document.getElementById('gsIco'  + ci);
  if (newBody) newBody.classList.add('open');
  if (newIco)  newIco.classList.add('open');
  /* speak first question if single view */
  if (gkView === 'single') {
    var q = GKQ[GKBN[ci] + gkCatOrder[ci][gkCatIdx[ci]]];
    spk(q[1]);
  }
}

/* ── Build all section cards ── */
function buildGKAll() {
  var h = '';
  GKCAT.forEach(function(cat, ci) {
    var n    = GKBN[ci + 1] - GKBN[ci];
    var prog = gkView === 'single'
      ? 'Q ' + (gkCatIdx[ci] + 1) + '/' + n
      : n + ' Q';
    var isOpen = ci === gkOpen;
    h += '<div class="gksec" id="gs' + ci + '">'
      + '<div class="gkhd" style="background:' + cat.c + '" onclick="gkToggle(' + ci + ')">'
      + '<div class="gkhd-l"><span style="font-size:1.4rem">' + cat.i + '</span>'
      + '<div class="gkt">' + cat.n + '</div></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<span class="gkprog" id="gkProg' + ci + '">' + prog + '</span>'
      + '<span class="gkico' + (isOpen ? ' open' : '') + '" id="gsIco' + ci + '">&#9660;</span>'
      + '</div></div>'
      + '<div class="gkinner' + (isOpen ? ' open' : '') + '" id="gsBody' + ci + '">'
      + buildGKSecHTML(ci)
      + '</div></div>';
  });
  document.getElementById('gkWrap').innerHTML = h;
}

/* ── HTML for one section body ── */
function buildGKSecHTML(ci) {
  var cat = GKCAT[ci];
  var n   = GKBN[ci + 1] - GKBN[ci];

  if (gkView === 'single') {
    var qi  = gkCatOrder[ci][gkCatIdx[ci]];
    var q   = GKQ[GKBN[ci] + qi];
    var abs = GKBN[ci] + qi;
    return '<div class="gk-qcard" style="background:' + cat.bg + ';border:2px solid ' + cat.br + '"'
      + ' onclick="spk(GKQ[' + abs + '][1])">'
      + '<div class="gk-q">' + q[1] + '</div>'
      + '<div class="gk-qmeta">&#128266; Tap to hear</div>'
      + '<button class="gkabtn gkabtn-a" style="max-width:160px"'
      + ' onclick="event.stopPropagation();showGKSecAns(' + ci + ')">&#128065; Show Answer</button>'
      + '<div class="gk-ans" id="gkA' + ci + '"'
      + ' style="background:' + cat.br + '33;border:2px solid ' + cat.br + '"></div>'
      + '</div>'
      + '<div class="nav-row">'
      + (gkCatIdx[ci] > 0     ? '<button class="prvbtn" onclick="gkSecNav(' + ci + ',-1)">&#8592; Prev</button>' : '')
      + (gkCatIdx[ci] < n - 1 ? '<button class="nxtbtn" onclick="gkSecNav(' + ci + ',1)">Next &#8594;</button>'  : '')
      + '</div>';
  }

  /* list view — all questions */
  var out = '<div class="gkgrid">';
  for (var i = 0; i < n; i++) {
    var abs2 = GKBN[ci] + i;
    var qL   = GKQ[abs2];
    var uid  = 'gk_' + ci + '_' + i;
    out += '<div class="gkcrd" style="background:' + cat.bg + ';border:2px solid ' + cat.br + '">'
      + '<div class="gknum">' + (i + 1) + '</div>'
      + '<div class="gktop" onclick="spk(GKQ[' + abs2 + '][1])">'
      + '<div class="gkq">' + qL[1] + '</div></div>'
      + '<div class="gkacts">'
      + '<button class="gkabtn gkabtn-a" onclick="showAns(\'' + uid + '\',' + ci + ',' + i + ')">&#128065; Answer</button>'
      + '</div><div class="gkans" id="' + uid + '"></div></div>';
  }
  return out + '</div>';
}

/* ── Navigate prev/next within a section ── */
function gkSecNav(ci, dir) {
  gkCatIdx[ci] += dir;
  var bodyEl = document.getElementById('gsBody' + ci);
  if (bodyEl) bodyEl.innerHTML = buildGKSecHTML(ci);
  var progEl = document.getElementById('gkProg' + ci);
  if (progEl) progEl.textContent = 'Q ' + (gkCatIdx[ci] + 1) + '/' + (GKBN[ci + 1] - GKBN[ci]);
  var q = GKQ[GKBN[ci] + gkCatOrder[ci][gkCatIdx[ci]]];
  spk(q[1]);
}

/* ── Show answer for current single-Q ── */
function showGKSecAns(ci) {
  var qi  = gkCatOrder[ci][gkCatIdx[ci]];
  var q   = GKQ[GKBN[ci] + qi];
  var el  = document.getElementById('gkA' + ci);
  if (!el) return;
  el.innerHTML = q[0] + ' <b>' + q[2] + '</b>';
  el.classList.add('show');
  spk(q[2]);
}

/* ── Show answer for list-view card ── */
function showAns(uid, ci, qi) {
  var q  = GKQ[GKBN[ci] + qi];
  var el = document.getElementById(uid);
  if (!el) return;
  el.innerHTML = q[0] + ' <b>' + q[2] + '</b>';
  el.classList.add('show');
  spk(q[2]);
}

/* Initial render */
buildGKAll();

/* ═══════════════════════════════════════════════
   SWITCH TAB
═══════════════════════════════════════════════ */
function swQuiz(tab) {
  document.querySelectorAll('.sec').forEach(function(s) { s.classList.remove('active'); });
  var sec = document.getElementById('gk-' + tab);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('.quiz-dock-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.quiz-dock-btn[data-tab="' + tab + '"]');
  if (btn) btn.classList.add('active');
}

/* ═══════════════════════════════════════════════
   FISHER-YATES SHUFFLE  (truly random each time)
═══════════════════════════════════════════════ */
function fisherYates(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
}

/* ═══════════════════════════════════════════════
   MCQ QUIZ
═══════════════════════════════════════════════ */
var mcqIdx      = 0;
var mcqSc       = 0;
var mcqAns      = false;
var mcqOrder    = [];
var mcqShuffled = false;   /* shuffle toggle state */

function toggleMCQShuffle() {
  mcqShuffled = !mcqShuffled;
  document.getElementById('mcqShufBtn').classList.toggle('on', mcqShuffled);
  startMCQ();
}

function startMCQ() {
  mcqIdx = 0; mcqSc = 0; mcqAns = false;
  mcqOrder = MCQD.map(function(_, i) { return i; });
  if (mcqShuffled) fisherYates(mcqOrder);
  buildMCQ();
}

function buildMCQ() {
  var area = document.getElementById('mcqArea');
  if (!area) return;

  if (mcqIdx >= mcqOrder.length) {
    /* Score screen */
    var pct = Math.round(mcqSc / mcqOrder.length * 100);
    area.innerHTML = '<div class="scorescreen">'
      + '<div style="font-size:4rem">' + (pct >= 80 ? '&#127942;&#127942;&#127942;' : pct >= 60 ? '&#127942;&#127942;' : '&#127942;') + '</div>'
      + '<div style="font-size:var(--xxl);font-weight:900;margin-bottom:6px">' + mcqSc + ' / ' + mcqOrder.length + '</div>'
      + '<div style="color:#777;margin-bottom:16px">' + (pct >= 80 ? 'Outstanding! You are a genius!' : pct >= 60 ? 'Great job! Keep learning!' : 'Keep practising!') + '</div>'
      + '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      + '<button class="rbtn" onclick="startMCQ()">&#9654; Play Again</button>'
      + '</div></div>';
    spk(pct >= 80 ? 'Outstanding! You are a genius!' : pct >= 60 ? 'Great job!' : 'Keep practising!');
    return;
  }

  mcqAns = false;
  var p   = MCQD[mcqOrder[mcqIdx]];
  var L   = ['A', 'B', 'C', 'D'];
  var tot = mcqOrder.length;
  var pct = Math.round(mcqIdx / tot * 100);

  var LTRCLS = ['mcqltr-a','mcqltr-b','mcqltr-c','mcqltr-d'];

  var h = '<div class="mcqprog">'
    + '<div class="mcqbar"><div class="mcqfill" style="width:' + pct + '%"></div></div>'
    + '<span class="mcqcnt">' + (mcqIdx + 1) + '/' + tot + '</span>'
    + '</div>'
    + '<div class="mcqcard">'
    /* gradient header strip */
    + '<div class="mcq-qhd"><span class="mcq-qbadge">Question ' + (mcqIdx + 1) + '</span></div>'
    /* question text */
    + '<div class="mcq-q" onclick="spk(\'' + p.q.replace(/'/g,"\\'") + '\')">' + p.q + '</div>'
    /* options */
    + '<div class="mcqopts">'
    + p.o.map(function(o, i) {
        return '<button class="mcqopt" id="mO' + i + '" onclick="chkMCQ(this,' + i + ',' + p.a + ')">'
          + '<span class="mcqltr ' + LTRCLS[i] + '">' + L[i] + '</span>' + o + '</button>';
      }).join('')
    + '</div>'
    /* feedback */
    + '<div class="mcq-fb" id="mcqR"></div>'
    + '</div>'
    /* nav buttons */
    + '<div class="mcq-nav-btns">'
    + (mcqIdx > 0 ? '<button class="prvbtn" onclick="mcqNav(-1)">&#8592; Prev</button>' : '')
    + '<button class="nxtbtn" onclick="mcqNav(1)">' + (mcqIdx < tot - 1 ? 'Next &#8594;' : 'Finish &#127937;') + '</button>'
    + '</div>';

  area.innerHTML = h;
  spk(p.q);
}

function chkMCQ(b, c, cr) {
  if (mcqAns) return;   /* already answered correctly — ignore tap */
  if (c === cr) {
    /* Correct! */
    mcqAns = true;
    b.classList.add('correct');
    mcqSc++;
    var _p = MCQD[mcqOrder[mcqIdx]];
    document.getElementById('mcqR').innerHTML = _p.e + ' &#127881; Correct!';
    spk('Correct! Well done!');
  } else {
    /* Wrong — just say so, NO reveal */
    b.classList.add('wrong');
    document.getElementById('mcqR').innerHTML = '&#10060; Wrong! Try again!';
    spk('Wrong! Try again!');
    setTimeout(function() {
      b.classList.remove('wrong');
      var r = document.getElementById('mcqR');
      if (r) r.innerHTML = '';
    }, 900);
  }
}

function mcqNav(dir) {
  mcqIdx += dir;
  mcqAns = false;
  buildMCQ();
}
</script>
