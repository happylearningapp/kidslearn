<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fun Games &#127918;</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="../shared.js"></script>
<style>
.mgame-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:380px;margin:0 auto 14px;}
.mcard{aspect-ratio:1;border-radius:14px;border:none;background:linear-gradient(135deg,#FF6B6B,#FF8E53);cursor:pointer;font-size:2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.mcard.flipped{background:#fff;border:3px solid #FF6B6B;}
.mcard.matched{background:linear-gradient(135deg,#4CAF50,#00C9A7);}
.ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:380px;margin:0 auto 14px;}
.ocrd{border-radius:16px;padding:8px 4px;text-align:center;cursor:pointer;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);border:3px solid transparent;}
.ocrd:hover{transform:scale(1.05);}
.ocrd.correct{background:#E8F5E9;border-color:#4CAF50;}
.ocrd.wrong{background:#FFEBEE;border-color:#FF6B6B;}
.ctarea{background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:14px;text-align:center;}
.ctnbtn{padding:10px 16px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:var(--f);font-size:var(--lg);font-weight:900;cursor:pointer;transition:all .2s;min-width:50px;}
.ctnbtn:hover{border-color:#1976D2;transform:scale(1.08);}
.ctnbtn.correct{background:#4CAF50;color:#fff;border-color:#4CAF50;}
.ctnbtn.wrong{background:#FF6B6B;color:#fff;border-color:#FF6B6B;}
.wmbox{background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:14px;text-align:center;}
.wopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:400px;margin:0 auto 14px;}
.wopt{padding:13px 10px;border-radius:14px;border:3px solid #eee;background:#f9f9f9;font-family:var(--f);font-size:var(--md);font-weight:900;cursor:pointer;letter-spacing:.5px;}
.wopt:hover{border-color:#7B1FA2;background:#F3E8FF;}
.wopt.correct{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20;}
.wopt.wrong{background:#FFEBEE;border-color:#FF6B6B;}
.wopt.reveal{background:#E8F5E9;border-color:#4CAF50;}
.balarea{position:relative;background:linear-gradient(180deg,#87CEEB,#B0E0FF 60%,#E8F5FF);border-radius:20px;height:380px;overflow:hidden;margin-bottom:14px;box-shadow:0 5px 20px rgba(0,0,0,.1);}
.balq{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);border-radius:16px;padding:8px 18px;font-size:var(--lg);font-weight:900;color:#333;z-index:10;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.1);}
.bal{position:absolute;cursor:pointer;text-align:center;width:64px;}
.balbody{font-size:2.8rem;display:block;line-height:1;}
.balnum{display:block;font-size:1rem;font-weight:900;color:#333;margin-top:-4px;}
.balstr{width:2px;height:28px;background:rgba(0,0,0,.2);margin:0 auto;}
@keyframes bpop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
.ptrow{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.pitem{font-size:2.4rem;padding:7px;background:#f5f5f5;border-radius:12px;min-width:52px;text-align:center;}
.pblank{font-size:2.4rem;padding:7px;background:#f0f0f0;border-radius:12px;min-width:52px;text-align:center;border:3px dashed #ccc;}
.cprow{display:flex;gap:16px;justify-content:center;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.cpitem{background:#f9f9f9;border-radius:16px;padding:14px 16px;text-align:center;cursor:pointer;border:3px solid #eee;flex:1;min-width:110px;}
.cpitem:hover{border-color:#FF6B6B;}
/* .prvbtn / .nxtbtn defined in shared.js */
/* SHADOW */
.shadow-box{background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);margin-bottom:14px;text-align:center;}
.shadow-em{font-size:6rem;display:block;filter:brightness(0);margin-bottom:12px;}
.shadow-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.shadow-opt{background:#fff;border:3px solid #eee;border-radius:16px;padding:14px 10px;cursor:pointer;font-size:2.8rem;min-width:80px;text-align:center;transition:all .2s;}
.shadow-opt:hover{border-color:#37474F;transform:scale(1.08);}
.shadow-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.shadow-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;}
/* MISSING */
.missing-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.missing-item{font-size:2.8rem;background:#f5f5f5;border-radius:14px;padding:12px;min-width:64px;text-align:center;}
.missing-item.hidden{background:#ddd;color:transparent;}
.missing-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.missing-opt{background:#fff;border:3px solid #eee;border-radius:16px;padding:12px 10px;cursor:pointer;font-size:2.5rem;min-width:72px;text-align:center;transition:all .2s;}
.missing-opt:hover{border-color:#6A1B9A;transform:scale(1.08);}
.missing-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popIn .3s ease;}
.missing-opt.wrong{background:#FFEBEE;border-color:#FF6B6B;}
/* ── Override shared sidebar layout ── */
.subbody { display: block !important; }
.submain { padding: 14px 12px calc(110px + env(safe-area-inset-bottom)) !important; overflow-y: auto; }
#sdrawer { top: 66px !important; }

/* ── Bottom dock (2-row grid for 11 games) ── */
.games-dock {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:#fff; box-shadow:0 -3px 20px rgba(0,0,0,.13);
  display:grid; grid-template-columns: repeat(6, 1fr);
  padding:5px 4px calc(5px + env(safe-area-inset-bottom)); gap:4px;
}
.games-dock-btn {
  flex:1 1 0; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; padding:5px 2px 4px; border-radius:12px;
  border:none; background:#f5f5f5; color:#888; font-family:var(--f);
  font-size:.48rem; font-weight:800; cursor:pointer; line-height:1.2;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.games-dock-btn.active { color:#fff; transform:scale(1.05); }
.games-dock-btn .dock-ico { font-size:1rem; line-height:1; }

/* SIMON */
.simon-board{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:320px;margin:0 auto 16px;}
.simon-btn{height:110px;border-radius:20px;border:none;cursor:pointer;font-size:1rem;font-weight:900;color:#fff;opacity:.5;text-shadow:1px 1px 3px rgba(0,0,0,.3);transition:opacity .15s;}
.simon-btn.lit{opacity:1;transform:scale(1.06);}
.simon-status{text-align:center;font-size:var(--lg);font-weight:900;color:#333;margin-bottom:12px;min-height:28px;}
.simon-seq{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
.simon-dot{width:14px;height:14px;border-radius:50%;background:#ddd;display:inline-block;}
.simon-dot.done{background:#4CAF50;}
/* SORT */
.sort-item-box{text-align:center;margin-bottom:12px;}
.sort-item-em{font-size:2.8rem;display:block;margin-bottom:4px;animation:popIn .4s ease;}
.sort-buckets{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:300px;margin:0 auto 14px;}
.sort-bucket{border-radius:14px;padding:8px 4px;text-align:center;cursor:pointer;border:3px solid transparent;transition:all .2s;}
.sort-bucket:hover{transform:scale(1.04);}
.sort-bucket.correct{animation:popIn .3s ease;border-color:#fff!important;}
.sort-bucket.wrong{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.sort-bucket-em{font-size:1.4rem;display:block;margin-bottom:2px;}
.sort-bucket-lbl{font-size:.75rem;font-weight:900;color:#fff;}
/* COLOR TAP */
.ctap-word{font-size:3.2rem;font-weight:900;text-align:center;padding:18px 12px;border-radius:20px;margin-bottom:18px;letter-spacing:2px;background:#fff;box-shadow:0 5px 20px rgba(0,0,0,.12);}
.ctap-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:320px;margin:0 auto 14px;}
.ctap-circle{aspect-ratio:1;border-radius:50%;border:5px solid #fff;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.ctap-circle:active{transform:scale(0.92);}
.ctap-circle.correct{border-color:#4CAF50;box-shadow:0 0 0 6px #4CAF5066,0 4px 14px rgba(0,0,0,.18);animation:popIn .3s ease;}
.ctap-circle.wrong{border-color:#FF6B6B;animation:shake .4s ease;}
/* TRUE/FALSE */
.tf-card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 5px 20px rgba(0,0,0,.12);margin-bottom:14px;text-align:center;}
.tf-em{font-size:4rem;display:block;margin-bottom:10px;}
.tf-stmt{font-size:var(--lg);font-weight:900;color:#333;margin-bottom:20px;line-height:1.4;}
.tf-btns{display:flex;gap:16px;justify-content:center;}
.tf-btn{padding:14px 36px;border-radius:18px;border:none;font-family:var(--f);font-size:var(--xl);font-weight:900;cursor:pointer;transition:all .2s;}
.tf-btn:hover{transform:scale(1.06);}
.tf-true{background:#4CAF50;color:#fff;}
.tf-false{background:#FF6B6B;color:#fff;}
.tf-btn.correct{box-shadow:0 0 0 5px #FFC300;animation:popIn .3s ease;}
.tf-btn.wrong{opacity:.4;}
</style>
</head>
<body data-page-title="&#127918; Fun Games" data-page-sub="Play, Learn &amp; Win!" data-page-gradient="linear-gradient(135deg,#FF6B00,#FFC300)" data-page-back="../home.html">

<div class="subbody">
  <div class="submain" id="gameMain">
    <!-- content injected here by showGame() -->
  </div>
</div>

<!-- ══ BOTTOM DOCK ══ -->
<nav class="games-dock" id="gamesDock">
  <!-- Row 1 -->
  <button class="games-dock-btn" data-game="odd"      onclick="showGame('odd')">     <span class="dock-ico">&#127919;</span>Odd One</button>
  <button class="games-dock-btn" data-game="count"    onclick="showGame('count')">   <span class="dock-ico">&#128290;</span>Count</button>
  <button class="games-dock-btn" data-game="quiz"     onclick="showGame('quiz')">    <span class="dock-ico">&#127942;</span>Quiz</button>
  <button class="games-dock-btn" data-game="word"     onclick="showGame('word')">    <span class="dock-ico">&#128292;</span>Words</button>
  <button class="games-dock-btn" data-game="shadow"   onclick="showGame('shadow')">  <span class="dock-ico">&#128065;</span>Shadow</button>
  <button class="games-dock-btn" data-game="missing"  onclick="showGame('missing')"> <span class="dock-ico">&#10067;</span>Missing</button>
  <!-- Row 2 -->
  <button class="games-dock-btn" data-game="balloon"  onclick="showGame('balloon')"> <span class="dock-ico">&#127880;</span>Balloons</button>
  <button class="games-dock-btn" data-game="memory"   onclick="showGame('memory')">  <span class="dock-ico">&#129513;</span>Memory</button>
  <button class="games-dock-btn" data-game="simon"    onclick="showGame('simon')">   <span class="dock-ico">&#127912;</span>Simon</button>
  <button class="games-dock-btn" data-game="sortit"   onclick="showGame('sortit')">  <span class="dock-ico">&#128230;</span>Sort It</button>
  <button class="games-dock-btn" data-game="tf"       onclick="showGame('tf')">      <span class="dock-ico">&#9989;</span>True/False</button>
  <button class="games-dock-btn" data-game="colortap" onclick="showGame('colortap')"><span class="dock-ico">&#127752;</span>Colors</button>
</nav>

<script>
/* ── GAME ROUTER ── */
var currentGame = '';
var GAME_HEADERS = {
  odd:      {bg:'linear-gradient(135deg,#E91E63,#7B1FA2)', em:'&#127919;', title:'Odd One Out'},
  count:    {bg:'linear-gradient(135deg,#1976D2,#00C9A7)', em:'&#128290;', title:'Count &amp; Tap'},
  quiz:     {bg:'linear-gradient(135deg,#43A047,#FFC300)', em:'&#127942;', title:'Quick Quiz'},
  word:     {bg:'linear-gradient(135deg,#7B1FA2,#E91E63)', em:'&#128292;', title:'Word Match'},
  balloon:  {bg:'linear-gradient(135deg,#FF6B6B,#29B6F6)', em:'&#127880;', title:'Balloon Pop!'},
  shadow:   {bg:'linear-gradient(135deg,#37474F,#607D8B)', em:'&#128065;', title:'Shadow Match'},
  missing:  {bg:'linear-gradient(135deg,#6A1B9A,#29B6F6)', em:'&#10067;', title:"What's Missing?"},
  simon:    {bg:'linear-gradient(135deg,#E91E63,#FF6B00)', em:'&#127912;', title:'Simon Says Colors'},
  sortit:   {bg:'linear-gradient(135deg,#43A047,#1976D2)', em:'&#128230;', title:'Sort It!'},
  tf:       {bg:'linear-gradient(135deg,#00897B,#6A1B9A)', em:'&#9989;',  title:'True or False?'},
  memory:   {bg:'linear-gradient(135deg,#FF6B00,#FFC300)', em:'&#129513;', title:'Memory Match'},
  colortap: {bg:'linear-gradient(135deg,#FF6B6B,#A855F7)', em:'&#127752;', title:'Tap the Color!'}
};
var GAME_INITS = {
  odd: buildOdd, count: buildCT, quiz: buildGQ, word: buildWM,
  balloon: nextBal, shadow: buildShadow, missing: buildMissing,
  simon: buildSimonBoard, sortit: buildSort, tf: buildTF, memory: renderMem,
  colortap: buildCtap
};

function showGame(name) {
  window.speechSynthesis.cancel();
  currentGame = name;

  /* highlight dock button */
  document.querySelectorAll('.games-dock-btn').forEach(function(b) {
    var on = b.getAttribute('data-game') === name;
    b.classList.toggle('active', on);
    var h = GAME_HEADERS[name];
    b.style.background = on ? (h ? h.bg : '#FF6B00') : '';
  });

  /* inject header + container */
  var h = GAME_HEADERS[name];
  document.getElementById('gameMain').innerHTML =
    '<div class="bigbox" style="background:'+h.bg+'"><div class="bigchar">'+h.em+'</div><div class="bigsub">'+h.title+'</div></div>'
    + '<div id="gameArea"></div>';

  /* reset state & build */
  resetState(name);
  GAME_INITS[name]();
}

function resetState(name) {
  if(name==='odd')    { oddOrder=ODD.map(function(_,i){return i;}); oddIdx=0; oddSc=0; }
  if(name==='count')  { ctOrder=CTD.map(function(_,i){return i;}); ctIdx=0; ctSc=0; ctAnswered=false; }
  if(name==='quiz')   { gqOrder=GQD.map(function(_,i){return i;}); gqIdx=0; gqSc=0; gqAnswered=false; }
  if(name==='word')   { wmOrder=WMD.map(function(_,i){return i;}); wmIdx=0; wmSc=0; wmAns=false; }
  if(name==='balloon'){ balSc=0; balRd=0; }
  if(name==='shadow') { shOrder=SHDW.map(function(_,i){return i;}); shIdx=0; shSc=0; shAnswered=false; }
  if(name==='missing'){ msOrder=MISS.map(function(_,i){return i;}); msIdx=0; msSc=0; msAnswered=false; }
  if(name==='simon')  { simonSeq=[]; simonStep=0; simonRound=0; simonSc=0; simonPlaying=false; }
  if(name==='sortit') { sortPool=SORT_POOL.slice().sort(function(){return Math.random()-.5;}); sortOrder=sortPool.map(function(_,i){return i;}); sortIdx=0; sortSc=0; sortAnswered=false; }
  if(name==='tf')       { tfOrder=TFD.map(function(_,i){return i;}); tfIdx=0; tfSc=0; tfAnswered=false; }
  if(name==='memory')   { var p=memE.concat(memE); p.sort(function(){return Math.random()-.5;}); memSt={cards:p,fl:[],ma:[],lk:false,sc:0,mv:0}; }
  if(name==='colortap') { ctapOrder=CTAP.map(function(_,i){return i;}); ctapIdx=0; ctapSc=0; ctapAnswered=false; }
}

function getArea() { return document.getElementById('gameArea'); }

/* ── DATA ── */
var ODD=[{q:"Which one does NOT live in water?",i:[{e:"&#128031;",l:"Fish",o:false},{e:"&#128044;",l:"Dolphin",o:false},{e:"&#128024;",l:"Elephant",o:true},{e:"&#129416;",l:"Shark",o:false},{e:"&#129585;",l:"Octopus",o:false},{e:"&#128056;",l:"Frog",o:false}]},{q:"Which one is NOT a fruit?",i:[{e:"&#127822;",l:"Apple",o:false},{e:"&#127820;",l:"Banana",o:false},{e:"&#129365;",l:"Carrot",o:true},{e:"&#127815;",l:"Grapes",o:false},{e:"&#127818;",l:"Orange",o:false},{e:"&#127827;",l:"Strawberry",o:false}]},{q:"Which ones can FLY?",i:[{e:"&#128053;",l:"Dog",o:true},{e:"&#129413;",l:"Eagle",o:false},{e:"&#128049;",l:"Cat",o:true},{e:"&#129419;",l:"Butterfly",o:false},{e:"&#128046;",l:"Cow",o:true},{e:"&#9992;",l:"Airplane",o:false}],multi:true,correct:[1,3,5]},{q:"Which one is NOT a color?",i:[{e:"&#128308;",l:"Red",o:false},{e:"&#127795;",l:"Tree",o:true},{e:"&#128309;",l:"Blue",o:false},{e:"&#128993;",l:"Yellow",o:false},{e:"&#127769;",l:"Moon",o:true},{e:"&#128994;",l:"Green",o:false}]},{q:"Which ones are vehicles?",i:[{e:"&#128047;",l:"Tiger",o:true},{e:"&#128663;",l:"Car",o:false},{e:"&#127800;",l:"Flower",o:true},{e:"&#128652;",l:"Bus",o:false},{e:"&#127829;",l:"Pizza",o:true},{e:"&#9992;",l:"Airplane",o:false}],multi:true,correct:[1,3,5]},{q:"Which one is NOT an animal?",i:[{e:"&#129409;",l:"Lion",o:false},{e:"&#127846;",l:"Ice Cream",o:true},{e:"&#128024;",l:"Elephant",o:false},{e:"&#11088;",l:"Star",o:true},{e:"&#128047;",l:"Tiger",o:false},{e:"&#128038;",l:"Bird",o:false}]}];

/* ── BALLOON POP ── */
function nextBal(){
  if(balRd>=10){scoreScrn(balSc,10,'Champion balloon popper!','Good popping!','balloon');return;}
  balTgt=Math.floor(Math.random()*9)+1;
  var nums=[balTgt];while(nums.length<5){var r=Math.floor(Math.random()*9)+1;if(nums.indexOf(r)<0)nums.push(r);}
  nums.sort(function(){return Math.random()-.5;});
  var pos=[{l:'8%',t:'65%'},{l:'24%',t:'45%'},{l:'42%',t:'60%'},{l:'62%',t:'42%'},{l:'78%',t:'57%'}];
  getArea().innerHTML='<div class="scorebar">Score: <b>'+balSc+'</b> &nbsp; Round: <b>'+(balRd+1)+'/10</b></div>'
    +'<div class="balarea" id="bArea"><div class="balq">Pop number <b>'+balTgt+'</b>!</div>'
    +nums.map(function(n,i){return '<div class="bal" id="bl_'+n+'" style="left:'+pos[i].l+';top:'+pos[i].t+'" onclick="popBal('+n+','+balTgt+')">'+'<span class="balbody">'+balC[i%balC.length]+'</span><span class="balnum">'+n+'</span><div class="balstr"></div></div>';}).join('')+'</div>'
    +'<div class="rmsg" id="balR" style="padding:8px;text-align:center"></div>';
  spk('Pop the balloon with number '+balTgt);
  nums.forEach(function(n,i){
    var el=document.getElementById('bl_'+n);if(!el)return;
    var top=parseFloat(pos[i].t),spd=0.22+Math.random()*.22;
    (function anim(){if(!el||!el.parentNode)return;top-=spd;if(top<-15)top=80+Math.random()*15;el.style.top=top+'%';requestAnimationFrame(anim);})();
  });
}
function popBal(n,t){
  var el=document.getElementById('bl_'+n);if(!el)return;
  if(n===t){el.style.animation='bpop .35s ease forwards';setTimeout(function(){if(el&&el.parentNode)el.style.display='none';},400);balSc++;document.getElementById('balR').innerHTML='&#127881; POP! Correct!';spk('Pop! Correct!');balRd++;setTimeout(nextBal,1200);}
  else{document.getElementById('balR').innerHTML='&#10060; Try again! Find number '+t+'!';spk('Try again! Find number '+t);}
}

/* ── WHAT'S MISSING ── */
function shuffleMissing(){
  msOrder=MISS.map(function(_,i){return i;}).sort(function(){return Math.random()-.5;});
  msIdx=0; msSc=0; buildMissing();
}
function buildMissing(){
  if(msIdx>=msOrder.length){scoreScrn(msSc,MISS.length,'Great memory!','Keep practising!','missing');return;}
  msAnswered=false;
  var p=MISS[msOrder[msIdx]];
  msMissIdx=Math.floor(Math.random()*p.items.length);
  var missingEm=p.items[msMissIdx];
  var wrongPool=[];
  MISS.forEach(function(r,ri){if(ri!==msOrder[msIdx])r.items.forEach(function(it){if(it!==missingEm&&wrongPool.indexOf(it)<0)wrongPool.push(it);});});
  wrongPool.sort(function(){return Math.random()-.5;});
  var opts=[missingEm,wrongPool[0],wrongPool[1]].sort(function(){return Math.random()-.5;});
  _nextFn=function(){msIdx++;buildMissing();};
  getArea().innerHTML=scoreH(msIdx+1,MISS.length,msSc)
    +shufBar('shuffleMissing()')
    +'<div class="ibox"><div class="iq">&#128064; Look carefully...</div>'
    +'<div class="missing-grid" id="msGrid">'+p.items.map(function(it){return '<div class="missing-item">'+it+'</div>';}).join('')+'</div>'
    +'<div class="rmsg" id="msR">Remember all items!</div></div>';
  spk('Look carefully! Remember all the items!');
  setTimeout(function(){
    var grid=document.getElementById('msGrid');if(!grid)return;
    grid.innerHTML=p.items.map(function(it,i){return '<div class="missing-item'+(i===msMissIdx?' hidden':'')+'">'+it+'</div>';}).join('');
    var r=document.getElementById('msR');if(r)r.innerHTML='Which one is MISSING?';
    spk('Which one is missing?');
    var ibox=document.querySelector('#gameArea .ibox');if(!ibox)return;
    var optDiv=document.createElement('div');optDiv.className='missing-opts';
    optDiv.innerHTML=opts.map(function(o){
      var sid='mso_'+msIdx+'_'+opts.indexOf(o);
      return '<div class="missing-opt" id="'+sid+'" onclick="chkMissing(\''+sid+'\',\''+o+'\',\''+missingEm+'\')">'+o+'</div>';
    }).join('');
    ibox.appendChild(optDiv);
    var nav=document.createElement('div');
    nav.innerHTML=navBtns(msIdx>0?'msIdx--;buildMissing()':'',true);
    ibox.appendChild(nav);
  },2200);
}
function chkMissing(sid,chosen,ans){
  if(msAnswered)return;
  var el=document.getElementById(sid);if(!el)return;
  if(chosen===ans){msAnswered=true;el.classList.add('correct');msSc++;document.getElementById('msR').innerHTML='&#127881; Correct! Great memory!';spk('Correct! Great memory!');showNxt();}
  else{wrongFlash(el,'msR','&#10060; Wrong! Try again!');}
}

/* ── SIMON SAYS ── */
function buildSimonBoard(){
  getArea().innerHTML=
    '<div class="scorebar">Round: <b id="simonRnd">0</b>/10 &nbsp; Score: <b id="simonScD">0</b></div>'
    +'<div class="simon-status" id="simonStatus">Get ready...</div>'
    +'<div class="simon-seq" id="simonDots"></div>'
    +'<div class="simon-board">'+SIMON_COLORS.map(function(c){return '<button class="simon-btn" id="'+c.id+'" style="background:'+c.bg+'" onclick="simonPress(\''+c.id+'\',\''+c.lbl+'\')">'+c.lbl+'</button>';}).join('')+'</div>'
    +'<div class="rmsg" id="simonR"></div>';
  setTimeout(nextSimonRound,800);
}
function nextSimonRound(){
  if(simonRound>=10){scoreScrn(simonSc,10,'Amazing memory champion!','Good memory!','simon');return;}
  simonRound++;var newC=SIMON_COLORS[Math.floor(Math.random()*SIMON_COLORS.length)];
  simonSeq.push(newC);simonStep=0;simonPlaying=true;
  var rd=document.getElementById('simonRnd');if(rd)rd.textContent=simonRound;
  var st=document.getElementById('simonStatus');if(st)st.textContent='Watch carefully!';
  spk('Watch carefully!');
  updateSimonDots();playSimonSeq(0);
}
function updateSimonDots(){
  var el=document.getElementById('simonDots');if(!el)return;
  el.innerHTML=simonSeq.map(function(c,i){return '<span class="simon-dot'+(i<simonStep?' done':'')+'"></span>';}).join('');
}
function playSimonSeq(i){
  if(i>=simonSeq.length){simonPlaying=false;simonStep=0;var st=document.getElementById('simonStatus');if(st)st.textContent='Your turn! Tap the same colors!';spk('Your turn!');updateSimonDots();return;}
  var c=simonSeq[i];
  setTimeout(function(){litBtn(c.id,600);spk(c.lbl);setTimeout(function(){playSimonSeq(i+1);},900);},300);
}
function litBtn(id,dur){var el=document.getElementById(id);if(!el)return;el.classList.add('lit');setTimeout(function(){el.classList.remove('lit');},dur);}
function simonPress(id,lbl){
  if(simonPlaying)return;
  litBtn(id,200);spk(lbl);
  if(simonSeq[simonStep].id===id){
    simonStep++;updateSimonDots();
    if(simonStep===simonSeq.length){
      simonSc++;var sc=document.getElementById('simonScD');if(sc)sc.textContent=simonSc;
      var st=document.getElementById('simonStatus');if(st)st.textContent='&#127881; Correct!';
      spk('Correct! Well done!');setTimeout(nextSimonRound,1200);
    }
  }else{
    simonPlaying=true;
    var st=document.getElementById('simonStatus');if(st)st.textContent='&#10060; Wrong! Watch again...';
    spk('Wrong! Watch again!');
    setTimeout(function(){simonStep=0;simonPlaying=false;playSimonSeq(0);},1200);
  }
}

/* ── COLOR TAP ── */
function shuffleCtap(){
  ctapOrder=CTAP.map(function(_,i){return i;}).sort(function(){return Math.random()-.5;});
  ctapIdx=0; ctapSc=0; buildCtap();
}
function buildCtap(){
  if(ctapIdx>=ctapOrder.length){scoreScrn(ctapSc,CTAP.length,'Amazing! You know all colors!','Good color spotting!','colortap');return;}
  ctapAnswered=false;
  var correct=CTAP[ctapOrder[ctapIdx]];
  /* pick 3 wrong colors — one per color-family group, none matching correct's group */
  var usedGroups=[correct.g];
  var pool=[];
  var shuffled=CTAP.filter(function(c){return c!==correct;}).sort(function(){return Math.random()-.5;});
  for(var pi=0;pi<shuffled.length&&pool.length<3;pi++){
    if(usedGroups.indexOf(shuffled[pi].g)<0){pool.push(shuffled[pi]);usedGroups.push(shuffled[pi].g);}
  }
  /* fallback if not enough distinct groups */
  if(pool.length<3){
    var extra=CTAP.filter(function(c){return c!==correct&&pool.indexOf(c)<0;}).sort(function(){return Math.random()-.5;});
    while(pool.length<3&&extra.length)pool.push(extra.shift());
  }
  var all=[correct].concat(pool).sort(function(){return Math.random()-.5;});
  _nextFn=function(){ctapIdx++;buildCtap();};
  getArea().innerHTML=scoreH(ctapIdx+1,CTAP.length,ctapSc)
    +shufBar('shuffleCtap()')
    +'<div class="ctap-word" style="color:'+correct.bg+'">'+correct.name+'</div>'
    +'<div class="ctap-grid">'+all.map(function(c,i){
      var ok=(c===correct);
      return '<div class="ctap-circle" id="ctap'+i+'" style="background:'+c.bg+';'+(c.bg==='#F5F5F5'?'border-color:#ccc;':'')+'" onclick="chkCtap(\'ctap'+i+'\','+ok+',\''+c.name+'\')"></div>';
    }).join('')+'</div>'
    +'<div class="rmsg" id="ctapR" style="text-align:center;font-size:var(--lg)"></div>'
    +navBtns(ctapIdx>0?'ctapIdx--;buildCtap()':'',true);
  spk('Tap the color '+correct.name);
}
function chkCtap(sid,correct,name){
  if(ctapAnswered)return;
  var el=document.getElementById(sid);if(!el)return;
  if(correct){
    ctapAnswered=true;el.classList.add('correct');ctapSc++;
    document.getElementById('ctapR').innerHTML='&#127881; Yes! That is '+name+'!';
    spk('Correct! That is '+name+'!');showNxt();
  }else{
    wrongFlash(el,'ctapR','&#10060; Wrong! Try again!');
  }
}

/* ── MEMORY MATCH ── */
function renderMem(){
  var a=getArea();if(!a)return;
  var h='<div class="scorebar">Score: <b>'+memSt.sc+'</b> &nbsp; Moves: <b>'+memSt.mv+'</b></div><div class="mgame-grid">';
  memSt.cards.forEach(function(c,i){var isF=memSt.fl.indexOf(i)>=0||memSt.ma.indexOf(i)>=0;var isM=memSt.ma.indexOf(i)>=0;h+='<button class="mcard'+(isF?' flipped':'')+(isM?' matched':'')+'" onclick="flipC('+i+')">'+(isF?c:'&#127775;')+'</button>';});
  h+='</div>';
  if(memSt.ma.length===16){h+='<div class="ibox" style="text-align:center"><div style="font-size:3rem">&#127881;</div><div class="iq">All matched in '+memSt.mv+' moves!</div><button class="nxtbtn" onclick="showGame(\'memory\')">Play Again</button></div>';}
  else{h+='<button class="nxtbtn" style="background:#1976D2;margin-top:8px" onclick="showGame(\'memory\')">New Game</button>';}
  a.innerHTML=h;
}
function flipC(i){
  if(memSt.lk||memSt.fl.length>=2||memSt.ma.indexOf(i)>=0||memSt.fl.indexOf(i)>=0)return;
  memSt.fl.push(i);
  if(memSt.fl.length===2){memSt.mv++;memSt.lk=true;setTimeout(function(){var a=memSt.fl[0],b=memSt.fl[1];if(memSt.cards[a]===memSt.cards[b]){memSt.ma.push(a,b);memSt.sc++;spk('Match!');}else{spk('Try again!');}memSt.fl=[];memSt.lk=false;renderMem();},900);}
  renderMem();
}
